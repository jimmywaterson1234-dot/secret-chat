<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark Ultra Stable</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --blue: #242f3d; --tg-blue: #50a2e3; --text: #fff; --my-msg: #2b5278; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; }

        /* Экраны */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; }

        /* Заголовки */
        .head { height: 60px; background: var(--side); display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid #000; flex-shrink: 0; }
        .back-btn { font-size: 24px; cursor: pointer; color: var(--tg-blue); padding-right: 10px; }

        /* Списки */
        .list { flex: 1; overflow-y: auto; }
        .item { padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #0e1621; }
        .item:active { background: #232e3c; }
        .ava { width: 50px; height: 50px; border-radius: 50%; background: var(--tg-blue); object-fit: cover; flex-shrink: 0; }

        /* Чат */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 8px; align-items: flex-end; max-width: 85%; }
        .row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 15px; border-radius: 18px; background: #182533; position: relative; word-wrap: break-word; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        /* Ввод */
        .input-bar { padding: 10px; background: var(--side); display: flex; align-items: center; gap: 10px; border-top: 1px solid #000; }
        #mInp { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }

        /* Плюсик */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--tg-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 100; }

        /* Авторизация */
        #auth-screen { z-index: 9999; justify-content: center; align-items: center; display: none; }
        .auth-box { width: 85%; max-width: 320px; text-align: center; }
        .inp { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: var(--side); color: #fff; }
        
        /* Сигма-панель */
        .sigma-item { padding: 10px; border: 1px solid gold; margin: 5px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen">
    <div class="auth-box">
        <h2 style="margin-bottom:20px;">Вас приветствует Spark</h2>
        <input type="text" id="auser" class="inp" placeholder="Никнейм">
        <input type="password" id="apass" class="inp" placeholder="Пароль">
        <button class="inp" style="background:var(--tg-blue); border:none; font-weight:bold" onclick="doAuth()">ВОЙТИ / СОЗДАТЬ</button>
    </div>
</div>

<div id="main-screen" class="screen active">
    <div class="head">
        <span onclick="openMod('sets-mod')">☰</span>
        <b style="font-size:20px">Spark</b>
        <span style="margin-left:auto" onclick="searchID()">🔍</span>
    </div>
    <div id="chat-list" class="list"></div>
    <div class="fab" onclick="openMod('fab-mod')">+</div>
</div>

<div id="chat-window" class="screen">
    <div class="head">
        <span class="back-btn" onclick="closeChat()">←</span>
        <div style="flex:1" onclick="viewPeer()">
            <b id="chat-title">Загрузка...</b>
        </div>
        <span id="g-dots" style="display:none" onclick="openMod('group-info-mod')">⋮</span>
    </div>
    <div id="msgs"></div>
    <div class="input-bar">
        <span onclick="document.getElementById('fInp').click()">📎</span>
        <input type="file" id="fInp" hidden onchange="upImg(this)">
        <input type="text" id="mInp" placeholder="Сообщение...">
        <span id="aBtn" onclick="recA()">🎙️</span>
        <span onclick="sendMsg()" style="color:var(--tg-blue); font-size:25px;">➤</span>
    </div>
</div>

<div id="sets-mod" class="screen">
    <div class="head"><span class="back-btn" onclick="closeMod('sets-mod')">←</span><b>Настройки</b></div>
    <div id="my-profile" style="padding:20px; text-align:center;"></div>
    <div class="item" onclick="upd('bio')">О себе</div>
    <div class="item" style="color:gold" onclick="openSigma()">СИГМА ПАНЕЛЬ</div>
    <div class="item" style="color:red" onclick="logout()">Выйти из аккаунта</div>
</div>

<div id="fab-mod" class="screen">
    <div class="head"><span class="back-btn" onclick="closeMod('fab-mod')">←</span><b>Создать</b></div>
    <div class="item" onclick="initGroup()">Создать группу</div>
</div>

<div id="prof-mod" class="screen">
    <div class="head"><span class="back-btn" onclick="closeMod('prof-mod')">←</span><b>Профиль</b></div>
    <div id="peer-data" style="padding:30px; text-align:center;"></div>
</div>

<div id="sigma-mod" class="screen">
    <div class="head"><span class="back-btn" onclick="closeMod('sigma-mod')">←</span><b>Sigma Admin</b></div>
    <div id="sig-list" class="list"></div>
</div>

<script>
    // КОНФИГ (Версия v5 для чистоты)
    const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myUID = localStorage.getItem('spark_uid_v5'), curChat = null, isGroup = false, myData = {};
    let aRec, aChunks = [], isRecording = false;

    window.onload = () => { if(!myUID) document.getElementById('auth-screen').style.display='flex'; else initApp(); };

    function initApp() {
        // Подгружаем свой профиль
        db.ref('users_v5/'+myUID).on('value', s => {
            myData = s.val(); if(!myData) return;
            document.getElementById('my-profile').innerHTML = `
                <img src="${myData.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava" style="width:100px;height:100px">
                <h2>${myData.nick}</h2><p>ID: ${myData.shortID}</p><p>${myData.bio||''}</p>
            `;
        });

        // Список чатов
        db.ref('chats_v5/'+myUID).on('value', s => {
            const container = document.getElementById('chat-list');
            container.innerHTML = `<div class="item" onclick="openChat('global', false)"><div class="ava">🌐</div><b>Общий чат</b></div>`;
            s.forEach(child => {
                const info = child.val();
                db.ref(info.isG ? 'groups_v5/'+child.key : 'users_v5/'+child.key).once('value', snap => {
                    const d = snap.val();
                    if(!d) return;
                    container.innerHTML += `<div class="item" onclick="openChat('${child.key}', ${info.isG})">
                        <img src="${d.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava">
                        <div><b>${d.nick || d.name}</b></div>
                    </div>`;
                });
            });
        });
    }

    function openChat(id, gMode) {
        curChat = id === 'global' ? null : id; isGroup = gMode;
        document.getElementById('chat-window').classList.add('active');
        document.getElementById('chat-title').innerText = id === 'global' ? 'Общий чат' : 'Загрузка...';
        
        const path = curChat ? (isGroup ? 'g_msgs_v5/'+curChat : 'p_msgs_v5/'+[myUID, curChat].sort().join('_')) : 'global_msgs_v5';
        
        if(curChat) db.ref(isGroup ? 'groups_v5/'+id : 'users_v5/'+id).once('value', s => {
            document.getElementById('chat-title').innerText = s.val().nick || s.val().name;
        });

        const msgCont = document.getElementById('msgs'); msgCont.innerHTML = '';
        db.ref(path).off();
        db.ref(path).on('child_added', snap => {
            const m = snap.val();
            const div = document.createElement('div');
            div.className = 'row ' + (m.u === myUID ? 'my' : '');
            
            let body = m.t === 'voice' ? `<audio src="${m.m}" controls style="width:200px; height:40px;"></audio>` :
                       m.t === 'img' ? `<img src="${m.m}" style="max-width:200px; border-radius:10px;">` : `<span>${m.m}</span>`;

            div.innerHTML = `
                ${m.u !== myUID ? `<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="ava" style="width:30px;height:30px;" onclick="viewUser('${m.u}')">` : ''}
                <div class="bubble" onclick="msgAction('${snap.key}', '${m.u}', '${m.m}', '${m.t}', '${m.n}')">
                    <small style="color:var(--tg-blue); display:block; font-weight:bold; margin-bottom:3px;">${m.n}</small>
                    ${m.f ? `<small style="color:#888; display:block;">↪ Переслано от ${m.f}</small>` : ''}
                    ${body}
                </div>`;
            msgCont.appendChild(div); msgCont.scrollTop = msgCont.scrollHeight;
        });
        db.ref(path).on('child_removed', snap => { location.reload(); }); // Простое решение для удаления в реальном времени
    }

    function sendMsg() {
        if(window.recordedBlob) { pushToDB(window.recordedBlob, 'voice'); window.recordedBlob = null; return; }
        const text = document.getElementById('mInp').value.trim();
        if(!text) return;
        pushToDB(text, 'txt');
        document.getElementById('mInp').value = '';
    }

    function pushToDB(m, t, f=null) {
        const path = curChat ? (isGroup ? 'g_msgs_v5/'+curChat : 'p_msgs_v5/'+[myUID, curChat].sort().join('_')) : 'global_msgs_v5';
        db.ref(path).push({ u: myUID, n: myData.nick, m: m, t: t, f: f });
    }

    async function recA() {
        if(!isRecording) {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            aRec = new MediaRecorder(s); aChunks = [];
            aRec.ondataavailable = e => aChunks.push(e.data);
            aRec.start(); isRecording = true; document.getElementById('aBtn').style.color = 'red';
        } else {
            aRec.stop(); isRecording = false; document.getElementById('aBtn').style.color = '#fff';
            aRec.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(aChunks));
                r.onload = () => { window.recordedBlob = r.result; alert("Голосовое записано! Нажми ➤"); };
            };
        }
    }

    function msgAction(id, uid, m, t, n) {
        if(uid === myUID) {
            if(confirm("Удалить сообщение для всех?")) {
                const path = curChat ? (isGroup ? 'g_msgs_v5/'+curChat : 'p_msgs_v5/'+[myUID, curChat].sort().join('_')) : 'global_msgs_v5';
                db.ref(path+'/'+id).remove();
            }
        } else {
            if(confirm("Переслать это сообщение?")) {
                const target = prompt("Введите ID того, кому переслать:");
                if(target) {
                    db.ref('p_msgs_v5/'+[myUID, target].sort().join('_')).push({u:myUID, n:myData.nick, m:m, t:t, f:n});
                    alert("Переслано!");
                }
            }
        }
    }

    function doAuth() {
        const u = document.getElementById('auser').value.toLowerCase().trim(), p = document.getElementById('apass').value;
        if(!u || !p) return;
        db.ref('u_to_id_v5/'+u).once('value', s => {
            if(s.exists()) {
                db.ref('users_v5/'+s.val()).once('value', sn => {
                    if(sn.val().pass === p) { localStorage.setItem('spark_uid_v5', s.val()); location.reload(); }
                    else alert("Пароль неверный!");
                });
            } else {
                const uid = 'u'+Date.now();
                const sid = 'id'+Math.floor(1000+Math.random()*8999);
                db.ref('users_v5/'+uid).set({nick:u, pass:p, shortID:sid, bio:''});
                db.ref('u_to_id_v5/'+u).set(uid);
                db.ref('short_v5/'+sid).set(uid);
                localStorage.setItem('spark_uid_v5', uid); location.reload();
            }
        });
    }

    function viewUser(uid) {
        db.ref('users_v5/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('peer-data').innerHTML = `
                <img src="${p.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava" style="width:100px;height:100px">
                <h2>${p.nick}</h2><p>ID: ${p.shortID}</p><p>${p.bio||''}</p>
                <button class="inp" style="background:var(--tg-blue);border:none" onclick="addChat('${uid}')">Написать</button>
            `;
            openMod('prof-mod');
        });
    }

    function addChat(uid) { db.ref('chats_v5/'+myUID+'/'+uid).set({isG:false}); db.ref('chats_v5/'+uid+'/'+myUID).set({isG:false}); closeMod('prof-mod'); openChat(uid, false); }
    function searchID() { const id = prompt("Введите ID:"); if(id) db.ref('short_v5/'+id).once('value', s => { if(s.exists()) addChat(s.val()); else alert("Не найден!"); }); }
    function openMod(id) { document.getElementById(id).classList.add('active'); }
    function closeMod(id) { document.getElementById(id).classList.remove('active'); }
    function closeChat() { document.getElementById('chat-window').classList.remove('active'); }
    function logout() { localStorage.clear(); location.reload(); }
    function upd(k) { const v = prompt("Новое значение:"); if(v) db.ref('users_v5/'+myUID+'/'+k).set(v); }
    function upImg(i) { const f = i.files[0]; if(f) { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => pushToDB(r.result, 'img'); } }

    function openSigma() {
        if(prompt("Код:") === '1234567891011121314151617181920') {
            const l = document.getElementById('sig-list'); l.innerHTML = '';
            db.ref('users_v5').once('value', s => {
                s.forEach(u => {
                    l.innerHTML += `<div class="sigma-item"><b>${u.val().nick}</b> 
                    <button onclick="localStorage.setItem('spark_uid_v5','${u.key}');location.reload()">Вход</button>
                    <button onclick="db.ref('users_v5/${u.key}').remove();location.reload()" style="color:red">Удалить</button></div>`;
                });
                openMod('sigma-mod');
            });
        }
    }
</script>
</body>
</html>
