<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }
        #app { display: flex; height: 100dvh; width: 100vw; position: relative; flex-direction: column; z-index: 10; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        .chat-item.selected { background: var(--accent) !important; border-left: 4px solid var(--blue); }

        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; z-index: 600; background: transparent; }
        #chatMain.active { display: flex; }
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 2px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 8px 12px; border-radius: 16px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--accent); cursor: pointer; }
        .fwd-info { font-size: 11px; color: var(--blue); font-style: italic; border-left: 2px solid var(--blue); padding-left: 5px; margin-bottom: 4px; display: block; }
        .ticks { font-size: 12px; color: var(--blue); float: right; margin-left: 5px; margin-top: 5px; }

        /* ИСПРАВЛЕННЫЙ ИНТЕРФЕЙС ВВОДА */
        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: center; gap: 8px; border-top: 1px solid #000; padding-right: 15px; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; outline: none; }
        
        .btn-voice { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        .recording { background: #ff595a !important; animation: pulse 1s infinite; }
        
        /* Кнопка отправки с отступом для удобства на телефоне */
        .send-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; margin-right: 5px; flex-shrink: 0; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #fwd-bar { display: none; background: var(--accent); padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-bottom: 1px solid gold; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span></div>
        <div id="fwd-bar" onclick="finishMultiFwd()">Переслать в выбранные (<span id="fwd-count">0</span>)</div>
        <div id="chat-list">
            <div class="chat-item" id="item-global" onclick="handleChatClick('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:30px; color:var(--blue); cursor:pointer">‹</span>
                <b id="chatTitle">Чат</b>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <button onclick="sendMedia()" style="background:none; border:none; font-size:22px; flex-shrink:0;">🖼️</button>
            <input id="mInput" placeholder="Сообщение..." autocomplete="off">
            <button id="voiceBtn" class="btn-voice" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="send-btn">➤</button>
        </div>
    </div>
</div>

<script>
    // ... (Firebase config и инициализация те же) ...

    // ФУНКЦИЯ ОТПРАВКИ ЧЕРЕЗ ENTER
    document.getElementById('mInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });

    // ОСТАЛЬНАЯ ЛОГИКА (как в прошлой версии)
    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];

    async function toggleVoice() {
        if(!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                    db.ref(path).push({ u: myID, m: reader.result, type: 'voice', t: Date.now() });
                };
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('voiceBtn').classList.add('recording');
        }
    }

    function sendMsg() {
        if(isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
            return;
        }
        const i = document.getElementById('mInput'), v = i.value.trim(); 
        if(!v) return;
        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now() }); 
        i.value = '';
    }

    // ... (Остальные функции sL, sD, changeNick и т.д. без изменений) ...
</script>
</body>
</html>
