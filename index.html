<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark | Ultimate Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* Фоновый слой для обоев */
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; pointer-events: none; z-index: 0; transition: 0.5s; }

        #app { display: none; height: 100vh; width: 100vw; position: relative; z-index: 1; display: flex; }
        
        /* Боковая панель */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        .header b { color: var(--blue); font-size: 20px; }

        /* Список чатов */
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); transition: 0.2s; }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        /* Сообщения */
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; align-items: flex-end; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-content-box { display: flex; flex-direction: column; max-width: 100%; }
        .msg-author { font-size: 12px; color: var(--blue); font-weight: bold; margin-bottom: 2px; cursor: pointer; }
        .my .msg-author { text-align: right; }

        .msg-bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; cursor: pointer; position: relative; word-wrap: break-word; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .fwd-mark { font-size: 10px; opacity: 0.6; font-style: italic; margin-bottom: 2px; display: block; }

        /* Ввод */
        .input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 18px; border-radius: 25px; }

        /* Модалки */
        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 5000; }
        .full-modal.active { display: flex; }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: var(--panel); border-bottom: 1px solid #000; }

        @media (max-width: 768px) {
            .side-panel { position: fixed; inset: 0; width: 100%; }
            .chat-main { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s; z-index: 100; }
            .chat-main.active { transform: translateX(0); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="wall-layer"></div>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:30px; border-radius:25px; text-align:center; width:300px">
            <h1 style="color:var(--blue)">Spark</h1>
            <input id="logNick" placeholder="Ник" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#242f3d; color:white">
            <input id="logPass" type="password" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:none; background:#242f3d; color:white">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); border:none; border-radius:10px; color:white; font-weight:bold">Войти / Создать</button>
        </div>
    </div>

    <div id="settings-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('settings-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
        <div style="flex:1; overflow-y:auto; padding:20px; text-align:center;">
            <img id="setAva" class="ava-mini" style="width:120px; height:120px; border:3px solid var(--blue); margin-bottom:15px" onclick="updateAva()">
            <h2 id="setNick" onclick="updateNick()">Ник</h2>
            <p id="setBio" onclick="updateBio()" style="color:var(--text-dim)">О себе...</p>
            <button onclick="updateWall()" style="background:var(--accent); color:white; border:none; width:100%; padding:12px; border-radius:12px; margin-top:20px">🖼️ Поменять обои</button>
            <button onclick="checkAdmin()" style="background:linear-gradient(45deg, #ffd700, #ffa500); color:black; border:none; width:100%; padding:12px; border-radius:12px; margin-top:10px; font-weight:900">Σ SIGMA ПАНЕЛЬ</button>
            <button onclick="logout()" style="background:#ff5252; color:white; border:none; width:100%; padding:12px; border-radius:12px; margin-top:10px">Выйти</button>
        </div>
    </div>

    <div id="profile-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('profile-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
        <div style="padding:20px; text-align:center;">
            <img id="pAva" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--blue)">
            <h2 id="pNick">...</h2>
            <p id="pBio" style="color:var(--text-dim)">...</p>
            <button id="pWriteBtn" style="background:var(--blue); color:white; border:none; width:100%; padding:12px; border-radius:12px; margin-top:20px">Написать</button>
        </div>
    </div>

    <div id="forward-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('forward-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Переслать в...</b></div>
        <div id="forward-list" style="overflow-y:auto"></div>
    </div>

    <div id="admin-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('admin-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Sigma Admin</b></div>
        <div id="admin-list" style="overflow-y:auto; padding:10px"></div>
    </div>

    <div id="app">
        <div class="side-panel">
            <div class="header"><b>Spark</b><span onclick="openSettings()" style="cursor:pointer; font-size:24px">⚙️</span></div>
            <div id="chat-list"></div>
        </div>
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:30px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Чат</b>
                </div>
            </div>
            <div id="msgs-container"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:20px; color:white">🖼️</button>
                <input id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button id="micBtn" style="background:none; border:none; font-size:20px">🎤</button>
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:40px; height:40px; border-radius:50%; color:white; cursor:pointer">➤</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;
        let forwardMsg = null;

        window.onload = () => { if(!myID) document.getElementById('auth-screen').style.display='flex'; else initApp(); };

        async function handleAuth() {
            const n = document.getElementById('logNick').value.trim(), p = document.getElementById('logPass').value;
            if(!n) return;
            const s = await db.ref('nick_to_id/'+n).once('value');
            if(s.val()) {
                const pr = (await db.ref('profiles/'+s.val()).once('value')).val();
                if(pr.pass !== p) return alert("Неверный пароль!");
                save(s.val());
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick: n, pass: p, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "Spark User", id });
                await db.ref('nick_to_id/'+n).set(id);
                save(id);
            }
        }
        function save(id) { localStorage.setItem('chat_id', id); location.reload(); }

        function initApp() {
            document.getElementById('app').style.display='flex';
            applyWallpaper();
            renderList();
            openChat('global');
            setupVoice();
        }

        function applyWallpaper() {
            db.ref('profiles/'+myID+'/wallpaper').on('value', s => {
                if(s.val()) document.getElementById('wall-layer').style.backgroundImage = `url(${s.val()})`;
            });
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val(); if(!p) return;
                        let ex = document.getElementById('item-'+p.id); if(ex) ex.remove();
                        const div = document.createElement('div');
                        div.className = 'chat-item'; div.id = 'item-'+p.id;
                        div.innerHTML = `<img src="${p.ava}" class="ava-mini" onclick="openChat('${p.id}')"><b style="flex:1" onclick="openChat('${p.id}')">${p.nick}</b><span onclick="deleteChat('${p.id}', event)">🗑️</span>`;
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) document.getElementById('chatMain').classList.add('active');
            
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = ''; // Моментальная очистка
            
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            
            // Сбрасываем старых слушателей перед открытием нового
            db.ref(path).off(); 
            
            if(curPeer) {
                db.ref('profiles/'+id).once('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            } else {
                document.getElementById('chatTitle').innerText = 'Общий чат';
            }
            
            listenMsgs(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val(); const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                
                let content = d.m;
                if(d.type === 'voice') content = `<audio src="${d.m}" controls style="height:35px; filter:invert(1)"></audio>`;
                else if(content.startsWith('http')) content = `<img src="${content}" style="max-width:220px; border-radius:12px; display:block">`;

                div.innerHTML = `
                    <img src="" class="ava-mini img-${d.u}" style="width:32px; height:32px; cursor:pointer" onclick="showProfile('${d.u}')">
                    <div class="msg-content-box">
                        <span class="msg-author nick-${d.u}" onclick="showProfile('${d.u}')">...</span>
                        <div class="msg-bubble" onclick="askForward('${d.m.replace(/'/g,"\\'")}', '${d.u}', '${d.type}')">
                            ${d.f ? `<span class="fwd-mark">Переслано от ${d.f}</span>` : ''}
                            ${content}
                        </div>
                    </div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
                
                // Подгружаем инфо об авторе сообщения
                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val(); if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
        }

        function askForward(text, authorID, type) {
            db.ref('profiles/'+authorID).once('value', s => {
                forwardMsg = { m: text, type: type, f: s.val() ? s.val().nick : 'Аноним' };
                const flist = document.getElementById('forward-list');
                flist.innerHTML = `<div class="chat-item" onclick="doForward('global')">🌐 Общий чат</div>`;
                db.ref('friends/'+myID).once('value', s => {
                    s.forEach(c => {
                        db.ref('profiles/'+c.key).once('value', ps => {
                            flist.innerHTML += `<div class="chat-item" onclick="doForward('${c.key}')">👤 ${ps.val().nick}</div>`;
                        });
                    });
                });
                openModal('forward-modal');
            });
        }

        function doForward(toID) {
            const path = toID === 'global' ? 'messages' : 'privates/'+[myID, toID].sort().join('_');
            db.ref(path).push({ u: myID, m: forwardMsg.m, type: forwardMsg.type, f: forwardMsg.f, t: Date.now() });
            closeModal('forward-modal');
            alert("Переслано!");
        }

        function showProfile(uid) {
            db.ref('profiles/'+uid).once('value', s => {
                const p = s.val();
                document.getElementById('pAva').src = p.ava;
                document.getElementById('pNick').innerText = p.nick;
                document.getElementById('pBio').innerText = p.bio;
                document.getElementById('pWriteBtn').onclick = () => {
                    db.ref('friends/'+myID+'/'+uid).set(true);
                    db.ref('friends/'+uid+'/'+myID).set(true);
                    openChat(uid); closeModal('profile-modal');
                };
                openModal('profile-modal');
            });
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, type: 'text', t: Date.now() });
            i.value = '';
        }

        function checkAdmin() {
            let p = prompt("Пароль Sigma:");
            if(p === "1234567891011121314151617181920") {
                openModal('admin-modal');
                const list = document.getElementById('admin-list');
                db.ref('profiles').on('value', s => {
                    list.innerHTML = '';
                    s.forEach(user => {
                        const u = user.val();
                        list.innerHTML += `<div class="chat-item"><b>${u.nick}</b> <button onclick="loginAs('${u.id}')">Вход</button></div>`;
                    });
                });
            }
        }

        function loginAs(uid) { localStorage.setItem('chat_id', uid); location.reload(); }
        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                document.getElementById('setBio').innerText = p.bio;
                openModal('settings-modal');
            });
        }

        function setupVoice() {
            let mr, ch = [];
            const b = document.getElementById('micBtn');
            b.onmousedown = b.ontouchstart = async (e) => {
                e.preventDefault();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(s);
                ch = []; mr.ondataavailable = e => ch.push(e.data);
                mr.onstop = () => {
                    const r = new FileReader(); r.readAsDataURL(new Blob(ch));
                    r.onloadend = () => {
                        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                        db.ref(path).push({ u: myID, m: r.result, type: 'voice', t: Date.now() });
                    };
                };
                mr.start(); b.style.color = 'red';
            };
            window.onmouseup = window.ontouchend = () => { if(mr) { mr.stop(); b.style.color = 'white'; } };
        }

        function updateWall() { let u = prompt("Ссылка на фото:"); if(u) db.ref('profiles/'+myID+'/wallpaper').set(u); }
        function updateAva() { let a = prompt("URL авы:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function updateNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
        function updateBio() { let b = prompt("Био:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function sendMedia() { let u = prompt("URL фото:"); if(u) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, type: 'text', t: Date.now() }); } }
        function deleteChat(uid, e) {
            e.stopPropagation();
            if(confirm("Удалить?")) {
                db.ref('privates/'+[myID, uid].sort().join('_')).remove();
