<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Secure</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 1; pointer-events: none; }
        #app { position: relative; display: flex; height: 100dvh; width: 100vw; flex-direction: column; z-index: 5; }

        /* Auth Styles */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #242f3d; color: white; outline: none; }
        .auth-box button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
        .auth-link { color: var(--blue); margin-top: 15px; font-size: 14px; cursor: pointer; display: block; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: transparent; position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; width: fit-content; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; position: relative; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; cursor: pointer; }
        .status-tick { font-size: 11px; margin-left: 6px; color: var(--blue); }
        #chatSubtitle { font-size: 11px; color: var(--blue); }

        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: flex-end; gap: 8px; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 10px 15px; border-radius: 18px; outline: none; resize: none; max-height: 120px; min-height: 40px; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .setting-row { padding: 18px 20px; border-bottom: 1px solid #1c2835; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #ff595a; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="auth-screen" style="display: none;">
    <div class="auth-box" id="login-form">
        <h2>Вход в Spark</h2>
        <input type="text" id="log-user" placeholder="Логин">
        <input type="password" id="log-pass" placeholder="Пароль">
        <button onclick="handleLogin()">Войти</button>
        <span class="auth-link" onclick="toggleAuth(false)">Нет аккаунта? Регистрация</span>
    </div>
    <div class="auth-box" id="reg-form" style="display: none;">
        <h2>Регистрация</h2>
        <input type="text" id="reg-user" placeholder="Придумайте логин">
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <button onclick="handleReg()">Создать аккаунт</button>
        <span class="auth-link" onclick="toggleAuth(true)">Уже есть аккаунт? Войти</span>
    </div>
</div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span></div>
        <div id="chat-list" style="flex:1; overflow-y:auto">
            <div class="chat-item" id="item-global" onclick="openChat(null)">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:35px; color:var(--blue); cursor:pointer;">‹</span>
                <div><b id="chatTitle">Чат</b><br><span id="chatSubtitle">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <textarea id="mInput" placeholder="Сообщение..." rows="1"></textarea>
            <button onclick="sendMsg()" class="btn-action" style="background:none; border:none; color:var(--blue); font-size:28px;">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="setting-row" onclick="changeNick()">👤 Изменить ник <span id="st-nick"></span></div>
    <div class="setting-row" onclick="changePass()">🔑 Сменить пароль</div>
    <div class="setting-row" onclick="changeAva()">🖼️ Аватарка</div>
    <div class="setting-row" onclick="changeBio()">📝 О себе</div>
    <div class="setting-row" style="background:gold; color:black;" onclick="checkSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="setting-row" onclick="logout()" style="color:red">🚪 Выйти</div>
</div>

<div id="sigma-modal" class="modal">
    <div class="header"><span onclick="toggleModal('sigma-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b style="color:gold">SIGMA CONTROL</b></div>
    <div id="sigma-list" style="flex:1; overflow-y:auto"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;

    window.onload = () => {
        if (!myID) {
            document.getElementById('auth-screen').style.display = 'flex';
        } else {
            startApp();
        }
    };

    function toggleAuth(showLogin) {
        document.getElementById('login-form').style.display = showLogin ? 'block' : 'none';
        document.getElementById('reg-form').style.display = showLogin ? 'none' : 'block';
    }

    // РЕГИСТРАЦИЯ
    function handleReg() {
        const user = document.getElementById('reg-user').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!user || !pass) return alert("Заполните все поля");

        db.ref('nick_to_id/' + user).once('value', s => {
            if (s.exists()) {
                alert("Этот логин уже занят!");
            } else {
                const id = "u" + Date.now();
                db.ref('profiles/' + id).set({
                    nick: user,
                    pass: pass,
                    id: id,
                    ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png",
                    bio: "Новичок в Spark"
                });
                db.ref('nick_to_id/' + user).set(id);
                localStorage.setItem('chat_id', id);
                location.reload();
            }
        });
    }

    // ВХОД
    function handleLogin() {
        const user = document.getElementById('log-user').value.trim().toLowerCase();
        const pass = document.getElementById('log-pass').value.trim();

        db.ref('nick_to_id/' + user).once('value', s => {
            if (s.exists()) {
                const id = s.val();
                db.ref('profiles/' + id).once('value', p => {
                    if (p.val().pass === pass) {
                        localStorage.setItem('chat_id', id);
                        location.reload();
                    } else {
                        alert("Неверный пароль!");
                    }
                });
            } else {
                alert("Пользователь не найден!");
            }
        });
    }

    function startApp() {
        db.ref('status/' + myID).set({ state: 'online' });
        db.ref('status/' + myID).onDisconnect().set({ state: 'offline' });

        db.ref('profiles/' + myID).on('value', s => {
            if(s.val()) document.getElementById('st-nick').innerText = s.val().nick;
        });

        // Загрузка списка друзей/чатов
        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            const global = document.getElementById('item-global');
            list.innerHTML = ''; list.appendChild(global);
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    if(p.val()){
                        const div = document.createElement('div'); div.className = 'chat-item';
                        div.innerHTML = `<img src="${p.val().ava}" class="ava-msg"><b>${p.val().nick}</b>`;
                        div.onclick = () => openChat(p.val().id);
                        list.appendChild(div);
                    }
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        
        // Система онлайн
        if(!curPeer) {
            db.ref('status').on('value', s => {
                let c = 0; s.forEach(u => { if(u.val().state === 'online') c++; });
                document.getElementById('chatSubtitle').innerText = c + " онлайн";
            });
        } else {
            db.ref('status/'+curPeer).on('value', s => {
                document.getElementById('chatSubtitle').innerText = s.val()?.state === 'online' ? 'в сети' : 'офлайн';
            });
        }

        const cont = document.getElementById('msgs-container');
        cont.innerHTML = ''; db.ref(path).off();
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            row.innerHTML = `<div class="bubble">${m.m}${isMy ? `<span class="status-tick">${m.read ? '✔✔' : '✔'}</span>`:''}</div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            if(!isMy && !m.read) db.ref(path+'/'+snap.key).update({read:true});
        });
    }

    function checkSigma() {
        if(prompt("Код Sigma:") === '1234567891011121314151617181920') {
            toggleModal('settings-modal', false);
            toggleModal('sigma-modal', true);
            loadSigma();
        }
    }

    function loadSigma() {
        const list = document.getElementById('sigma-list');
        list.innerHTML = '';
        db.ref('profiles').once('value', s => {
            s.forEach(u => {
                const p = u.val();
                const d = document.createElement('div');
                d.className = 'setting-row';
                d.innerHTML = `<span>${p.nick}</span> 
                <div>
                    <button onclick="loginAs('${u.key}')">Вход</button>
                    <button class="btn-del" onclick="deleteUser('${u.key}', '${p.nick}')">Удалить</button>
                </div>`;
                list.appendChild(d);
            });
        });
    }

    function deleteUser(id, nick) {
        if(confirm("Удалить пользователя " + nick + " навсегда?")) {
            db.ref('profiles/' + id).remove();
            db.ref('nick_to_id/' + nick.toLowerCase()).remove();
            db.ref('friends/' + id).remove();
            loadSigma();
        }
    }

    function loginAs(id) { localStorage.setItem('chat_id', id); location.reload(); }
    function changePass() { let p = prompt("Новый пароль:"); if(p) db.ref('profiles/'+myID+'/pass').set(p); }
    function logout() { localStorage.clear(); location.reload(); }
    function toggleModal(id, s) { document.getElementById(id).classList.toggle('active', s); }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function sendMsg() {
        const v = document.getElementById('mInput').value.trim(); if(!v) return;
        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now(), read: false });
        document.getElementById('mInput').value = '';
    }
    // Функции смены аватарок, био и т.д. остаются как были
    function changeNick() { let n = prompt("Новый ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    function changeAva() { let a = prompt("URL аватарки:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function changeBio() { let b = prompt("О себе:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
</script>
</body>
                                                                                                                      </html>
