<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiteGram Imbo Evolution</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* --- ЭКРАНЫ --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 10000; }
        #app { display: none; height: 100vh; width: 100vw; }

        /* --- АВТОРИЗАЦИЯ --- */
        .auth-card { background: var(--panel); padding: 30px; border-radius: 24px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; margin-bottom: 12px; background: #242f3d; border: 1px solid var(--accent); color: white; padding: 14px; border-radius: 12px; }
        .auth-card button { width: 100%; padding: 14px; background: var(--blue); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }

        /* --- ЛЕЙАУТ --- */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; transition: 0.3s; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; transition: 0.3s; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; z-index: 100; }
        .header b { color: var(--blue); font-size: 18px; }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); }

        /* --- СООБЩЕНИЯ --- */
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 14px; border-radius: 18px; position: relative; font-size: 15px; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .msg-bubble b { display: block; font-size: 12px; color: var(--blue); margin-bottom: 3px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* --- ВВОД --- */
        .input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px; border-radius: 20px; outline: none; }
        .send-btn { background: var(--blue); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; }

        /* --- МОДАЛКИ --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 20000; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 24px; width: 90%; max-width: 350px; text-align: center; }
        .big-ava { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue); margin-bottom: 15px; cursor: pointer; }

        /* --- МОБИЛЬНОСТЬ --- */
        @media (max-width: 768px) {
            .side-panel { position: fixed; inset: 0; width: 100%; z-index: 500; }
            .chat-main { position: fixed; inset: 0; width: 100%; z-index: 600; transform: translateX(100%); }
            .chat-main.active { transform: translateX(0); }
            #backBtn { display: block !important; }
        }
        #backBtn { display: none; font-size: 24px; color: var(--blue); cursor: pointer; margin-right: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2>LiteGram</h2>
            <input type="text" id="logNick" placeholder="Никнейм">
            <input type="password" id="logPass" placeholder="Пароль">
            <button onclick="handleAuth()">Войти / Создать</button>
            <p id="authErr" style="color:red; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="setAva" class="big-ava" onclick="updateAva()">
            <h3 id="setNick" onclick="updateNick()" style="cursor:pointer">Ник</h3>
            <p id="setBio" onclick="updateBio()" style="color:var(--text-dim); cursor:pointer">О себе...</p>
            <hr style="border:0; border-top:1px solid #242f3d; margin:15px 0">
            <button onclick="logout()" style="background:#ff5252; color:white; border:none; padding:10px; width:100%; border-radius:10px;">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="profile-modal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="pAva" class="big-ava">
            <h3 id="pNick">Ник</h3>
            <p id="pBio" style="color:var(--text-dim)"></p>
            <button id="pWriteBtn" style="background:var(--blue); color:white; border:none; padding:10px; width:100%; border-radius:10px;">Написать сообщение</button>
        </div>
    </div>

    <div id="img-overlay" class="modal" onclick="this.style.display='none'"><img id="fullImg" style="max-width:95%; max-height:95%"></div>

    <div id="app">
        <div class="side-panel">
            <div class="header"><b>LiteGram</b><span onclick="openSettings()" style="cursor:pointer; font-size:20px">⚙️</span></div>
            <div id="chat-list" style="overflow-y:auto; flex:1"></div>
        </div>
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span id="backBtn" onclick="closeChat()">‹</span>
                    <b id="chatTitle">Общий чат</b>
                </div>
                <div id="chatStatus" style="font-size:12px; color:var(--text-dim)">online</div>
            </div>
            <div id="msgs-container"></div>
            <div id="typing-disk" style="height:20px; padding:0 15px; font-size:12px; color:var(--blue); font-style:italic"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:20px">🖼️</button>
                <input type="text" id="mInput" placeholder="Сообщение...">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;
        const defAva = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        window.onload = () => {
            if (!myID) document.getElementById('auth-screen').style.display = 'flex';
            else initApp();
        };

        async function handleAuth() {
            const nick = document.getElementById('logNick').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            if(!nick) return;
            const snap = await db.ref('nick_to_id/' + nick).once('value');
            const eid = snap.val();
            if(eid) {
                const p = (await db.ref('profiles/'+eid).once('value')).val();
                if(p.pass && p.pass !== pass) {
                    document.getElementById('authErr').innerText = "Неверный пароль!";
                    return;
                }
                save(eid);
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick, pass, ava: defAva, bio: "О себе...", id });
                await db.ref('nick_to_id/'+nick).set(id);
                save(id);
            }
        }
        function save(id) { localStorage.setItem('chat_id', id); location.reload(); }

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            renderList();
            openChat('global');
            
            // Логика печатает
            const inp = document.getElementById('mInput');
            inp.oninput = () => {
                let p = curPeer ? `typing/privates/${curPeer}/${myID}` : `typing/global/${myID}`;
                db.ref(p).set(Date.now());
            };
            inp.onkeypress = (e) => { if(e.key==='Enter') sendMsg(); };
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><div><b>Общий чат</b></div></div>`;
            
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val();
                        if(!p) return;
                        let existing = document.getElementById('item-'+p.id);
                        if(existing) existing.remove();
                        const div = document.createElement('div');
                        div.className = 'chat-item'; div.id = 'item-'+p.id;
                        div.onclick = () => openChat(p.id);
                        div.innerHTML = `<img src="${p.ava}" class="ava-mini"><div><b>${p.nick}</b><br><span style="font-size:12px;color:gray">Личный чат</span></div>`;
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) document.getElementById('chatMain').classList.add('active');
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            
            if(curPeer) {
                db.ref('profiles/'+id).on('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            } else {
                document.getElementById('chatTitle').innerText = 'Общий чат';
            }
            listenMsgs(path);
            watchTyping();
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = ''; db.ref(path).off();
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val();
                const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                let m = d.m;
                if(m.startsWith('http')) m = `<img src="${m}" class="msg-img" onclick="fullImg('${m}')">`;
                div.innerHTML = `<img src="${defAva}" class="ava-mini img-${d.u}" onclick="showProfile('${d.u}')"><div class="msg-bubble"><b class="nick-${d.u}" onclick="showProfile('${d.u}')">...</b>${m}</div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val();
                    if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
        }

        function watchTyping() {
            const path = curPeer ? `typing/privates/${myID}` : `typing/global`;
            db.ref(path).on('value', s => {
                const now = Date.now(); let typers = [];
                s.forEach(u => { if(u.key !== myID && now - u.val() < 3000) typers.push(u.key); });
                document.getElementById('typing-disk').innerText = typers.length ? 'Кто-то печатает...' : '';
                if(!curPeer) return;
                document.getElementById('chatStatus').innerText = (typers.includes(curPeer)) ? 'печатает...' : 'online';
            });
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, t: Date.now() });
            i.value = '';
        }

        function sendMedia() {
            const url = prompt("Ссылка на фото:");
            if(url) {
                const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                db.ref(path).push({ u: myID, m: url, t: Date.now() });
            }
        }

        function showProfile(uid) {
            db.ref('profiles/'+uid).once('value', s => {
                const p = s.val();
                document.getElementById('pAva').src = p.ava;
                document.getElementById('pNick').innerText = p.nick;
                document.getElementById('pBio').innerText = p.bio;
                document.getElementById('pWriteBtn').onclick = () => {
                    db.ref('friends/'+myID+'/'+uid).set(true);
                    db.ref('friends/'+uid+'/'+myID).set(true);
                    openChat(uid);
                    document.getElementById('profile-modal').style.display='none';
                };
                document.getElementById('profile-modal').style.display='flex';
            });
        }

        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                document.getElementById('setBio').innerText = p.bio;
                document.getElementById('settings-modal').style.display='flex';
            });
        }

        function updateAva() { let a = prompt("Ссылка на фото:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function updateNick() { let n = prompt("Новый ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
        function updateBio() { let b = prompt("О себе:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
        function logout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function fullImg(u) { document.getElementById('fullImg').src = u; document.getElementById('img-overlay').style.display='flex'; }
    </script>
</body>
</html>
