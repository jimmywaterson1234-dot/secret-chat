<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Sigma Classic</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }
        #app { display: flex; height: 100dvh; width: 100vw; position: relative; flex-direction: column; z-index: 10; }

        /* Шапка */
        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        .header b { font-size: 18px; }

        /* Список чатов */
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        .ava-msg { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); }

        /* Окно чата */
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; z-index: 600; background: transparent; }
        #chatMain.active { display: flex; }
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        /* Сообщения (Пузыри) */
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 2px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { 
            padding: 8px 12px; border-radius: 16px; font-size: 15px; position: relative; word-wrap: break-word; 
            display: flex; flex-direction: column;
        }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }

        .msg-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; align-self: flex-end; }
        .msg-time { font-size: 10px; opacity: 0.6; }
        .ticks { font-size: 12px; color: var(--blue); line-height: 1; }

        .msg-author { font-size: 12px; color: var(--blue); font-weight: bold; margin-bottom: 2px; }

        /* Ввод */
        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: center; gap: 10px; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; outline: none; }

        /* Модалки */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .setting-row { padding: 20px; border-bottom: 1px solid #1c2835; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        /* Сигма-карточки */
        .sigma-card { background: #1c2835; margin: 10px; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; }
        .s-btns { margin-left: auto; display: flex; gap: 8px; }
        .s-btn { padding: 7px 12px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="app">
    <div id="sidePanel">
        <div class="header">
            <b>Spark Sigma</b>
            <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span>
        </div>
        <div id="chat-list">
            <div class="chat-item" onclick="openChat('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
            </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:30px; color:var(--blue); cursor:pointer">‹</span>
                <b id="chatTitle">Чат</b>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
            <input id="mInput" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendMsg()" style="background:none; border:none; font-size:24px">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px">✕</span><b>Настройки</b></div>
    <div style="flex:1; overflow-y:auto">
        <div class="setting-row" onclick="changeNick()"><span>👤 Изменить ник</span><span id="st-nick" style="color:var(--blue)"></span></div>
        <div class="setting-row" onclick="changeAva()"><span>🖼️ Изменить аватарку</span></div>
        <div class="setting-row" onclick="changeWall()"><span>🌌 Поставить обои</span></div>
        
        <div class="setting-row" style="background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; font-weight: bold;" onclick="checkSigma()">
            <span>⚡ СИГМА ПАНЕЛЬ</span><span>⭐</span>
        </div>

        <div class="setting-row" onclick="location.reload()"><span>🔄 Перезагрузить</span></div>
        <div class="setting-row" onclick="localStorage.clear(); location.reload();" style="color:#ff595a"><span>🚪 Выйти</span></div>
    </div>
</div>

<div id="sigma-modal" class="modal">
    <div class="header"><span onclick="toggleModal('sigma-modal', false)" style="font-size:30px">✕</span><b style="color:gold">SIGMA PANEL</b></div>
    <div id="sigma-list" style="flex:1; overflow-y:auto; padding-top:10px"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;

    window.onload = () => { 
        if(localStorage.getItem('spark_wall')) document.getElementById('wall-layer').style.backgroundImage = `url(${localStorage.getItem('spark_wall')})`;
        if(myID) startApp(); else auth(); 
    };

    function auth() {
        let n = prompt("Твой ник:");
        if(!n) return auth();
        db.ref('nick_to_id/'+n).once('value', s => {
            let id = s.val() || Date.now().toString();
            if(!s.val()) {
                db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id});
                db.ref('nick_to_id/'+n).set(id);
            }
            localStorage.setItem('chat_id', id); location.reload();
        });
    }

    function startApp() {
        document.getElementById('app').style.display = 'flex';
        db.ref('profiles/'+myID).on('value', s => { if(s.val()) document.getElementById('st-nick').innerText = s.val().nick; });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+id : 'messages';
        const cont = document.getElementById('msgs-container');
        cont.innerHTML = '';
        db.ref(path).off();
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div');
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            let content = m.m.startsWith('http') ? `<img src="${m.m}" style="max-width:220px; border-radius:12px; display:block">` : m.m;
            
            row.innerHTML = `
                <img src="" class="ava-msg i-${m.u}">
                <div style="display:flex; flex-direction:column">
                    <span class="msg-author n-${m.u}"></span>
                    <div class="bubble">
                        ${content}
                        <div class="msg-info">
                            <span class="msg-time">${new Date(m.t).getHours()}:${String(new Date(m.t).getMinutes()).padStart(2,'0')}</span>
                            ${isMy ? '<span class="ticks">✔✔</span>' : ''}
                        </div>
                    </div>
                </div>`;
            cont.appendChild(row);
            cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).on('value', s => {
                if(s.val()){ document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=s.val().ava); document.querySelectorAll('.n-'+m.u).forEach(n=>n.innerText=s.val().nick); }
            });
        });
    }

    // СИГМА ЛОГИКА
    function checkSigma() {
        let p = prompt("Пароль:");
        if(p === 'сигма' || p === '123') {
            toggleModal('settings-modal', false);
            toggleModal('sigma-modal', true);
            loadSigmaUsers();
        }
    }

    function loadSigmaUsers() {
        const list = document.getElementById('sigma-list');
        list.innerHTML = '';
        db.ref('profiles').once('value', s => {
            s.forEach(u => {
                const p = u.val();
                const div = document.createElement('div');
                div.className = 'sigma-card';
                div.innerHTML = `
                    <img src="${p.ava}" class="ava-msg">
                    <div><b>${p.nick}</b></div>
                    <div class="s-btns">
                        <button class="s-btn" style="background:var(--blue)" onclick="sLogin('${u.key}')">Вход</button>
                        <button class="s-btn" style="background:#ff595a" onclick="sDel('${u.key}', '${p.nick}')">Удалить</button>
                    </div>`;
                list.appendChild(div);
            });
        });
    }

    function sLogin(id) { localStorage.setItem('chat_id', id); location.reload(); }
    function sDel(id, name) { if(confirm("Удалить "+name+"?")) { db.ref('profiles/'+id).remove(); db.ref('nick_to_id/'+name).remove(); loadSigmaUsers(); } }

    // ДЕЙСТВИЯ
    function sendMsg() {
        const i = document.getElementById('mInput'), v = i.value.trim();
        if(!v) return;
        const p = curPeer ? 'privates/'+curPeer : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now() });
        i.value = '';
    }

    function changeNick() { let n = prompt("Новый ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    function changeAva() { let a = prompt("Ссылка на аву:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function changeWall() { let w = prompt("Ссылка на обои:"); if(w) { localStorage.setItem('spark_wall', w); document.getElementById('wall-layer').style.backgroundImage = `url(${w})`; } }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }
    function sendMedia() { let u = prompt("Ссылка на фото:"); if(u) { const p = curPeer ? 'privates/'+curPeer : 'messages'; db.ref(p).push({ u: myID, m: u, t: Date.now() }); } }
</script>
</body>
</html>
