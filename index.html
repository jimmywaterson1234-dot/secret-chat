<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }

        #app { display: none; height: 100vh; width: 100vw; position: relative; z-index: 1; }
        
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; height: 100%; position: relative; z-index: 100; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; height: 100%; z-index: 200; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        .header b { font-size: 18px; color: var(--blue); }
        .online-count { font-size: 12px; color: #4caf50; }

        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.2); transition: 0.2s; }
        .chat-item:active { background: rgba(255,255,255,0.05); }
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* АНИМАЦИЯ СООБЩЕНИЙ */
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; animation: msgSlide 0.3s ease-out; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 16px; font-size: 15px; position: relative; cursor: pointer; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        
        /* ГАЛОЧКИ */
        .ticks { font-size: 10px; margin-left: 5px; opacity: 0.7; float: right; margin-top: 5px; }

        #typing-indicator { font-size: 12px; color: var(--blue); padding: 5px 15px; height: 20px; font-style: italic; }

        @media (max-width: 768px) {
            .side-panel { width: 100%; position: absolute; inset: 0; }
            .chat-main { width: 100%; position: absolute; inset: 0; display: none; }
            .chat-main.active { display: flex; }
            .side-panel.hidden { display: none; }
        }

        .input-area { padding: 10px; background: var(--panel); display: flex; gap: 8px; align-items: center; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 15px; border-radius: 20px; font-size: 16px; }

        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; animation: modalFade 0.2s; }
        @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: var(--panel); border-bottom: 1px solid #000; }
    </style>
</head>
<body>

    <div id="wall-layer"></div>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:30px; border-radius:25px; text-align:center; width:85%; max-width:350px">
            <h1 style="color:var(--blue)">Spark</h1>
            <input id="logNick" placeholder="Ник" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; background:#242f3d; color:white">
            <input id="logPass" type="password" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:none; background:#242f3d; color:white">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); border:none; border-radius:10px; color:white; font-weight:bold">Войти</button>
        </div>
    </div>

    <div id="app">
        <div class="side-panel" id="sidePanel">
            <div class="header">
                <div><b>Spark</b> <br> <span class="online-count" id="online-val">0 online</span></div>
                <span onclick="openSettings()" style="font-size:24px; cursor:pointer; padding:5px;">⚙️</span>
            </div>
            <div id="chat-list"></div>
        </div>
        
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:35px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Чат</b>
                </div>
            </div>
            <div id="msgs-container"></div>
            <div id="typing-indicator"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
                <input id="mInput" placeholder="Сообщение..." autocomplete="off" oninput="notifyTyping()">
                <button id="micBtn" style="background:none; border:none; font-size:22px">🎤</button>
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:40px; height:40px; border-radius:50%; color:white">➤</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('settings-modal')" style="font-size:30px">✕</span><b>Настройки</b></div>
        <div style="padding:20px; text-align:center">
            <img id="setAva" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--blue)" onclick="updateAva()">
            <h2 id="setNick" style="margin-top:10px">...</h2>
            <button onclick="updateWall()" style="width:100%; padding:14px; margin-top:20px; border-radius:10px; border:none; background:var(--accent); color:white">Обои</button>
            <button onclick="logout()" style="width:100%; padding:14px; margin-top:10px; border-radius:10px; border:none; background:#ff5252; color:white">Выйти</button>
        </div>
    </div>

    <div id="profile-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('profile-modal')" style="font-size:30px">✕</span><b>Профиль</b></div>
        <div id="profile-content" style="padding:20px; text-align:center"></div>
    </div>

    <div id="forward-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('forward-modal')" style="font-size:30px">✕</span><b>Переслать</b></div>
        <div id="forward-list"></div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;
        let selectedMsg = null;
        let typeTimeout;

        window.onload = () => { if(!myID) document.getElementById('auth-screen').style.display='flex'; else initApp(); };

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            // Онлайн
            const onlineRef = db.ref('online/'+myID);
            onlineRef.set(true); onlineRef.onDisconnect().remove();
            db.ref('online').on('value', s => { document.getElementById('online-val').innerText = (s.numChildren() || 0) + ' online'; });

            db.ref('profiles/'+myID+'/wallpaper').on('value', s => { if(s.val()) document.getElementById('wall-layer').style.backgroundImage = `url(${s.val()})`; });
            renderList();
            setupVoice();
        }

        async function handleAuth() {
            const n = document.getElementById('logNick').value.trim(), p = document.getElementById('logPass').value;
            if(!n || !p) return;
            const s = await db.ref('nick_to_id/'+n).once('value');
            if(s.val()) {
                const pr = (await db.ref('profiles/'+s.val()).once('value')).val();
                if(pr.pass !== p) return alert("Пароль!");
                localStorage.setItem('chat_id', s.val()); location.reload();
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick: n, pass: p, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", id });
                await db.ref('nick_to_id/'+n).set(id);
                localStorage.setItem('chat_id', id); location.reload();
            }
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val(); if(!p) return;
                        let div = document.createElement('div');
                        div.className = 'chat-item';
                        div.innerHTML = `<img src="${p.ava}" class="ava-mini"><b>${p.nick}</b>`;
                        div.onclick = () => openChat(p.id);
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = (id === 'global') ? null : id;
            if(window.innerWidth <= 768) {
                document.getElementById('sidePanel').classList.add('hidden');
                document.getElementById('chatMain').classList.add('active');
            }
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = '';
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            
            db.ref(path).off();
            document.getElementById('chatTitle').innerText = curPeer ? '...' : 'Общий чат';
            if(curPeer) db.ref('profiles/'+id).once('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            
            listenMsgs(path);
            listenTyping(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val(); const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                div.id = 'msg-'+snap.key;

                let content = d.m;
                if(d.type === 'voice') content = `<audio src="${d.m}" controls style="width:180px; filter:invert(1)"></audio>`;
                else if(content.startsWith('http')) content = `<img src="${content}" style="max-width:100%; border-radius:10px">`;

                div.innerHTML = `
                    <img src="" class="ava-mini img-${d.u}" style="width:30px; height:30px; cursor:pointer" onclick="showProfile('${d.u}')">
                    <div>
                        <span class="msg-author nick-${d.u}" onclick="showProfile('${d.u}')">...</span>
                        <div class="msg-bubble" onclick="openMenu('${snap.key}', '${d.m.replace(/'/g,"")}', '${d.u}', '${d.type}')">
                            ${d.f ? `<small style="opacity:0.5">Переслано от ${d.f}</small><br>` : ''}
                            ${content}
                            ${isMy ? '<span class="ticks">✔✔</span>' : ''}
                        </div>
                    </div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;

                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val();
                    if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
            db.ref(path).on('child_removed', s => { if(document.getElementById('msg-'+s.key)) document.getElementById('msg-'+s.key).remove(); });
        }

        function openMenu(mid, text, uid, type) {
            selectedMsg = { mid, text, uid, type };
            if(confirm(uid === myID ? "Удалить или Переслать?" : "Переслать сообщение?")) {
                if(uid === myID && confirm("Удалить?")) {
                    const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                    db.ref(p+'/'+mid).remove();
                } else {
                    const list = document.getElementById('forward-list');
                    list.innerHTML = `<div class="chat-item" onclick="doForward('global')">🌐 Общий чат</div>`;
                    db.ref('friends/'+myID).once('value', s => {
                        s.forEach(c => { db.ref('profiles/'+c.key).once('value', ps => {
                            list.innerHTML += `<div class="chat-item" onclick="doForward('${c.key}')">👤 ${ps.val().nick}</div>`;
                        });});
                    });
                    openModal('forward-modal');
                }
            }
        }

        async function doForward(toID) {
            const path = toID === 'global' ? 'messages' : 'privates/'+[myID, toID].sort().join('_');
            const author = (await db.ref('profiles/'+selectedMsg.uid).once('value')).val();
            db.ref(path).push({ u: myID, m: selectedMsg.text, type: selectedMsg.type, f: author.nick, t: Date.now() });
            closeModal('forward-modal');
            alert("Переслано!");
        }

        function showProfile(uid) {
            db.ref('profiles/'+uid).once('value', s => {
                const p = s.val();
                document.getElementById('profile-content').innerHTML = `
                    <img src="${p.ava}" style="width:100px; height:100px; border-radius:50%">
                    <h2>${p.nick}</h2>
                    <button onclick="startPrivate('${p.id}')" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:10px; margin-top:15px">Написать</button>
                `;
                openModal('profile-modal');
            });
        }

        function startPrivate(uid) {
            db.ref('friends/'+myID+'/'+uid).set(true);
            db.ref('friends/'+uid+'/'+myID).set(true);
            closeModal('profile-modal');
            openChat(uid);
        }

        function notifyTyping() {
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref('typing/'+path+'/'+myID).set(true);
            clearTimeout(typeTimeout);
            typeTimeout = setTimeout(() => db.ref('typing/'+path+'/'+myID).remove(), 2000);
        }

        function listenTyping(path) {
            db.ref('typing/'+path).on('value', s => {
                let users = [];
                s.forEach(u => { if(u.key !== myID) users.push(u.key); });
                if(users.length > 0) {
                    db.ref('profiles/'+users[0]).once('value', p => {
                        document.getElementById('typing-indicator').innerText = p.val().nick + ' печатает...';
                    });
                } else {
                    document.getElementById('typing-indicator').innerText = '';
                }
            });
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, type: 'text', t: Date.now() });
            i.value = '';
        }

        function setupVoice() {
            let mr, ch = [];
            const b = document.getElementById('micBtn');
            b.onmousedown = b.ontouchstart = async (e) => {
                e.preventDefault();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(s);
                ch = []; mr.ondataavailable = e => ch.push(e.data);
                mr.onstop = () => {
                    const r = new FileReader(); r.readAsDataURL(new Blob(ch));
                    r.onloadend = () => {
                        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                        db.ref(p).push({ u: myID, m: r.result, type: 'voice', t: Date.now() });
                    };
                };
                mr.start(); b.style.color = 'red';
            };
            window.onmouseup = window.ontouchend = () => { if(mr) { mr.stop(); b.style.color = 'white'; } };
        }

        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                openModal('settings-modal');
            });
        }
        function closeChat() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function sendMedia() { let u = prompt("URL фото:"); if(u) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, type: 'text', t: Date.now() }); } }
        function updateWall() { let u = prompt("URL обоев:"); if(u) db.ref('profiles/'+myID+'/wallpaper').set(u); }
        function updateAva() { let a = prompt("URL авы:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function checkAdmin() { if(prompt("Sigma:") === "1234567891011121314151617181920") { let n = prompt("Ник:"); db.ref('nick_to_id/'+n).once('value', s => { if(s.val()){localStorage.setItem('chat_id', s.val()); location.reload();} }); } }
    </script>
</body>
</html>
