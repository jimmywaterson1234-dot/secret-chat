<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; }

        #app { display: flex; height: 100dvh; width: 100vw; flex-direction: column; position: relative; z-index: 10; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        .chat-item.selected { background: var(--accent) !important; border-left: 4px solid var(--blue); }

        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: transparent; }
        #chatMain.active { display: flex; }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 8px 12px; border-radius: 16px; font-size: 15px; word-wrap: break-word; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.3); white-space: pre-wrap; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        /* ИСПРАВЛЕННЫЙ БЛОК ВВОДА */
        .input-area { 
            padding: 10px; 
            background: var(--panel); 
            display: flex; 
            align-items: flex-end; 
            gap: 8px; 
            border-top: 1px solid #000;
        }

        #mInput { 
            flex: 1; 
            background: #242f3d; 
            border: none; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 18px; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            max-height: 100px; 
            min-height: 40px;
            font-family: inherit;
        }

        .btn-action { 
            width: 44px; height: 44px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; flex-shrink: 0; border: none; background: none; color: var(--blue);
        }

        .btn-voice { background: var(--blue); border-radius: 50%; color: white; font-size: 20px; }
        .recording { background: #ff595a !important; animation: pulse 1s infinite; }

        .send-btn { font-size: 28px; margin-right: 5px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        #fwd-bar { display: none; background: var(--accent); padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid gold; cursor: pointer; }
        
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .setting-row { padding: 18px 20px; border-bottom: 1px solid #1c2835; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span></div>
        <div id="fwd-bar" onclick="finishMultiFwd()">🚀 Отправить в выбранные (<span id="fwd-count">0</span>)</div>
        <div id="chat-list" style="flex:1; overflow-y:auto">
            <div class="chat-item" id="item-global" onclick="handleChatClick('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:30px; color:var(--blue); cursor:pointer; padding:5px">‹</span>
                <b id="chatTitle">Чат</b>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <button class="btn-action" onclick="sendMedia()" style="font-size:22px">🖼️</button>
            <textarea id="mInput" placeholder="Сообщение..." rows="1"></textarea>
            <button id="voiceBtn" class="btn-action btn-voice" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="btn-action send-btn">➤</button>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center"></div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div style="flex:1; overflow-y:auto">
        <div class="setting-row" onclick="changeNick()"><span>👤 Ник</span><span id="st-nick" style="color:var(--blue)"></span></div>
        <div class="setting-row" onclick="changeAva()"><span>🖼️ Аватарка</span></div>
        <div class="setting-row" onclick="changeWall()"><span>🌌 Обои</span></div>
        <div class="setting-row" style="background:gold; color:black; font-weight:bold" onclick="checkSigma()"><span>⚡ СИГМА ПАНЕЛЬ</span></div>
        <div class="setting-row" onclick="location.reload()"><span>🔄 Обновить</span></div>
        <div class="setting-row" onclick="localStorage.clear(); location.reload();" style="color:#ff595a"><span>🚪 Выйти</span></div>
    </div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;
    let selectedMsg = null;
    let multiFwdTargets = [];
    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];

    window.onload = () => {
        if(localStorage.getItem('spark_wall')) document.getElementById('wall-layer').style.backgroundImage = `url(${localStorage.getItem('spark_wall')})`;
        if(myID) startApp(); else auth();
    };

    function auth() {
        let n = prompt("Ник:"); if(!n) return auth();
        db.ref('nick_to_id/'+n).once('value', s => {
            let id = s.val() || Date.now().toString();
            if(!s.val()) {
                db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id});
                db.ref('nick_to_id/'+n).set(id);
            }
            localStorage.setItem('chat_id', id); location.reload();
        });
    }

    function startApp() {
        db.ref('profiles/'+myID).on('value', s => { if(s.val()) document.getElementById('st-nick').innerText = s.val().nick; });
        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            const global = document.getElementById('item-global');
            list.innerHTML = ''; list.appendChild(global);
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    if(p.val()){
                        const div = document.createElement('div'); div.className = 'chat-item'; div.id = 'li-'+p.val().id;
                        div.innerHTML = `<img src="${p.val().ava}" class="ava-msg"><b>${p.val().nick}</b>`;
                        div.onclick = () => handleChatClick(p.val().id);
                        list.appendChild(div);
                    }
                });
            });
        });
    }

    function handleChatClick(id) {
        if(selectedMsg) {
            const tid = id === 'global' ? 'item-global' : 'li-'+id;
            const idx = multiFwdTargets.indexOf(id);
            if(idx > -1) { multiFwdTargets.splice(idx,1); document.getElementById(tid).classList.remove('selected'); }
            else { multiFwdTargets.push(id); document.getElementById(tid).classList.add('selected'); }
            document.getElementById('fwd-bar').style.display = multiFwdTargets.length > 0 ? 'block' : 'none';
            document.getElementById('fwd-count').innerText = multiFwdTargets.length;
        } else { openChat(id); }
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const cont = document.getElementById('msgs-container');
        cont.innerHTML = ''; db.ref(path).off();
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            let content = m.m;
            if(m.type === 'voice') content = `<audio controls src="${m.m}" style="width:180px"></audio>`;
            else if(String(m.m).startsWith('http')) content = `<img src="${m.m}" style="max-width:200px; border-radius:12px">`;
            
            row.innerHTML = `<img src="" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')"><div style="display:flex; flex-direction:column"><span style="font-size:12px; color:var(--blue); font-weight:bold" class="n-${m.u}"></span><div class="bubble" onclick="msgAction('${snap.key}', '${String(m.m).replace(/'/g,"")}', '${m.u}')">${m.f_name ? `<span class="fwd-info">От ${m.f_name}</span>` : ''}${content}${isMy?'<span class="ticks">✔✔</span>':''}</div></div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).on('value', s => { if(s.val()){ document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=s.val().ava); document.querySelectorAll('.n-'+m.u).forEach(n=>n.innerText=s.val().nick); } });
        });
    }

    const tx = document.getElementById('mInput');
    tx.oninput = function() { this.style.height = "40px"; this.style.height = this.scrollHeight + "px"; };
    tx.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } };

    function sendMsg() {
        if(isRecording) { stopVoiceAndSend(); return; }
        const v = tx.value.trim(); if(!v) return;
        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now() });
        tx.value = ''; tx.style.height = "40px";
    }

    async function toggleVoice() {
        if(!isRecording) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader(); reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                    db.ref(path).push({ u: myID, m: reader.result, type: 'voice', t: Date.now() });
                };
            };
            mediaRecorder.start(); isRecording = true; document.getElementById('voiceBtn').classList.add('recording');
        }
    }
    function stopVoiceAndSend() { if(mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false; document.getElementById('voiceBtn').classList.remove('recording'); } }

    function msgAction(id, txt, uid) {
        if(uid === myID) {
            if(confirm("ОК - Переслать, ОТМЕНА - Удалить")) fwdPrompt(txt, uid); else deleteMsg(id);
        } else { if(confirm("Переслать?")) fwdPrompt(txt, uid); }
    }
    function deleteMsg(id) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p+'/'+id).remove(); }
    function fwdPrompt(txt, uid) { db.ref('profiles/'+uid).once('value', s => { selectedMsg = { txt: txt, from: s.val().nick }; goBack(); }); }
    function finishMultiFwd() {
        multiFwdTargets.forEach(id => {
            const p = id === 'global' ? 'messages' : 'privates/'+[myID, id].sort().join('_');
            db.ref(p).push({ u: myID, m: selectedMsg.txt, f_name: selectedMsg.from, t: Date.now() });
        });
        selectedMsg = null; multiFwdTargets = []; document.getElementById('fwd-bar').style.display = 'none';
        document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('selected'));
    }

    function showProfile(uid) {
        db.ref('profiles/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('profile-content').innerHTML = `<img src="${p.ava}" style="width:100px; border-radius:50%"><h2>${p.nick}</h2><button onclick="addAndWrite('${p.id}')" style="padding:10px 30px; background:var(--blue); border:none; color:white; border-radius:10px; margin-top:15px; cursor:pointer">Написать</button>`;
            toggleModal('profile-modal', true);
        });
    }
    function addAndWrite(uid) { db.ref('friends/'+myID+'/'+uid).set(true); db.ref('friends/'+uid+'/'+myID).set(true); toggleModal('profile-modal', false); openChat(uid); }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); curPeer = null; }
    function toggleModal(id, s) { document.getElementById(id).classList.toggle('active', s); }
    function changeNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    function changeAva() { let a = prompt("URL:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function changeWall() { let w = prompt("URL:"); if(w){ localStorage.setItem('spark_wall', w); document.getElementById('wall-layer').style.backgroundImage = `url(${w})`; } }
    function sendMedia() { let u = prompt("URL картинки:"); if(u){ const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, t: Date.now() }); } }
</script>
</body>
</html>
