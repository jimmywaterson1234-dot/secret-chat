<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 1; pointer-events: none; }
        #app { position: relative; display: flex; height: 100dvh; width: 100vw; flex-direction: column; z-index: 2; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; position: relative; z-index: 110; }
        .chat-item:active { background: rgba(255,255,255,0.1); }
        .chat-item.selected { background: var(--accent) !important; border-left: 4px solid var(--blue); }

        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: transparent; position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; width: fit-content; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.3); white-space: pre-wrap; max-width: 100%; position: relative; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }
        .status-tick { font-size: 11px; margin-left: 6px; color: var(--blue); font-weight: bold; }

        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: flex-end; gap: 8px; border-top: 1px solid #000; position: relative; z-index: 300; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 10px 15px; border-radius: 18px; font-size: 16px; outline: none; resize: none; max-height: 120px; min-height: 40px; font-family: inherit; line-height: 1.4; }

        .btn-action { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border: none; background: none; color: var(--blue); z-index: 310; }
        .btn-voice { background: var(--blue); border-radius: 50%; color: white; font-size: 20px; }
        .recording { background: #ff595a !important; animation: pulse 1s infinite; }
        .send-btn { font-size: 28px; }

        #chatSubtitle { font-size: 11px; color: var(--blue); display: block; font-weight: normal; margin-top: 2px; }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .setting-row { padding: 18px 20px; border-bottom: 1px solid #1c2835; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span></div>
        <div id="fwd-bar" style="display:none; background:var(--accent); padding:12px; text-align:center; font-weight:bold; border-bottom:1px solid gold; cursor:pointer;" onclick="finishMultiFwd()">🚀 Переслать (<span id="fwd-count">0</span>)</div>
        <div id="chat-list" style="flex:1; overflow-y:auto">
            <div class="chat-item" id="item-global" onclick="handleChatClick('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:35px; color:var(--blue); cursor:pointer; padding: 0 10px;">‹</span>
                <div><b id="chatTitle">Чат</b><span id="chatSubtitle">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <button class="btn-action" onclick="sendMedia()">🖼️</button>
            <textarea id="mInput" placeholder="Сообщение..." rows="1"></textarea>
            <button id="voiceBtn" class="btn-action btn-voice" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="btn-action send-btn">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="setting-row" onclick="changeNick()">👤 Ник <span id="st-nick"></span></div>
    <div class="setting-row" onclick="changeAva()">🖼️ Аватарка</div>
    <div class="setting-row" onclick="changeWall()">🌌 Обои</div>
    <div class="setting-row" style="background:gold; color:black;" onclick="checkSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="setting-row" onclick="localStorage.clear(); location.reload();" style="color:red">🚪 Выход</div>
</div>

<div id="sigma-modal" class="modal">
    <div class="header"><span onclick="toggleModal('sigma-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b style="color:gold">SIGMA</b></div>
    <div id="sigma-list" style="flex:1; overflow-y:auto"></div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;
    let myNick = "";
    let isRecording = false;
    let typingTimer;

    window.onload = () => {
        if(localStorage.getItem('spark_wall')) document.getElementById('wall-layer').style.backgroundImage = `url(${localStorage.getItem('spark_wall')})`;
        if(myID) startApp(); else auth();
    };

    function startApp() {
        db.ref('status/' + myID).set({ state: 'online' });
        db.ref('status/' + myID).onDisconnect().set({ state: 'offline' });
        db.ref('profiles/'+myID).on('value', s => { if(s.val()){ myNick = s.val().nick; document.getElementById('st-nick').innerText = myNick; } });

        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            const global = document.getElementById('item-global');
            list.innerHTML = ''; list.appendChild(global);
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    if(p.val()){
                        const div = document.createElement('div'); div.className = 'chat-item';
                        div.innerHTML = `<img src="${p.val().ava}" class="ava-msg"><b>${p.val().nick}</b>`;
                        div.onclick = () => handleChatClick(p.val().id);
                        list.appendChild(div);
                    }
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const subtitle = document.getElementById('chatSubtitle');
        
        // ЛОГИКА ПРОЧТЕНИЯ
        db.ref(path).on('value', s => {
            s.forEach(m => {
                if(m.val().u !== myID && m.val().read === false) {
                    db.ref(path + '/' + m.key).update({ read: true });
                }
            });
        });

        // Онлайн / Печать
        if(curPeer) {
            db.ref('status/'+curPeer).on('value', s => { subtitle.innerText = (s.val()?.state==='online'?'в сети':'офлайн'); });
            db.ref('typing/'+[myID, curPeer].sort().join('_')).on('value', s => {
                s.forEach(u => { if(u.key !== myID && u.val().isTyping) subtitle.innerText = "печатает..."; });
            });
        } else {
            db.ref('status').on('value', s => { let c=0; s.forEach(u=>{if(u.val().state==='online')c++}); subtitle.innerText = c+" онлайн"; });
        }

        const cont = document.getElementById('msgs-container');
        cont.innerHTML = ''; db.ref(path).off('child_added');
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); 
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            row.id = 'msg-'+snap.key;
            
            let txt = m.m;
            if(m.type === 'voice') txt = `<audio controls src="${m.m}" style="width:160px"></audio>`;
            else if(String(m.m).startsWith('http')) txt = `<img src="${m.m}" style="max-width:200px; border-radius:12px">`;
            
            const ticks = isMy ? `<span class="status-tick" id="t-${snap.key}">${m.read ? '✔✔' : '✔'}</span>` : '';
            
            row.innerHTML = `<img src="" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')">
                <div style="display:flex; flex-direction:column">
                    <span style="font-size:12px; color:var(--blue); font-weight:bold" class="n-${m.u}"></span>
                    <div class="bubble" onclick="msgAction('${snap.key}', '${String(m.m).replace(/'/g,"")}', '${m.u}')">
                        ${m.f_name ? `<small>От ${m.f_name}</small><br>` : ''}${txt}${ticks}
                    </div>
                </div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).once('value', s => { if(s.val()){ 
                document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=s.val().ava); 
                document.querySelectorAll('.n-'+m.u).forEach(n=>n.innerText=s.val().nick); 
            }});
        });

        // Следим за изменением галочек
        db.ref(path).on('child_changed', snap => {
            const t = document.getElementById('t-'+snap.key);
            if(t) t.innerText = snap.val().read ? '✔✔' : '✔';
        });
    }

    function sendMsg() {
        const v = tx.value.trim(); if(!v) return;
        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now(), read: false });
        tx.value = ''; tx.style.height = "40px";
        db.ref('typing/'+(curPeer?[myID,curPeer].sort().join('_'):'global')+'/'+myID).set({isTyping:false});
    }

    const tx = document.getElementById('mInput');
    tx.oninput = function() {
        this.style.height = '40px'; this.style.height = this.scrollHeight + 'px';
        const path = curPeer ? [myID, curPeer].sort().join('_') : 'global';
        db.ref('typing/'+path+'/'+myID).set({isTyping:true, nick: myNick});
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => db.ref('typing/'+path+'/'+myID).set({isTyping:false}), 2000);
    };

    function handleChatClick(id) { openChat(id); }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); curPeer = null; }
    function toggleModal(id, s) { document.getElementById(id).classList.toggle('active', s); }

    function checkSigma() {
        if(prompt("Код:") === '1234567891011121314151617181920') { toggleModal('settings-modal', false); toggleModal('sigma-modal', true); loadSigma(); }
    }
    function loadSigma() {
        const list = document.getElementById('sigma-list'); list.innerHTML = '';
        db.ref('profiles').once('value', s => {
            s.forEach(u => {
                const p = u.val();
                const d = document.createElement('div'); d.className = 'setting-row';
                d.innerHTML = `<span>${p.nick}</span> <button onclick="localStorage.setItem('chat_id','${u.key}');location.reload()">Вход</button>`;
                list.appendChild(d);
            });
        });
    }

    function auth() {
        let n = prompt("Ник:"); if(!n) return auth();
        db.ref('nick_to_id/'+n).once('value', s => {
            let id = s.val() || Date.now().toString();
            if(!s.val()) { db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id}); db.ref('nick_to_id/'+n).set(id); }
            localStorage.setItem('chat_id', id); location.reload();
        });
    }

    function changeNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    function changeAva() { let a = prompt("URL:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function changeWall() { let w = prompt("URL:"); if(w){ localStorage.setItem('spark_wall', w); document.getElementById('wall-layer').style.backgroundImage = `url(${w})`; } }
    function sendMedia() { let u = prompt("URL картинки:"); if(u){ const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, t: Date.now(), read: false }); } }
</script>
</body>
</html>
