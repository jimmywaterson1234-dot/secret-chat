<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate 2.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        #app { position: relative; display: flex; height: 100dvh; width: 100vw; flex-direction: column; z-index: 5; }

        /* Шапка и Списки */
        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        
        /* Чат */
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg); position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Сообщения */
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; width: fit-content; margin-bottom: 4px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; cursor: pointer; position: relative; background: var(--other-msg); }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }
        
        .bubble a { color: #87cefa; text-decoration: underline; }
        .bubble video { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); }
        .bubble audio { height: 35px; width: 180px; }
        .bubble img { max-width: 220px; border-radius: 10px; display: block; }

        /* Кнопки и Инпут */
        .input-area { padding: 8px 10px; background: var(--panel); display: flex; align-items: center; gap: 5px; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 15px; border-radius: 20px; outline: none; font-size: 15px; }
        .btn-icon { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: none; color: var(--blue); font-size: 22px; flex-shrink: 0; }
        
        /* Видео-кружок запись */
        #video-record-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; display: none; text-align: center; }
        #v-preview { width: 250px; height: 250px; border-radius: 50%; object-fit: cover; border: 5px solid var(--blue); background: black; }

        /* Аватарки */
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #242f3d; flex-shrink: 0; }

        /* Модалки */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .list-item { padding: 18px; border-bottom: 1px solid #1c2835; display: flex; align-items: center; gap: 15px; cursor: pointer; font-size: 16px; }
        
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        .auth-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; background: #242f3d; color: white; outline: none; }
        .auth-box button { width: 100%; padding: 14px; margin-top: 10px; border-radius: 10px; border: none; background: var(--blue); color: white; font-weight: bold; }
        .recording { color: #ff595a !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="auth-screen" style="display: none;">
    <div class="auth-box">
        <h2 id="atitle">Вход</h2>
        <input type="text" id="auser" placeholder="Логин">
        <input type="password" id="apass" placeholder="Пароль">
        <button onclick="doAuth()">Вход</button>
        <p onclick="isR=!isR; document.getElementById('atitle').innerText=isR?'Регистрация':'Вход'" style="color:var(--blue); cursor:pointer; margin-top:15px">Сменить режим</p>
    </div>
</div>

<div id="video-record-overlay">
    <video id="v-preview" autoplay muted playsinline></video>
    <div style="margin-top:15px">
        <button class="btn-icon" style="background:var(--panel); border-radius:50%; display:inline-flex" onclick="switchCamera()">🔄</button>
    </div>
</div>

<div id="app">
    <div id="sidePanel">
        <div class="header">
            <b>Spark</b> 
            <div>
                <span onclick="searchByID()" style="padding:10px; cursor:pointer; font-size:20px;">🔍</span>
                <span onclick="openGroupCreator()" style="padding:10px; cursor:pointer; font-size:22px;">👥</span>
                <span onclick="toggleModal('settings-modal', true)" style="padding:10px; cursor:pointer; font-size:20px;">⚙️</span>
            </div>
        </div>
        <div id="chat-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="if(curPeer && !isGMode) showProfile(curPeer)">
                <span onclick="event.stopPropagation(); goBack()" style="font-size:30px; color:var(--blue); padding:5px 10px;">‹</span>
                <div><b id="chatTitle">Чат</b><br><span id="chatSubtitle" style="font-size:11px; color:var(--blue)">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <input type="text" id="mInput" placeholder="Сообщение..." oninput="handleTyping()">
            <button class="btn-icon" onclick="toggleVideoRecord()">📷</button>
            <button id="voiceBtn" class="btn-icon" onclick="toggleVoice()">🎙️</button>
            <button id="sendBtn" onclick="sendMsg()" class="btn-icon">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="list-item" onclick="copyMyID()">🆔 Мой ID: <span id="my-display-id" style="color:var(--blue); font-weight:bold">...</span> (нажми копировать)</div>
    <div class="list-item" onclick="upd('nick')">👤 Изменить ник</div>
    <div class="list-item" onclick="upd('bio')">📝 О себе</div>
    <div class="list-item" onclick="upd('ava')">🖼️ Сменить аватар</div>
    <div class="list-item" style="background:gold; color:black; font-weight:bold" onclick="checkSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="list-item" onclick="logout()" style="color:red">🚪 Выход</div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:30px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:15px"></div>
</div>

<div id="forward-modal" class="modal">
    <div class="header"><span onclick="toggleModal('forward-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Переслать</b></div>
    <div id="forward-targets" style="flex:1; overflow-y:auto"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id'), isR = false, curPeer = null, isGMode = false;
    let recorder, chunks = [], isRec = false, videoStream, videoRecorder, isVRec = false, camMode = "user";
    const defAva = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    window.onload = () => { if (!myID) document.getElementById('auth-screen').style.display = 'flex'; else startApp(); };

    function startApp() {
        db.ref('profiles/'+myID).on('value', s => {
            const p = s.val(); if(!p) return;
            document.getElementById('my-display-id').innerText = p.shortID;
        });
        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><div class="ava-msg" style="background:var(--blue);display:flex;align-items:center;justify-content:center;color:white">🌐</div><b>Общий чат</b></div>`;
            s.forEach(f => {
                const isG = f.val().isGroup;
                db.ref(isG ? 'groups/'+f.key : 'profiles/'+f.key).once('value', p => {
                    if(p.val()) list.innerHTML += `<div class="chat-item" onclick="openChat('${p.key}', ${isG})">
                        <img src="${isG?'https://cdn-icons-png.flaticon.com/512/32/32441.png':(p.val().ava||defAva)}" class="ava-msg" onerror="this.src='${defAva}'">
                        <b>${isG?p.val().name:p.val().nick}</b></div>`;
                });
            });
        });
    }

    // ССЫЛКИ КЛИКАБЕЛЬНЫ
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank">${url}</a>`);
    }

    function openChat(id, isG = false) {
        curPeer = id; isGMode = isG;
        if(id === 'global') curPeer = null;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? (isG ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
        
        const cont = document.getElementById('msgs-container'); cont.innerHTML = ''; db.ref(path).off();
        db.ref(path).limitToLast(40).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy?'my':'other'}`;
            
            let html = "";
            if(m.type==='video') html = `<video src="${m.m}" autoplay loop muted playsinline></video>`;
            else if(m.type==='image') html = `<img src="${m.m}">`;
            else if(m.type==='voice') html = `<audio src="${m.m}" controls></audio>`;
            else html = `<span>${linkify(m.m)}</span>`;

            row.innerHTML = `<img src="${defAva}" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')">
                <div class="bubble" onclick="msgAction('${snap.key}','${m.u}','${m.m}')">${html}</div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).once('value', p => { if(p.val()) document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=p.val().ava||defAva); });
        });
    }

    // ВИДЕО КРУЖКИ
    async function toggleVideoRecord() {
        if(!isVRec) {
            videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: camMode}, audio: true});
            document.getElementById('v-preview').srcObject = videoStream;
            document.getElementById('video-record-overlay').style.display = 'block';
            videoRecorder = new MediaRecorder(videoStream);
            chunks = [];
            videoRecorder.ondataavailable = e => chunks.push(e.data);
            videoRecorder.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(chunks, {type: 'video/mp4'}));
                r.onload = () => sendMedia(r.result, 'video');
                videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('video-record-overlay').style.display = 'none';
            };
            videoRecorder.start(); isVRec = true;
        } else { videoRecorder.stop(); isVRec = false; }
    }

    function switchCamera() {
        if(!isVRec) return;
        videoStream.getTracks().forEach(t => t.stop());
        camMode = (camMode === "user") ? "environment" : "user";
        isVRec = false; toggleVideoRecord();
    }

    // ДЕЙСТВИЯ
    function msgAction(id, uid, txt) {
        if(uid === myID) {
            if(confirm("Удалить свое сообщение?")) {
                const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
                db.ref(path+'/'+id).remove();
            }
        } else {
            if(confirm("Переслать это сообщение?")) {
                const fwd = "[Переслано]: " + txt;
                const targets = document.getElementById('forward-targets'); targets.innerHTML = '';
                db.ref('friends/'+myID).once('value', s => {
                    s.forEach(f => {
                        db.ref(f.val().isGroup?'groups/'+f.key:'profiles/'+f.key).once('value', p => {
                            const item = document.createElement('div'); item.className = 'list-item';
                            item.innerHTML = `<b>${f.val().isGroup?p.val().name:p.val().nick}</b>`;
                            item.onclick = () => {
                                const path = f.val().isGroup ? 'group_msgs/'+f.key : 'privates/'+[myID, f.key].sort().join('_');
                                db.ref(path).push({u:myID, m:fwd, type:'text', t:Date.now()});
                                toggleModal('forward-modal', false); alert("Успешно переслано!");
                            };
                            targets.appendChild(item);
                        });
                    });
                    toggleModal('forward-modal', true);
                });
            }
        }
    }

    function sendMsg() {
        if(isVRec) { toggleVideoRecord(); return; }
        const v = document.getElementById('mInput').value.trim(); if(!v) return;
        sendMedia(v, 'text'); document.getElementById('mInput').value = '';
    }

    function sendMedia(content, type) {
        const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
        db.ref(path).push({u:myID, m:content, type:type, t:Date.now()});
    }

    async function toggleVoice() {
        if(!isRec) {
            const stream = await navigator.mediaDevices.getUserMedia({audio:true});
            recorder = new MediaRecorder(stream);
            chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(chunks));
                r.onload = () => sendMedia(r.result, 'voice');
            };
            recorder.start(); isRec = true; document.getElementById('voiceBtn').classList.add('recording');
        } else { recorder.stop(); isRec = false; document.getElementById('voiceBtn').classList.remove('recording'); }
    }

    function showProfile(uid) {
        db.ref('profiles/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('profile-content').innerHTML = `
                <img src="${p.ava||defAva}" style="width:120px;height:120px;border-radius:50%;object-fit:cover">
                <h2>${p.nick}</h2>
                <div onclick="navigator.clipboard.writeText('${p.shortID}'); alert('ID скопирован!')" style="color:var(--blue); cursor:pointer"><b>ID: ${p.shortID}</b> (нажми скопировать)</div>
                <p>${p.bio||""}</p>
                <button onclick="toggleModal('profile-modal',false);openChat('${uid}')" style="padding:12px 25px;background:var(--blue);border:none;color:white;border-radius:10px">Написать</button>
            `;
            toggleModal('profile-modal', true);
        });
    }

    function searchByID() {
        const sid = prompt("Введите ID:"); if(!sid) return;
        db.ref('shortIDs/'+sid).once('value', s => {
            if(s.exists()) {
                const tid = s.val();
                db.ref('friends/'+myID+'/'+tid).set({isGroup:false});
                db.ref('friends/'+tid+'/'+myID).set({isGroup:false});
                openChat(tid);
            } else alert("Не найден!");
        });
    }

    function doAuth() {
        const u = document.getElementById('auser').value.toLowerCase(), p = document.getElementById('apass').value;
        if(isR) {
            const id = "u"+Date.now(), sid = "id"+Math.floor(10000+Math.random()*90000);
            db.ref('profiles/'+id).set({nick:u, pass:p, id:id, shortID:sid, ava:defAva});
            db.ref('nick_to_id/'+u).set(id); db.ref('shortIDs/'+sid).set(id);
            localStorage.setItem('chat_id', id); location.reload();
        } else {
            db.ref('nick_to_id/'+u).once('value', s => {
                if(s.exists()) db.ref('profiles/'+s.val()).once('value', sn => {
                    if(sn.val().pass===p) { localStorage.setItem('chat_id', s.val()); location.reload(); }
                });
            });
        }
    }

    function copyMyID() { const id = document.getElementById('my-display-id').innerText; navigator.clipboard.writeText(id); alert("Ваш ID скопирован: " + id); }
    function checkSigma() { if(prompt("Код:")==='1234567891011121314151617181920') location.reload(); }
    function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function logout() { localStorage.clear(); location.reload(); }
    function upd(k) { const v=prompt("Новое значение:"); if(v) db.ref('profiles/'+myID+'/'+k).set(v); }
    function uploadPhoto(input) { const f = input.files[0]; if(!f) return; const r = new FileReader(); r.readAsDataURL(f); r.onload = () => sendMedia(r.result, 'image'); }
</script>
</body>
</html>
