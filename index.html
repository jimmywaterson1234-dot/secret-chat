<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 1; pointer-events: none; }
        #app { position: relative; display: flex; height: 100dvh; width: 100vw; flex-direction: column; z-index: 5; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #242f3d; color: white; outline: none; }
        .auth-box button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }

        /* Chat UI */
        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: transparent; position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; width: fit-content; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; cursor: pointer; position: relative; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        .ava-msg { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; cursor: pointer; }
        .status-tick { font-size: 11px; margin-left: 6px; color: var(--blue); }

        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: flex-end; gap: 8px; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 10px 15px; border-radius: 18px; outline: none; resize: none; max-height: 120px; min-height: 40px; }

        .btn-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: none; color: var(--blue); font-size: 24px; }
        .btn-voice { background: var(--blue); border-radius: 50%; color: white; font-size: 20px; }
        .recording { background: #ff595a !important; animation: pulse 1s infinite; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .setting-row { padding: 18px 20px; border-bottom: 1px solid #1c2835; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="auth-screen" style="display: none;">
    <div class="auth-box" id="login-form">
        <h2>Вход в Spark</h2>
        <input type="text" id="log-user" placeholder="Логин">
        <input type="password" id="log-pass" placeholder="Пароль">
        <button onclick="handleLogin()">Войти</button>
        <p onclick="toggleAuth(false)" style="color:var(--blue); cursor:pointer; margin-top:15px">Нет аккаунта? Регистрация</p>
    </div>
    <div class="auth-box" id="reg-form" style="display: none;">
        <h2>Регистрация</h2>
        <input type="text" id="reg-user" placeholder="Придумайте логин">
        <input type="password" id="reg-pass" placeholder="Придумайте пароль">
        <button onclick="handleReg()">Создать аккаунт</button>
        <p onclick="toggleAuth(true)" style="color:var(--blue); cursor:pointer; margin-top:15px">Уже есть аккаунт? Войти</p>
    </div>
</div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="cursor:pointer">⚙️</span></div>
        <div id="chat-list" style="flex:1; overflow-y:auto">
            <div class="chat-item" onclick="openChat('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:35px; color:var(--blue); cursor:pointer;">‹</span>
                <div><b id="chatTitle">Чат</b><br><span id="chatSubtitle" style="font-size:11px; color:var(--blue)">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <textarea id="mInput" placeholder="Сообщение..." rows="1"></textarea>
            <button id="voiceBtn" class="btn-icon btn-voice" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="btn-icon">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="setting-row" onclick="changeNick()">👤 Ник <span id="st-nick"></span></div>
    <div class="setting-row" onclick="changeAva()">🖼️ Сменить аватарку (URL)</div>
    <div class="setting-row" onclick="changeBio()">📝 О себе</div>
    <div class="setting-row" onclick="changePass()">🔑 Сменить пароль</div>
    <div class="setting-row" style="background:gold; color:black;" onclick="checkSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="setting-row" onclick="logout()" style="color:red">🚪 Выйти</div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center"></div>
</div>

<div id="sigma-modal" class="modal">
    <div class="header"><span onclick="toggleModal('sigma-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>SIGMA</b></div>
    <div id="sigma-list" style="flex:1; overflow-y:auto"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;
    let myNick = "";
    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];

    window.onload = () => {
        if (!myID) document.getElementById('auth-screen').style.display = 'flex';
        else startApp();
    };

    function toggleAuth(s) {
        document.getElementById('login-form').style.display = s ? 'block' : 'none';
        document.getElementById('reg-form').style.display = s ? 'none' : 'block';
    }

    function handleReg() {
        const u = document.getElementById('reg-user').value.trim().toLowerCase();
        const p = document.getElementById('reg-pass').value.trim();
        if(!u || !p) return;
        db.ref('nick_to_id/'+u).once('value', s => {
            if(s.exists()) alert("Логин занят!");
            else {
                const id = "u" + Date.now();
                db.ref('profiles/'+id).set({nick:u, pass:p, id:id, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", bio:"Я в Spark!"});
                db.ref('nick_to_id/'+u).set(id);
                localStorage.setItem('chat_id', id); location.reload();
            }
        });
    }

    function handleLogin() {
        const u = document.getElementById('log-user').value.trim().toLowerCase();
        const p = document.getElementById('log-pass').value.trim();
        db.ref('nick_to_id/'+u).once('value', s => {
            if(s.exists()){
                const id = s.val();
                db.ref('profiles/'+id).once('value', snap => {
                    if(snap.val().pass === p) { localStorage.setItem('chat_id', id); location.reload(); }
                    else alert("Неверный пароль!");
                });
            } else alert("Нет такого логина!");
        });
    }

    function startApp() {
        db.ref('status/'+myID).set({state:'online'});
        db.ref('status/'+myID).onDisconnect().set({state:'offline'});
        db.ref('profiles/'+myID).on('value', s => { if(s.val()) { myNick = s.val().nick; document.getElementById('st-nick').innerText = myNick; }});

        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = '<div class="chat-item" onclick="openChat(\'global\')"><div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div><b>Общий чат</b></div>';
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    if(p.val()) list.innerHTML += `<div class="chat-item" onclick="openChat('${p.val().id}')"><img src="${p.val().ava}" class="ava-msg"><b>${p.val().nick}</b></div>`;
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        
        // Online / Subtitle
        if(!curPeer) {
            db.ref('status').on('value', s => { let c=0; s.forEach(u=>{if(u.val().state==='online')c++}); document.getElementById('chatSubtitle').innerText = c+" онлайн"; });
        } else {
            db.ref('status/'+curPeer).on('value', s => { document.getElementById('chatSubtitle').innerText = s.val()?.state==='online' ? 'в сети' : 'офлайн'; });
        }

        const cont = document.getElementById('msgs-container');
        cont.innerHTML = ''; db.ref(path).off();
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            let content = m.m;
            if(m.type === 'voice') content = `<audio src="${m.m}" controls style="width:180px"></audio>`;
            if(m.type === 'image') content = `<img src="${m.m}" style="max-width:200px; border-radius:10px">`;

            row.innerHTML = `<img src="" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')">
                <div style="display:flex; flex-direction:column">
                    <span style="font-size:10px; color:var(--blue)" class="n-${m.u}"></span>
                    <div class="bubble" onclick="msgAction('${snap.key}', '${String(m.m).substring(0,20)}', '${m.u}')">
                        ${m.f_name ? `<small>от ${m.f_name}</small><br>` : ''}${content}
                        ${isMy ? `<span class="status-tick" id="t-${snap.key}">${m.read ? '✔✔' : '✔'}</span>` : ''}
                    </div>
                </div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            if(!isMy && !m.read) db.ref(path+'/'+snap.key).update({read:true});

            db.ref('profiles/'+m.u).once('value', p => { if(p.val()){
                document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=p.val().ava);
                document.querySelectorAll('.n-'+m.u).forEach(n=>n.innerText=p.val().nick);
            }});
        });

        db.ref(path).on('child_changed', snap => {
            const t = document.getElementById('t-'+snap.key);
            if(t) t.innerText = snap.val().read ? '✔✔' : '✔';
        });
    }

    // ГОЛОСОВЫЕ
    async function toggleVoice() {
        if(!isRecording){
            try {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                mediaRecorder = new MediaRecorder(s); audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, {type:'audio/webm'});
                    const r = new FileReader(); r.readAsDataURL(blob);
                    r.onloadend = () => sendToDB(r.result, 'voice');
                };
                mediaRecorder.start(); isRecording = true; document.getElementById('voiceBtn').classList.add('recording');
            } catch(e) { alert("Нет доступа к микрофону"); }
        } else { mediaRecorder.stop(); isRecording = false; document.getElementById('voiceBtn').classList.remove('recording'); }
    }

    // ФОТО С УСТРОЙСТВА
    function uploadPhoto(input) {
        const file = input.files[0];
        if(!file) return;
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = () => sendToDB(r.result, 'image');
    }

    function sendToDB(data, type) {
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(path).push({u:myID, m:data, type:type, t:Date.now(), read:false});
    }

    function sendMsg() {
        const v = document.getElementById('mInput').value.trim(); if(!v) return;
        sendToDB(v, 'text'); document.getElementById('mInput').value = '';
    }

    function msgAction(id, txt, uid) {
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        if(uid === myID) { if(confirm("Удалить?")) db.ref(path+'/'+id).remove(); }
        else { if(confirm("Переслать?")) { let tid = prompt("ID (цифры) кому переслать:"); if(tid) db.ref('privates/'+[myID,tid].sort().join('_')).push({u:myID, m:txt, f_name:myNick, read:false}); }}
    }

    function showProfile(uid) {
        db.ref('profiles/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('profile-content').innerHTML = `<img src="${p.ava}" style="width:80px;border-radius:50%"><br><h2>${p.nick}</h2><p>${p.bio}</p><br><button onclick="addFriend('${p.id}')">Написать</button>`;
            toggleModal('profile-modal', true);
        });
    }

    function addFriend(id) { db.ref('friends/'+myID+'/'+id).set(true); db.ref('friends/'+id+'/'+myID).set(true); toggleModal('profile-modal', false); openChat(id); }
    function checkSigma() { if(prompt("Код:")==='1234567891011121314151617181920') { toggleModal('settings-modal', false); toggleModal('sigma-modal', true); loadSigma(); } }
    function loadSigma() {
        db.ref('profiles').once('value', s => {
            const l = document.getElementById('sigma-list'); l.innerHTML = '';
            s.forEach(u => { l.innerHTML += `<div class="setting-row">${u.val().nick} <div><button onclick="localStorage.setItem('chat_id','${u.key}');location.reload()">Вход</button> <button style="background:red; color:white; border:none; padding:5px; border-radius:5px" onclick="deleteAcc('${u.key}','${u.val().nick}')">Удалить</button></div></div>`; });
        });
    }
    function deleteAcc(id, nick) { if(confirm("Удалить "+nick+"?")) { db.ref('profiles/'+id).remove(); db.ref('nick_to_id/'+nick).remove(); loadSigma(); } }
    function logout() { localStorage.clear(); location.reload(); }
    function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function changeNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    function changeAva() { let a = prompt("URL:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function changeBio() { let b = prompt("О себе:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
    function changePass() { let p = prompt("Новый пароль:"); if(p) db.ref('profiles/'+myID+'/pass').set(p); }
</script>
</body>
        </html>
