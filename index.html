<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Messenger</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* --- ЭКРАНЫ --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 10000; }
        #app { display: none; height: 100vh; width: 100vw; display: flex; }

        /* --- ЛЕЙАУТ --- */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; z-index: 10; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; }
        .header b { color: var(--blue); font-size: 22px; letter-spacing: 1px; }

        /* --- СПИСОК ЧАТОВ --- */
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); position: relative; transition: 0.2s; }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .ava-mini { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-info b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-chat-btn { opacity: 0.3; font-size: 18px; padding: 5px; transition: 0.3s; }
        .chat-item:hover .del-chat-btn { opacity: 1; color: #ff5252; }

        /* --- СООБЩЕНИЯ --- */
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; align-items: flex-end; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* --- ПОЛНОЭКРАННЫЕ МЕНЮ --- */
        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 5000; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .full-modal.active { display: flex; }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: var(--panel); border-bottom: 1px solid #000; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

        /* --- АДМИН ПАНЕЛЬ --- */
        .admin-user-card { background: var(--panel); margin-bottom: 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #242f3d; }

        /* --- ВВОД --- */
        .input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 18px; border-radius: 25px; font-size: 16px; }

        /* --- КНОПКИ --- */
        .btn-blue { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-sigma { background: linear-gradient(45deg, #ffd700, #ffa500); color: black; border: none; padding: 12px; border-radius: 12px; font-weight: 900; margin-top: 20px; cursor: pointer; width: 100%; }

        @media (max-width: 768px) {
            .side-panel { position: fixed; inset: 0; width: 100%; }
            .chat-main { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s; }
            .chat-main.active { transform: translateX(0); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="background: var(--panel); padding: 35px; border-radius: 30px; text-align: center; width: 90%; max-width: 350px;">
            <h1 style="color:var(--blue); margin-top:0">Spark</h1>
            <input type="text" id="logNick" placeholder="Ваш ник" style="width:100%; margin-bottom:10px; padding:12px; border-radius:10px; border:none; background:#242f3d; color:white">
            <input type="password" id="logPass" placeholder="Пароль" style="width:100%; margin-bottom:20px; padding:12px; border-radius:10px; border:none; background:#242f3d; color:white">
            <button class="btn-blue" onclick="handleAuth()">Войти в Spark</button>
            <p id="authErr" style="color:#ff5252; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="settings-modal" class="full-modal">
        <div class="modal-header">
            <span onclick="closeModal('settings-modal')" style="font-size:30px; cursor:pointer">✕</span>
            <b style="font-size:20px">Настройки</b>
        </div>
        <div class="modal-body" style="text-align: center;">
            <img id="setAva" class="ava-mini" style="width:120px; height:120px; border: 3px solid var(--blue); margin-bottom:15px" onclick="updateAva()">
            <h2 id="setNick" onclick="updateNick()">Никнейм</h2>
            <p id="setBio" onclick="updateBio()" style="color:var(--text-dim)">О себе...</p>
            
            <div style="margin-top:40px; text-align:left">
                <button class="btn-blue" onclick="logout()" style="background:#ff5252; margin-bottom:10px">Выйти из аккаунта</button>
                <button class="btn-sigma" onclick="checkAdmin()">Σ SIGMA ПАНЕЛЬ</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="full-modal">
        <div class="modal-header">
            <span onclick="closeModal('admin-modal')" style="font-size:30px; cursor:pointer">✕</span>
            <b style="font-size:20px">Sigma Admin Panel</b>
        </div>
        <div class="modal-body" id="admin-list">
            </div>
    </div>

    <div id="app">
        <div class="side-panel">
            <div class="header">
                <b>Spark</b>
                <span onclick="openSettings()" style="font-size:24px; cursor:pointer">⚙️</span>
            </div>
            <div id="chat-list" style="overflow-y:auto; flex:1"></div>
        </div>

        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:30px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Spark Chat</b>
                </div>
                <div id="chatStatus" style="font-size:12px; color:var(--text-dim)">online</div>
            </div>
            <div id="msgs-container"></div>
            <div id="typing-disk" style="height:20px; padding:0 15px; font-size:12px; color:var(--blue); font-style:italic"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
                <input type="text" id="mInput" placeholder="Сообщение...">
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:45px; height:45px; border-radius:50%; color:white; font-size:20px">➤</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;

        window.onload = () => {
            if (!myID) document.getElementById('auth-screen').style.display = 'flex';
            else initApp();
        };

        async function handleAuth() {
            const nick = document.getElementById('logNick').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            if(!nick) return;
            const snap = await db.ref('nick_to_id/' + nick).once('value');
            const eid = snap.val();
            if(eid) {
                const p = (await db.ref('profiles/'+eid).once('value')).val();
                if(p.pass && p.pass !== pass) {
                    document.getElementById('authErr').innerText = "Неверный пароль!";
                    return;
                }
                save(eid);
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick, pass, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "Новый в Spark", id });
                await db.ref('nick_to_id/'+nick).set(id);
                save(id);
            }
        }
        function save(id) { localStorage.setItem('chat_id', id); location.reload(); }

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            renderList();
            openChat('global');
            
            document.getElementById('mInput').oninput = () => {
                let p = curPeer ? `typing/privates/${curPeer}/${myID}` : `typing/global/${myID}`;
                db.ref(p).set(Date.now());
            };
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val();
                        if(!p) return;
                        let existing = document.getElementById('item-'+p.id);
                        if(existing) existing.remove();
                        const div = document.createElement('div');
                        div.className = 'chat-item'; div.id = 'item-'+p.id;
                        div.innerHTML = `
                            <img src="${p.ava}" class="ava-mini" onclick="openChat('${p.id}')">
                            <div class="chat-info" onclick="openChat('${p.id}')"><b>${p.nick}</b><span style="font-size:12px;color:gray">Личный чат</span></div>
                            <span class="del-chat-btn" onclick="deleteChat('${p.id}', event)">🗑️</span>
                        `;
                        list.appendChild(div);
                    });
                });
            });
        }

        function deleteChat(uid, e) {
            e.stopPropagation();
            if(confirm("Удалить чат у обоих собеседников навсегда?")) {
                const chatId = [myID, uid].sort().join('_');
                db.ref('privates/'+chatId).remove();
                db.ref('friends/'+myID+'/'+uid).remove();
                db.ref('friends/'+uid+'/'+myID).remove();
                if(curPeer === uid) openChat('global');
            }
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) document.getElementById('chatMain').classList.add('active');
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            document.getElementById('chatTitle').innerText = curPeer ? '...' : 'Общий чат';
            if(curPeer) db.ref('profiles/'+id).on('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            listenMsgs(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = ''; db.ref(path).off();
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val();
                const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                let m = d.m;
                if(m.startsWith('http')) m = `<img src="${m}" class="msg-img" onclick="fullView('${m}')">`;
                div.innerHTML = `<img src="" class="ava-mini img-${d.u}" style="width:30px;height:30px"><div class="msg-bubble"><b class="nick-${d.u}" style="font-size:11px">...</b>${m}</div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val(); if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
        }

        // --- АДМИН ЛОГИКА ---
        function checkAdmin() {
            let p = prompt("Введите пароль Sigma:");
            if(p === "1234567891011121314151617181920") {
                openModal('admin-modal');
                const list = document.getElementById('admin-list');
                list.innerHTML = 'Загрузка всех душ...';
                db.ref('profiles').once('value', s => {
                    list.innerHTML = '';
                    s.forEach(user => {
                        const u = user.val();
                        list.innerHTML += `
                            <div class="admin-user-card">
                                <div style="display:flex; align-items:center; gap:10px">
                                    <img src="${u.ava}" class="ava-mini" style="width:35px;height:35px">
                                    <b>${u.nick}</b>
                                </div>
                                <button onclick="loginAs('${u.id}')" style="background:var(--blue); border:none; color:white; padding:5px 15px; border-radius:8px">Войти</button>
                            </div>
                        `;
                    });
                });
            } else { alert("ОТКАЗАНО В ДОСТУПЕ"); }
        }

        function loginAs(uid) {
            localStorage.setItem('chat_id', uid);
            location.reload();
        }

        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                document.getElementById('setBio').innerText = p.bio;
                openModal('settings-modal');
            });
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, t: Date.now() });
            i.value = '';
        }

        function updateAva() { let a = prompt("Ссылка на фото:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function updateNick() { let n = prompt("Новый ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
        function updateBio() { let b = prompt("О себе:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function sendMedia() {
            const url = prompt("Ссылка на фото:");
            if(url) {
                const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                db.ref(path).push({ u: myID, m: url, t: Date.now() });
            }
        }
    </script>
</body>
</html>
