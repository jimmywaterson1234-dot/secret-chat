<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark | Mobile Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }

        /* Контейнер приложения */
        #app { display: none; height: 100vh; width: 100vw; position: relative; z-index: 1; }
        
        /* Панели */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; flex-shrink: 0; height: 100%; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; height: 100%; z-index: 5; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #chat-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        /* Сообщения */
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 2px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; transition: opacity 0.2s; cursor: pointer; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        
        .msg-author { font-size: 12px; color: var(--blue); font-weight: bold; margin-bottom: 3px; display: block; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .side-panel { width: 100%; position: absolute; inset: 0; z-index: 10; }
            .chat-main { width: 100%; position: absolute; inset: 0; z-index: 20; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .chat-main.active { transform: translateX(0); }
        }

        .input-area { padding: 10px; background: var(--panel); display: flex; gap: 8px; align-items: center; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 15px; border-radius: 20px; font-size: 16px; }

        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 1000; }
        .full-modal.active { display: flex; }
    </style>
</head>
<body>

    <div id="wall-layer"></div>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:30px; border-radius:25px; text-align:center; width:85%">
            <h1 style="color:var(--blue); margin-bottom:20px">Spark</h1>
            <input id="logNick" placeholder="Ник" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#242f3d; color:white">
            <input id="logPass" type="password" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:none; background:#242f3d; color:white">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); border:none; border-radius:10px; color:white; font-weight:bold">Войти</button>
        </div>
    </div>

    <div id="app">
        <div class="side-panel" id="sidePanel">
            <div class="header"><b>Spark</b><span onclick="openSettings()" style="font-size:24px">⚙️</span></div>
            <div id="chat-list"></div>
        </div>
        
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:35px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Чат</b>
                </div>
            </div>
            <div id="msgs-container"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
                <input id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button id="micBtn" style="background:none; border:none; font-size:22px">🎤</button>
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:40px; height:40px; border-radius:50%; color:white">➤</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('settings-modal')" style="font-size:30px">✕</span><b>Настройки</b></div>
        <div style="padding:20px; text-align:center">
            <img id="setAva" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--blue)" onclick="updateAva()">
            <h2 id="setNick" style="margin-top:10px" onclick="updateNick()">...</h2>
            <button onclick="updateWall()" style="width:100%; padding:12px; margin-top:20px; border-radius:10px; border:none; background:var(--accent); color:white">Обои</button>
            <button onclick="checkAdmin()" style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; background:gold; color:black; font-weight:bold">Σ SIGMA</button>
            <button onclick="logout()" style="width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; background:red; color:white">Выход</button>
        </div>
    </div>

    <div id="profile-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('profile-modal')" style="font-size:30px">✕</span><b>Профиль</b></div>
        <div id="profile-content" style="padding:20px; text-align:center"></div>
    </div>

    <div id="forward-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('forward-modal')" style="font-size:30px">✕</span><b>Переслать</b></div>
        <div id="forward-list"></div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;

        window.onload = () => { if(!myID) document.getElementById('auth-screen').style.display='flex'; else initApp(); };

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            db.ref('profiles/'+myID+'/wallpaper').on('value', s => { if(s.val()) document.getElementById('wall-layer').style.backgroundImage = `url(${s.val()})`; });
            renderList();
            openChat('global');
            setupVoice();
        }

        async function handleAuth() {
            const n = document.getElementById('logNick').value.trim(), p = document.getElementById('logPass').value;
            if(!n) return;
            const s = await db.ref('nick_to_id/'+n).once('value');
            if(s.val()) {
                const pr = (await db.ref('profiles/'+s.val()).once('value')).val();
                if(pr.pass !== p) return alert("Пароль!");
                localStorage.setItem('chat_id', s.val()); location.reload();
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick: n, pass: p, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "Spark User", id });
                await db.ref('nick_to_id/'+n).set(id);
                localStorage.setItem('chat_id', id); location.reload();
            }
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val(); if(!p) return;
                        let div = document.getElementById('item-'+p.id) || document.createElement('div');
                        div.className = 'chat-item'; div.id = 'item-'+p.id;
                        div.innerHTML = `<img src="${p.ava}" class="ava-mini"><b>${p.nick}</b>`;
                        div.onclick = () => openChat(p.id);
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = (id === 'global') ? null : id;
            const main = document.getElementById('chatMain');
            main.classList.add('active'); // Для мобилок
            
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = '';
            
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).off(); 
            
            document.getElementById('chatTitle').innerText = 'Загрузка...';
            if(curPeer) {
                db.ref('profiles/'+id).once('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            } else {
                document.getElementById('chatTitle').innerText = 'Общий чат';
            }
            
            listenMsgs(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            db.ref(path).limitToLast(40).on('child_added', snap => {
                const d = snap.val(); const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                div.id = 'msg-'+snap.key;

                let content = d.m;
                if(d.type === 'voice') content = `<audio src="${d.m}" controls style="width:180px; height:35px; filter:invert(1)"></audio>`;
                else if(content.startsWith('http')) content = `<img src="${content}" style="max-width:100%; border-radius:10px">`;

                div.innerHTML = `
                    <img src="" class="ava-mini img-${d.u}" style="width:30px; height:30px" onclick="showProfile('${d.u}')">
                    <div style="flex:1">
                        <span class="msg-author nick-${d.u}" onclick="showProfile('${d.u}')">...</span>
                        <div class="msg-bubble" onclick="msgMenu('${snap.key}', '${d.m.replace(/'/g,"")}', '${d.u}', '${d.type}')">
                            ${d.f ? `<small style="opacity:0.5">Переслано от ${d.f}</small><br>` : ''}
                            ${content}
                        </div>
                    </div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;

                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val(); if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
            db.ref(path).on('child_removed', snap => {
                const el = document.getElementById('msg-'+snap.key);
                if(el) el.remove();
            });
        }

        function msgMenu(mid, text, uid, type) {
            const act = confirm(uid === myID ? "Удалить или Переслать?" : "Переслать сообщение?");
            if(!act) return;
            
            if(uid === myID && confirm("Удалить это сообщение у всех?")) {
                const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                db.ref(path+'/'+mid).remove();
            } else {
                // Логика пересылки
                const to = prompt("Введите ник кому переслать (или 'global'):");
                if(!to) return;
                db.ref('nick_to_id/'+to).once('value', s => {
                    const tid = (to === 'global') ? 'messages' : 'privates/'+[myID, s.val()].sort().join('_');
                    db.ref('profiles/'+uid).once('value', ap => {
                        db.ref(tid).push({ u: myID, m: text, type: type, f: ap.val().nick, t: Date.now() });
                        alert("Готово");
                    });
                });
            }
        }

        function showProfile(uid) {
            db.ref('profiles/'+uid).once('value', s => {
                const p = s.val();
                const cont = document.getElementById('profile-content');
                cont.innerHTML = `
                    <img src="${p.ava}" style="width:120px; height:120px; border-radius:50%">
                    <h2>${p.nick}</h2>
                    <p>${p.bio}</p>
                    <button onclick="startPrivate('${p.id}')" style="width:100%; padding:12px; background:var(--blue); border:none; color:white; border-radius:10px; margin-top:15px">Написать</button>
                `;
                openModal('profile-modal');
            });
        }

        function startPrivate(uid) {
            db.ref('friends/'+myID+'/'+uid).set(true);
            db.ref('friends/'+uid+'/'+myID).set(true);
            closeModal('profile-modal');
            openChat(uid);
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, type: 'text', t: Date.now() });
            i.value = '';
        }

        function setupVoice() {
            let mr, ch = [];
            const b = document.getElementById('micBtn');
            const start = async (e) => {
                e.preventDefault();
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mr = new MediaRecorder(s);
                ch = []; mr.ondataavailable = e => ch.push(e.data);
                mr.onstop = () => {
                    const r = new FileReader(); r.readAsDataURL(new Blob(ch));
                    r.onloadend = () => {
                        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                        db.ref(path).push({ u: myID, m: r.result, type: 'voice', t: Date.now() });
                    };
                };
                mr.start(); b.style.color = 'red';
            };
            const stop = () => { if(mr) { mr.stop(); b.style.color = 'white'; } };
            b.onmousedown = b.ontouchstart = start;
            window.onmouseup = window.ontouchend = stop;
        }

        function checkAdmin() {
            if(prompt("Sigma Pass:") === "1234567891011121314151617181920") {
                const list = prompt("Ник юзера для входа:");
                if(list) db.ref('nick_to_id/'+list).once('value', s => { if(s.val()) { localStorage.setItem('chat_id', s.val()); location.reload(); }});
            }
        }

        function updateWall() { let u = prompt("URL фото:"); if(u) db.ref('profiles/'+myID+'/wallpaper').set(u); }
        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                openModal('settings-modal');
            });
        }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function sendMedia() { let u = prompt("URL фото:"); if(u) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, type: 'text', t: Date.now() }); } }
        function updateAva() { let a = prompt("URL авы:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function updateNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
    </script>
</body>
    </html>
