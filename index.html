<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteGram GitHub</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #17212b; padding: 15px; text-align: center; border-bottom: 1px solid #000; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #182533; padding: 8px 12px; border-radius: 10px; align-self: flex-start; max-width: 80%; }
        .input-area { background: #17212b; padding: 10px; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #242f3d; color: white; outline: none; }
        button { background: #2b5278; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        #auth { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0e1621; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>LiteGram</h2>
        <input type="text" id="nick" placeholder="Введите ваш ник" style="width: 80%; margin-bottom: 10px;">
        <button onclick="start()" style="width: 80%;">Войти</button>
    </div>

    <div class="header" id="headTitle">Чат</div>
    <div style="padding: 5px; background: #17212b;">
        <input type="text" id="search" placeholder="Поиск ника..." oninput="searchUser()" style="width: 95%; font-size: 12px;">
        <div id="found" style="font-size: 12px; color: #40a7e3; padding: 2px 10px;"></div>
    </div>
    <div id="msgs"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Сообщение...">
        <button onclick="send()">></button>
    </div>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        let myNick = "";

        function start() {
            myNick = document.getElementById('nick').value;
            if(myNick) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('headTitle').innerText = "Вы: " + myNick;
                gun.get('chat-users-list').get(myNick).put(true);
            }
        }

        function send() {
            const val = document.getElementById('msgInput').value;
            if(val) {
                gun.get('global-chat-room').set({ u: myNick, m: val, t: Date.now() });
                document.getElementById('msgInput').value = '';
            }
        }

        gun.get('global-chat-room').map().once((data) => {
            if(data && data.u && data.m) {
                const d = document.createElement('div');
                d.className = 'msg';
                d.innerHTML = `<b>${data.u}:</b> ${data.m}`;
                document.getElementById('msgs').appendChild(d);
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            }
        });

        function searchUser() {
            const q = document.getElementById('search').value.toLowerCase();
            const out = document.getElementById('found');
            out.innerText = "";
            if(q.length < 2) return;
            gun.get('chat-users-list').map().once((val, key) => {
                if(key && key.toLowerCase().includes(q)) {
                    out.innerText = "Найден: " + key;
                }
            });
        }
    </script>
</body>
</html>
