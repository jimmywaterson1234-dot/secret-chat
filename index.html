<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #app { display: flex; height: 100dvh; width: 100vw; position: relative; flex-direction: column; }

        /* СПИСОК ЧАТОВ (как на скрине 3) */
        #sidePanel { 
            position: absolute; inset: 0; background: var(--bg); z-index: 500; 
            display: flex; flex-direction: column; 
        }
        #sidePanel.hidden { display: none; }

        .header { 
            height: 60px; padding: 0 15px; background: var(--panel); 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid #000; flex-shrink: 0;
        }
        .header b { font-size: 20px; }

        .chat-item { 
            padding: 15px; display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid #1c2835; cursor: pointer; 
        }
        .chat-item:active { background: #1c2835; }

        /* ОКНО ЧАТА (как на скринах 1 и 2) */
        #chatMain { 
            display: none; flex-direction: column; height: 100%; width: 100%; 
            background: var(--bg); position: relative; z-index: 600;
        }
        #chatMain.active { display: flex; }

        #msgs-container { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 12px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* Стандартный фон Telegram */
            background-blend-mode: overlay;
        }

        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; position: relative; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }

        .ava-msg { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: #2b5278; }
        
        .msg-content { display: flex; flex-direction: column; }
        .msg-author { font-size: 13px; color: var(--blue); font-weight: bold; margin-bottom: 2px; margin-left: 5px; }
        .my .msg-author { text-align: right; margin-right: 5px; }

        .bubble { 
            padding: 8px 12px; border-radius: 16px; font-size: 15px; 
            position: relative; word-wrap: break-word; min-width: 50px;
        }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }

        .fwd-tag { font-size: 11px; opacity: 0.7; font-style: italic; margin-bottom: 3px; display: block; border-left: 2px solid var(--blue); padding-left: 5px; }
        
        .ticks { font-size: 10px; margin-left: 5px; opacity: 0.8; vertical-align: bottom; }

        /* ПОЛЕ ВВОДА (Fixed) */
        .input-area { 
            padding: 8px 12px; background: var(--panel); 
            display: flex; align-items: center; gap: 10px; 
            border-top: 1px solid #000; flex-shrink: 0;
        }
        #mInput { 
            flex: 1; background: #242f3d; border: none; color: white; 
            padding: 10px 15px; border-radius: 20px; font-size: 16px; outline: none;
        }

        /* МОДАЛКИ */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidePanel">
        <div class="header">
            <b>Spark</b>
            <span onclick="openSettings()" style="font-size:22px; cursor:pointer">⚙️</span>
        </div>
        <div id="chat-list">
            <div class="chat-item" onclick="openChat('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:15px">
                <span onclick="goBack()" style="font-size:28px; color:var(--blue); cursor:pointer">‹</span>
                <b id="chatTitle">Чат</b>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
            <input id="mInput" placeholder="Сообщение..." autocomplete="off">
            <button onclick="sendMsg()" style="background:none; border:none; font-size:24px">➤</button>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="closeModal('profile-modal')" style="font-size:30px">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;

    // ФИКС КЛАВИАТУРЫ
    const input = document.getElementById('mInput');
    input.addEventListener('focus', () => {
        setTimeout(() => window.scrollTo(0, 0), 100);
    });

    window.onload = () => { if(myID) startApp(); else auth(); };

    function auth() {
        let n = prompt("Ваш ник:");
        if(!n) return auth();
        db.ref('nick_to_id/'+n).once('value', s => {
            let id = s.val() || Date.now().toString();
            if(!s.val()) {
                db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id});
                db.ref('nick_to_id/'+n).set(id);
            }
            localStorage.setItem('chat_id', id); location.reload();
        });
    }

    function startApp() {
        document.getElementById('app').style.display = 'flex';
        // Загрузка друзей
        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    const d = p.val();
                    if(!document.getElementById('li-'+d.id)) {
                        const div = document.createElement('div');
                        div.className = 'chat-item'; div.id = 'li-'+d.id;
                        div.innerHTML = `<img src="${d.ava}" class="ava-msg"><b>${d.nick}</b>`;
                        div.onclick = () => openChat(d.id);
                        list.appendChild(div);
                    }
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const cont = document.getElementById('msgs-container');
        cont.innerHTML = '';
        db.ref(path).off();
        
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val();
            const isMy = m.u === myID;
            const row = document.createElement('div');
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            
            let content = m.m;
            if(content.startsWith('http')) content = `<img src="${content}" style="max-width:200px; border-radius:10px; display:block">`;

            row.innerHTML = `
                <img src="" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')">
                <div class="msg-content">
                    <span class="msg-author n-${m.u}"></span>
                    <div class="bubble">
                        ${m.f_name ? `<span class="fwd-tag">От ${m.f_name}</span>` : ''}
                        ${content}
                        ${isMy ? '<span class="ticks">✔✔</span>' : ''}
                    </div>
                </div>
            `;
            cont.appendChild(row);
            cont.scrollTop = cont.scrollHeight;

            db.ref('profiles/'+m.u).on('value', s => {
                const p = s.val();
                if(p) {
                    document.querySelectorAll('.i-'+m.u).forEach(img => img.src = p.ava);
                    document.querySelectorAll('.n-'+m.u).forEach(n => n.innerText = p.nick);
                }
            });
        });
    }

    function sendMsg() {
        const val = input.value.trim();
        if(!val) return;
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(path).push({ u: myID, m: val, t: Date.now() });
        input.value = '';
    }

    function showProfile(uid) {
        db.ref('profiles/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('profile-content').innerHTML = `
                <img src="${p.ava}" style="width:100px; height:100px; border-radius:50%">
                <h2>${p.nick}</h2>
                <button onclick="startPriv('${p.id}')" style="margin-top:20px; padding:10px 20px; background:var(--blue); border:none; color:white; border-radius:8px">Написать</button>
            `;
            document.getElementById('profile-modal').classList.add('active');
        });
    }

    function startPriv(uid) {
        db.ref('friends/'+myID+'/'+uid).set(true);
        db.ref('friends/'+uid+'/'+myID).set(true);
        closeModal('profile-modal');
        openChat(uid);
    }

    function goBack() {
        document.getElementById('sidePanel').classList.remove('hidden');
        document.getElementById('chatMain').classList.remove('active');
    }

    function openSettings() { let a = prompt("Ссылка на аву:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function sendMedia() { let u = prompt("Ссылка на фото:"); if(u) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, t: Date.now() }); } }
</script>
</body>
</html>
