<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
        
        #app { display: flex; height: 100dvh; width: 100vw; flex-direction: column; position: relative; z-index: 10; }
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        .chat-item.selected { background: var(--accent) !important; border-left: 4px solid var(--blue); }

        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; z-index: 600; background: transparent; }
        #chatMain.active { display: flex; }
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        /* Сообщения */
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; margin-bottom: 2px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 8px 12px; border-radius: 16px; font-size: 15px; position: relative; word-wrap: break-word; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.3); white-space: pre-wrap; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .ava-msg { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        /* ИСПРАВЛЕННАЯ ОБЛАСТЬ ВВОДА */
        .input-area { 
            padding: 10px 15px; 
            background: var(--panel); 
            display: flex; 
            align-items: flex-end; 
            gap: 10px; 
            border-top: 1px solid #000; 
            min-height: 60px;
        }

        /* Поле ввода теперь textarea (растет вниз) */
        #mInput { 
            flex: 1; 
            background: #242f3d; 
            border: none; 
            color: white; 
            padding: 12px 15px; 
            border-radius: 20px; 
            font-size: 16px; 
            outline: none; 
            resize: none; 
            max-height: 120px; 
            min-height: 44px;
            line-height: 20px;
            font-family: inherit;
        }

        .btn-action { 
            width: 44px; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .btn-voice { 
            background: var(--blue); 
            border-radius: 50%; 
            font-size: 20px; 
            border: none;
            color: white;
        }
        .recording { background: #ff595a !important; animation: pulse 1s infinite; }

        /* Кнопка ОТПРАВИТЬ теперь точно видна */
        .send-btn { 
            color: var(--blue); 
            font-size: 28px; 
            background: none; 
            border: none;
            padding-right: 5px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #fwd-bar { display: none; background: var(--accent); padding: 12px; text-align: center; font-weight: bold; border-bottom: 1px solid gold; }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="toggleModal('settings-modal', true)" style="font-size:24px; cursor:pointer">⚙️</span></div>
        <div id="fwd-bar" onclick="finishMultiFwd()">Переслать в выбранные (<span id="fwd-count">0</span>)</div>
        <div id="chat-list" style="flex:1; overflow-y:auto">
            <div class="chat-item" id="item-global" onclick="handleChatClick('global')">
                <div class="ava-msg" style="display:flex; align-items:center; justify-content:center; background:var(--blue)">🌐</div>
                <b>Общий чат</b>
            </div>
        </div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:30px; color:var(--blue); cursor:pointer">‹</span>
                <b id="chatTitle">Чат</b>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <div class="btn-action" onclick="sendMedia()" style="font-size:22px">🖼️</div>
            <textarea id="mInput" placeholder="Сообщение..." rows="1"></textarea>
            <button id="voiceBtn" class="btn-action btn-voice" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="btn-action send-btn">➤</button>
        </div>
    </div>
</div>

<script>
    // Инициализация Firebase (твоя ссылка уже тут)
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;
    let selectedMsg = null;
    let multiFwdTargets = [];
    let mediaRecorder; let audioChunks = []; let isRecording = false;

    // Авто-высота текста
    const tx = document.getElementById('mInput');
    tx.addEventListener("input", function() {
        this.style.height = "44px";
        this.style.height = (this.scrollHeight) + "px";
    });

    // Enter для отправки (Shift+Enter для новой строки)
    tx.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMsg();
        }
    });

    function sendMsg() {
        if(isRecording) {
            stopVoiceAndSend();
            return;
        }
        const v = tx.value.trim(); 
        if(!v) return;
        const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(p).push({ u: myID, m: v, t: Date.now() }); 
        tx.value = '';
        tx.style.height = "44px";
    }

    async function toggleVoice() {
        if(!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
                        db.ref(path).push({ u: myID, m: reader.result, type: 'voice', t: Date.now() });
                    };
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('recording');
            } catch(e) { alert("Включи микрофон в настройках"); }
        }
    }

    function stopVoiceAndSend() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.getElementById('voiceBtn').classList.remove('recording');
        }
    }

    // Все остальные функции (openChat, handleChatClick, showProfile и т.д.) 
    // остаются такими же, как в твоей рабочей версии.
    // Просто скопируй их сюда или используй этот файл как основу.

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const cont = document.getElementById('msgs-container'); 
        cont.innerHTML = '';
        db.ref(path).off();
        db.ref(path).limitToLast(50).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); 
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            let content = m.m;
            if(m.type === 'voice') content = `<audio controls src="${m.m}" style="width:180px"></audio>`;
            else if(String(m.m).startsWith('http')) content = `<img src="${m.m}" style="max-width:200px; border-radius:12px">`;

            row.innerHTML = `<img src="" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')"><div style="display:flex; flex-direction:column"><span style="font-size:12px; color:var(--blue); font-weight:bold" class="n-${m.u}"></span><div class="bubble" onclick="msgAction('${snap.key}', '${String(m.m).replace(/'/g,"")}', '${m.u}')">${m.f_name ? `<span class="fwd-info">От ${m.f_name}</span>` : ''}${content}${isMy?'<span class="ticks">✔✔</span>':''}</div></div>`;
            cont.appendChild(row); 
            cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).on('value', s => { if(s.val()){ document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=s.val().ava); document.querySelectorAll('.n-'+m.u).forEach(n=>n.innerText=s.val().nick); } });
        });
    }

    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function toggleModal(id, s) { document.getElementById(id).classList.toggle('active', s); }

    // (Не забудь добавить функции msgAction, deleteMsg, startApp, auth из прошлого кода)
</script>
</body>
</html>
