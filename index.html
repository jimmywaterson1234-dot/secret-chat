<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark | Pro Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        /* Экраны */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: none; align-items: center; justify-content: center; z-index: 10000; }
        #app { display: none; height: 100vh; width: 100vw; }

        /* Лейаут */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; }
        .header b { color: var(--blue); font-size: 20px; }

        /* Список чатов */
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .chat-item:hover { background: rgba(255,255,255,0.05); }
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; }

        /* Сообщения */
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; align-items: flex-end; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; position: relative; max-width: 100%; word-wrap: break-word; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        
        /* Галочки */
        .msg-status { font-size: 10px; margin-left: 5px; vertical-align: bottom; opacity: 0.8; }
        
        /* Голосовые */
        .voice-player { display: flex; align-items: center; gap: 10px; min-width: 150px; }
        audio { height: 30px; filter: invert(1); }

        /* Модалки */
        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 5000; }
        .full-modal.active { display: flex; }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: var(--panel); border-bottom: 1px solid #000; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

        /* Ввод */
        .input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 10px; align-items: center; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 18px; border-radius: 25px; }
        .record-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #ff5252; color: white; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .record-btn.recording { animation: pulse 1s infinite; }

        @media (max-width: 768px) {
            .side-panel { position: fixed; inset: 0; width: 100%; }
            .chat-main { position: fixed; inset: 0; transform: translateX(100%); transition: 0.3s; z-index: 100; }
            .chat-main.active { transform: translateX(0); }
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="background: var(--panel); padding: 30px; border-radius: 25px; text-align: center; width: 320px;">
            <h1 style="color:var(--blue)">Spark</h1>
            <input type="text" id="logNick" placeholder="Никнейм" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; background:#242f3d; color:white">
            <input type="password" id="logPass" placeholder="Пароль" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:none; background:#242f3d; color:white">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold">Войти</button>
        </div>
    </div>

    <div id="settings-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('settings-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
        <div class="modal-body" style="text-align: center;">
            <img id="setAva" class="ava-mini" style="width:120px; height:120px; border:3px solid var(--blue)" onclick="updateAva()">
            <h2 id="setNick" onclick="updateNick()">Ник</h2>
            <p id="setBio" onclick="updateBio()" style="color:var(--text-dim)">Био...</p>
            <button onclick="logout()" style="background:#ff5252; color:white; border:none; width:100%; padding:12px; border-radius:12px; margin-top:30px; font-weight:bold">Выйти</button>
            <button onclick="checkAdmin()" style="background:linear-gradient(45deg, #ffd700, #ffa500); color:black; border:none; width:100%; padding:12px; border-radius:12px; margin-top:10px; font-weight:900">Σ SIGMA ПАНЕЛЬ</button>
        </div>
    </div>

    <div id="admin-modal" class="full-modal">
        <div class="modal-header"><span onclick="closeModal('admin-modal')" style="font-size:30px; cursor:pointer">✕</span><b>Sigma Control</b></div>
        <div class="modal-body" id="admin-list"></div>
    </div>

    <div id="app">
        <div class="side-panel">
            <div class="header"><b>Spark</b><span onclick="openSettings()" style="cursor:pointer; font-size:24px">⚙️</span></div>
            <div id="chat-list" style="overflow-y:auto; flex:1"></div>
        </div>
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:30px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Чат</b>
                </div>
            </div>
            <div id="msgs-container"></div>
            <div id="typing-disk" style="height:20px; padding:0 15px; font-size:11px; color:var(--blue)"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:20px; color:white; cursor:pointer">🖼️</button>
                <input type="text" id="mInput" placeholder="Сообщение...">
                <button id="micBtn" style="background:none; border:none; font-size:20px; cursor:pointer">🎤</button>
                <button id="recBtn" class="record-btn">⏺</button>
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:45px; height:45px; border-radius:50%; color:white; font-size:20px; cursor:pointer">➤</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;
        let mediaRecorder;
        let audioChunks = [];

        window.onload = () => {
            if (!myID) document.getElementById('auth-screen').style.display = 'flex';
            else initApp();
        };

        // Авторизация (сохранена)
        async function handleAuth() {
            const nick = document.getElementById('logNick').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            if(!nick) return;
            const snap = await db.ref('nick_to_id/' + nick).once('value');
            const eid = snap.val();
            if(eid) {
                const p = (await db.ref('profiles/'+eid).once('value')).val();
                if(p.pass && p.pass !== pass) { alert("Пароль!"); return; }
                save(eid);
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/'+id).set({ nick, pass, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", bio: "Spark User", id });
                await db.ref('nick_to_id/'+nick).set(id);
                save(id);
            }
        }
        function save(id) { localStorage.setItem('chat_id', id); location.reload(); }

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            renderList();
            openChat('global');
            setupVoice();
        }

        // Список чатов (сохранен + удаление)
        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val(); if(!p) return;
                        let ex = document.getElementById('item-'+p.id); if(ex) ex.remove();
                        const div = document.createElement('div');
                        div.className = 'chat-item'; div.id = 'item-'+p.id;
                        div.innerHTML = `
                            <img src="${p.ava}" class="ava-mini" onclick="openChat('${p.id}')">
                            <div style="flex:1" onclick="openChat('${p.id}')"><b>${p.nick}</b></div>
                            <span onclick="deleteChat('${p.id}', event)" style="opacity:0.5; cursor:pointer">🗑️</span>
                        `;
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) document.getElementById('chatMain').classList.add('active');
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            
            // Галочки: помечаем чат прочитанным при входе
            if(curPeer) db.ref('read_status/'+curPeer+'/'+myID).set(true);

            listenMsgs(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = ''; db.ref(path).off();
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val(); const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                
                let content = d.m;
                if(d.type === 'voice') {
                    content = `<div class="voice-player"><audio src="${d.m}" controls></audio></div>`;
                } else if(content.startsWith('http')) {
                    content = `<img src="${content}" style="max-width:200px;border-radius:10px" onclick="window.open('${content}')">`;
                }

                // Логика галочек
                let status = isMy ? '<span class="msg-status" id="st-'+snap.key+'">✓</span>' : '';

                div.innerHTML = `
                    <img src="" class="ava-mini img-${d.u}" style="width:30px;height:30px">
                    <div class="msg-bubble">
                        <b class="nick-${d.u}" style="font-size:11px">...</b>
                        ${content} ${status}
                    </div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;

                // Следим за прочтением (только для моих сообщений)
                if(isMy && curPeer) {
                    db.ref('read_status/'+myID+'/'+curPeer).on('value', s => {
                        if(s.val() === true) {
                            const st = document.getElementById('st-'+snap.key);
                            if(st) st.innerText = '✓✓';
                        }
                    });
                }

                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val(); if(p) {
                        document.querySelectorAll('.nick-'+d.u).forEach(el => el.innerText = p.nick);
                        document.querySelectorAll('.img-'+d.u).forEach(el => el.src = p.ava);
                    }
                });
            });
        }

        // --- ГОЛОСОВЫЕ СООБЩЕНИЯ ---
        function setupVoice() {
            const micBtn = document.getElementById('micBtn');
            const recBtn = document.getElementById('recBtn');

            micBtn.onmousedown = micBtn.ontouchstart = async (e) => {
                e.preventDefault();
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const blob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => {
                            sendPacket(reader.result, 'voice');
                        };
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    micBtn.style.display = 'none';
                    recBtn.style.display = 'flex';
                    recBtn.classList.add('recording');
                } catch(err) { alert("Нужен доступ к микрофону!"); }
            };

            window.onmouseup = window.ontouchend = () => {
                if(mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    micBtn.style.display = 'flex';
                    recBtn.style.display = 'none';
                    recBtn.classList.remove('recording');
                }
            };
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            sendPacket(v, 'text');
            i.value = '';
        }

        function sendPacket(val, type) {
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: val, type: type, t: Date.now() });
            // При отправке сбрасываем статус прочтения у собеседника
            if(curPeer) db.ref('read_status/'+myID+'/'+curPeer).set(false);
        }

        // --- АДМИНКА (Σ) ---
        function checkAdmin() {
            let p = prompt("Пароль Sigma:");
            if(p === "1234567891011121314151617181920") {
                openModal('admin-modal');
                const list = document.getElementById('admin-list');
                db.ref('profiles').on('value', s => {
                    list.innerHTML = '';
                    s.forEach(user => {
                        const u = user.val();
                        list.innerHTML += `
                            <div style="background:var(--panel); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #242f3d">
                                <b>${u.nick}</b>
                                <div>
                                    <button onclick="loginAs('${u.id}')" style="background:var(--blue); border:none; padding:8px; border-radius:5px; color:white">Вход</button>
                                    <button onclick="adminDel('${u.id}', '${u.nick}')" style="background:#ff5252; border:none; padding:8px; border-radius:5px; color:white; margin-left:5px">Удалить</button>
                                </div>
                            </div>`;
                    });
                });
            }
        }

        function loginAs(uid) { localStorage.setItem('chat_id', uid); location.reload(); }
        async function adminDel(uid, nick) { if(confirm("Удалить?")) { await db.ref('profiles/'+uid).remove(); await db.ref('nick_to_id/'+nick).remove(); } }

        // Общие функции
        function openSettings() {
            db.ref('profiles/'+myID).once('value', s => {
                const p = s.val();
                document.getElementById('setAva').src = p.ava;
                document.getElementById('setNick').innerText = p.nick;
                document.getElementById('setBio').innerText = p.bio;
                openModal('settings-modal');
            });
        }
        function updateAva() { let a = prompt("URL:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function updateNick() { let n = prompt("Ник:"); if(n) db.ref('profiles/'+myID+'/nick').set(n); }
        function updateBio() { let b = prompt("Био:"); if(b) db.ref('profiles/'+myID+'/bio').set(b); }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function sendMedia() { let u = prompt("URL фото:"); if(u) sendPacket(u, 'text'); }
        function deleteChat(uid, e) {
            e.stopPropagation();
            if(confirm("Удалить у обоих?")) {
                db.ref('privates/'+[myID, uid].sort().join('_')).remove();
                db.ref('friends/'+myID+'/'+uid).remove();
                db.ref('friends/'+uid+'/'+myID).remove();
                openChat('global');
            }
        }
    </script>
</body>
</html>
