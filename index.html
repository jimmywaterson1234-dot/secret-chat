<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark Final Revive</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --tg-blue: #50a2e3; --text: #fff; --msg-in: #182533; --msg-out: #2b5278; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Контейнеры экранов */
        .layer { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); z-index: 10; }
        .layer.active { display: flex; }

        /* Шапка */
        .header { height: 60px; background: var(--side); display: flex; align-items: center; padding: 0 15px; gap: 15px; border-bottom: 1px solid #000; z-index: 20; }
        .back { font-size: 24px; color: var(--tg-blue); cursor: pointer; text-decoration: none; }

        /* Списки и чаты */
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .chat-item { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #0e1621; cursor: pointer; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; background: #2b5278; flex-shrink: 0; object-fit: cover; }

        /* Сообщения */
        .msg-box { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .message { max-width: 80%; padding: 10px; border-radius: 15px; position: relative; font-size: 15px; }
        .message.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }
        .message.out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }

        /* Панель ввода */
        .footer { padding: 10px; background: var(--side); display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #242f3d; color: #fff; outline: none; }

        /* Кнопка ПЛЮС — теперь она независима */
        #main-fab { 
            position: fixed; bottom: 30px; right: 30px; 
            width: 60px; height: 60px; border-radius: 50%; 
            background: var(--tg-blue); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
            z-index: 999; cursor: pointer; border: none;
        }

        /* Окна входа */
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; text-align: center; }
        .login-card { width: 80%; max-width: 300px; }
        .btn-blue { width: 100%; padding: 12px; background: var(--tg-blue); border: none; color: #fff; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom: 20px;">Вас приветствует Spark</h2>
        <input type="text" id="log-u" placeholder="Ваш ник" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <input type="password" id="log-p" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <button class="btn-blue" onclick="auth()">Войти</button>
    </div>
</div>

<div id="screen-list" class="layer active">
    <div class="header">
        <span onclick="showLayer('screen-settings')">☰</span>
        <b>Spark</b>
        <span style="margin-left:auto" onclick="searchById()">🔍</span>
    </div>
    <div id="chats-container" class="scroll-area">
        <div class="chat-item" onclick="openChat('global', 'Общий чат')">
            <div class="avatar" style="display:flex; align-items:center; justify-content:center;">🌐</div>
            <b>Общий чат</b>
        </div>
    </div>
    <button id="main-fab" onclick="showLayer('screen-create')">+</button>
</div>

<div id="screen-chat" class="layer">
    <div class="header">
        <span class="back" onclick="hideLayer('screen-chat')">←</span>
        <b id="chat-name">Чат</b>
    </div>
    <div id="messages-area" class="scroll-area msg-box"></div>
    <div class="footer">
        <input type="text" id="msg-input" placeholder="Сообщение...">
        <span id="mic-btn" onclick="toggleRec()" style="cursor:pointer;">🎙️</span>
        <span onclick="send()" style="color:var(--tg-blue); font-size:24px; cursor:pointer;">➤</span>
    </div>
</div>

<div id="screen-settings" class="layer">
    <div class="header"><span class="back" onclick="hideLayer('screen-settings')">←</span><b>Настройки</b></div>
    <div id="my-profile" style="padding:20px; text-align:center;"></div>
    <div class="chat-item" onclick="logout()">🚪 Выйти</div>
</div>

<div id="screen-create" class="layer">
    <div class="header"><span class="back" onclick="hideLayer('screen-create')">←</span><b>Создать группу</b></div>
    <div style="padding:20px;">
        <input type="text" id="group-name-in" placeholder="Название группы" style="width:100%; padding:10px; background:#242f3d; color:white; border:none; border-radius:5px;">
        <button class="btn-blue" onclick="alert('Функция добавления участников будет в следующем обновлении!')">Далее</button>
    </div>
</div>

<script>
    // Настройка Firebase
    const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userUID = localStorage.getItem('spark_uid_v6');
    let currentChatId = null;
    let myNick = "";

    // Авторизация
    function auth() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u || !p) return alert("Заполни поля!");

        const uid = "u_" + btoa(u).replace(/=/g, ""); // Генерируем ID из ника
        db.ref('users_v6/' + uid).once('value', s => {
            if(s.exists() && s.val().pass !== p) return alert("Неверный пароль");
            if(!s.exists()) db.ref('users_v6/' + uid).set({ nick: u, pass: p, sid: Math.floor(1000+Math.random()*9000) });
            
            localStorage.setItem('spark_uid_v6', uid);
            location.reload();
        });
    }

    if(userUID) {
        document.getElementById('login-overlay').style.display = 'none';
        db.ref('users_v6/' + userUID).once('value', s => { 
            myNick = s.val().nick; 
            document.getElementById('my-profile').innerHTML = `<h2>${myNick}</h2><p>ID: ${s.val().sid}</p>`;
        });
        loadChats();
    }

    // Загрузка чатов
    function loadChats() {
        const cont = document.getElementById('chats-container');
        // Здесь можно добавить логику подгрузки личных чатов из базы
    }

    // Открытие чата
    function openChat(id, name) {
        currentChatId = id;
        document.getElementById('chat-name').innerText = name;
        showLayer('screen-chat');
        
        const path = id === 'global' ? 'global_v6' : 'priv_v6/' + id;
        db.ref(path).off();
        const area = document.getElementById('messages-area');
        area.innerHTML = "";

        db.ref(path).on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = "message " + (m.u === userUID ? "out" : "in");
            div.innerHTML = `<small style="color:var(--tg-blue)">${m.n}</small><br>${m.t}`;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        });
    }

    // Отправка
    function send() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const path = currentChatId === 'global' ? 'global_v6' : 'priv_v6/' + currentChatId;
        db.ref(path).push({ u: userUID, n: myNick, t: inp.value });
        inp.value = "";
    }

    // Навигация
    function showLayer(id) { document.getElementById(id).classList.add('active'); }
    function hideLayer(id) { document.getElementById(id).classList.remove('active'); }
    function logout() { localStorage.clear(); location.reload(); }
    function searchById() { const id = prompt("Введите ID:"); if(id) alert("Поиск ID " + id); }

    // Голосовые (заглушка для стабильности)
    function toggleRec() { alert("Запись началась (визуально)... Нажми ➤ для отправки"); }
</script>
</body>
</html>
