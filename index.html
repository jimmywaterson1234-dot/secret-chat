<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiteGram Imbo Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --panel-glass: rgba(23, 33, 43, 0.9);
            --accent: #2b5278; --blue: #50a2e3; --text: #ffffff; --text-dim: #7f91a4;
            --my-msg: #2b5278; --other-msg: #182533; --radius: 12px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }

        /* --- ЭКРАНЫ --- */
        #auth-screen { 
            position: fixed; inset: 0; background: var(--bg); 
            display: none; align-items: center; justify-content: center; z-index: 10000; 
        }
        #main-app { display: none; height: 100vh; width: 100vw; }

        /* --- АВТОРИЗАЦИЯ --- */
        .auth-card { 
            background: var(--panel); padding: 30px; border-radius: 24px; 
            text-align: center; width: 90%; max-width: 350px;
        }
        .auth-card input { 
            width: 100%; margin-bottom: 15px; background: #242f3d; 
            border: 1px solid var(--accent); color: white; padding: 14px; 
            border-radius: var(--radius);
        }
        .auth-card button { 
            width: 100%; padding: 14px; background: var(--blue); 
            border: none; border-radius: var(--radius); color: white; font-weight: bold;
        }

        /* --- ЛЕЙАУТ --- */
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        .header {
            height: 60px; padding: 0 15px; background: var(--panel-glass);
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #000;
        }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* --- СООБЩЕНИЯ --- */
        .msg-row { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.2s; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: var(--accent); }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .msg-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; display: block; }

        /* --- ИНДИКАТОР ПЕЧАТАЕТ --- */
        #typing-status { height: 20px; padding: 0 15px; font-size: 12px; color: var(--blue); font-style: italic; }

        /* --- ВВОД --- */
        .input-area { padding: 10px; background: var(--panel); display: flex; gap: 10px; align-items: center; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px; border-radius: 20px; }
        .send-btn { background: var(--blue); border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer; }

        /* --- МОБИЛЬНОСТЬ --- */
        @media (max-width: 768px) {
            .side-panel { position: fixed; inset: 0; width: 100%; z-index: 500; }
            .chat-main { position: fixed; inset: 0; width: 100%; z-index: 600; display: none; }
            .chat-main.active { display: flex; }
        }

        #img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; }
        #img-overlay img { max-width: 95%; max-height: 95%; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color:var(--blue)">LiteGram</h2>
            <input type="text" id="logNick" placeholder="Никнейм">
            <input type="password" id="logPass" placeholder="Пароль">
            <button onclick="handleAuth()">Войти</button>
            <p id="authErr" style="color:red; font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="img-overlay" onclick="this.style.display='none'"><img id="fullImg"></div>

    <div id="main-app">
        <div class="side-panel">
            <div class="header"><b>Чаты</b><span onclick="openSettings()" style="cursor:pointer">⚙️</span></div>
            <div id="chat-list" style="overflow-y:auto; flex:1"></div>
        </div>
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="margin-right:15px; cursor:pointer; font-size:20px" id="backBtn">‹</span>
                    <b id="chatTitle">LiteGram</b>
                </div>
                <div id="chatStatus" style="font-size:12px; color:var(--text-dim)">online</div>
            </div>
            <div id="msgs-container"></div>
            <div id="typing-status"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:20px">🖼️</button>
                <input type="text" id="mInput" placeholder="Сообщение...">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация
        const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;

        window.onload = () => {
            if (!myID) {
                document.getElementById('auth-screen').style.display = 'flex';
            } else {
                initApp();
            }
        };

        async function handleAuth() {
            const nick = document.getElementById('logNick').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            if (!nick) return;

            const snap = await db.ref('nick_to_id/' + nick).once('value');
            const eid = snap.val();

            if (eid) {
                const p = (await db.ref('profiles/' + eid).once('value')).val();
                if (p.pass && p.pass !== pass) {
                    document.getElementById('authErr').innerText = "Неверный пароль!";
                    return;
                }
                saveLogin(eid);
            } else {
                const id = Date.now().toString();
                await db.ref('profiles/' + id).set({ nick, pass, ava: "https://cdn-icons-png.flaticon.com/512/149/149071.png", id });
                await db.ref('nick_to_id/' + nick).set(id);
                saveLogin(id);
            }
        }

        function saveLogin(id) {
            localStorage.setItem('chat_id', id);
            location.reload();
        }

        function initApp() {
            document.getElementById('main-app').style.display = 'flex';
            renderList();
            openChat('global');
            
            // Индикатор печати
            const inp = document.getElementById('mInput');
            inp.addEventListener('input', () => {
                let path = curPeer ? `typing/privates/${curPeer}/${myID}` : `typing/global/${myID}`;
                db.ref(path).set(Date.now());
            });
            inp.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div style="padding:15px; cursor:pointer; border-bottom:1px solid #000" onclick="openChat('global')">🌐 Общий чат</div>`;
            
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).once('value', ps => {
                        const p = ps.val();
                        list.innerHTML += `<div style="padding:15px; cursor:pointer; border-bottom:1px solid #000" onclick="openChat('${p.id}')">👤 ${p.nick}</div>`;
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) document.getElementById('chatMain').classList.add('active');
            
            const path = curPeer ? 'privates/' + [myID, curPeer].sort().join('_') : 'messages';
            document.getElementById('chatTitle').innerText = curPeer ? 'Загрузка...' : 'Общий чат';
            
            if(curPeer) db.ref('profiles/'+id).once('value', s => { document.getElementById('chatTitle').innerText = s.val().nick; });
            
            listenMsgs(path);
            watchTyping();
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            cont.innerHTML = '';
            db.ref(path).off();
            db.ref(path).limitToLast(50).on('child_added', snap => {
                const d = snap.val();
                const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                
                let m = d.m;
                if(m.startsWith('http')) m = `<img src="${m}" class="msg-img" onclick="fullView('${m}')">`;
                
                div.innerHTML = `<div class="msg-bubble"><b>${d.u}</b><br>${m}</div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;
                
                db.ref('profiles/'+d.u).once('value', s => { if(s.val()) div.querySelector('b').innerText = s.val().nick; });
            });
        }

        function watchTyping() {
            const path = curPeer ? `typing/privates/${myID}/${curPeer}` : `typing/global`;
            db.ref(path).on('value', s => {
                const now = Date.now();
                let typing = false;
                s.forEach(u => { if(u.key !== myID && now - u.val() < 3000) typing = true; });
                document.getElementById('typing-status').innerText = typing ? 'Кто-то печатает...' : '';
            });
        }

        function sendMsg() {
            const val = document.getElementById('mInput').value.trim();
            if(!val) return;
            const path = curPeer ? 'privates/' + [myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: val, t: Date.now() });
            document.getElementById('mInput').value = '';
        }

        function sendMedia() {
            const url = prompt("Ссылка на фото:");
            if(url) {
                const path = curPeer ? 'privates/' + [myID, curPeer].sort().join('_') : 'messages';
                db.ref(path).push({ u: myID, m: url, t: Date.now() });
            }
        }

        function fullView(u) {
            document.getElementById('fullImg').src = u;
            document.getElementById('img-overlay').style.display = 'flex';
        }

        function closeChat() { document.getElementById('chatMain').classList.remove('active'); }
        function openSettings() { if(confirm("Выйти из аккаунта?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
