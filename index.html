<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteGram Imbo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg: #0e1621; 
            --panel: #17212b; 
            --accent: #2b5278; 
            --blue: #50a2e3; 
        }
        
        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background: var(--bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Чтобы не дергался весь экран */
        }

        /* Главный контейнер */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Для мобильных */
            height: -webkit-fill-available;
        }

        /* Экран входа */
        #auth { 
            position: fixed; inset: 0; 
            background: var(--bg); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 2000; 
        }
        .auth-card { 
            background: var(--panel); padding: 30px; border-radius: 20px; 
            text-align: center; width: 85%; max-width: 300px; 
        }

        /* Шапка */
        .header { 
            height: 60px;
            background: var(--panel); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px;
            border-bottom: 1px solid #000;
            flex-shrink: 0;
        }
        .header b { color: var(--blue); font-size: 18px; }

        /* Чат */
        #msgs { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; flex-direction: column; gap: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .msg { 
            padding: 10px 14px; border-radius: 12px; 
            max-width: 80%; background: #182533; 
            align-self: flex-start; word-wrap: break-word; 
        }
        .msg.my { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg small { color: var(--blue); font-size: 11px; font-weight: bold; display: block; margin-bottom: 4px; }

        /* Нижняя панель (ВВОД) */
        .input-area { 
            height: 70px;
            background: var(--panel); 
            display: flex; gap: 10px; align-items: center;
            padding: 10px 15px;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); /* Для iPhone */
        }
        
        input { 
            flex: 1; background: #242f3d; border: none; 
            color: white; padding: 12px; border-radius: 10px; 
            outline: none; font-size: 16px;
        }
        
        .send-btn { 
            background: var(--blue); border: none; color: white; 
            width: 50px; height: 45px; border-radius: 10px; 
            font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="auth" style="display: none;">
        <div class="auth-card">
            <h2 style="color: var(--blue)">LiteGram</h2>
            <input type="text" id="nickInput" placeholder="Никнейм" style="width: 100%; margin-bottom: 15px;">
            <button onclick="login()" style="width: 100%; height: 45px; background: var(--blue); border: none; border-radius: 10px; color: white; font-weight: bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <b>Общий Чат</b>
            <span style="color: #4caf50; font-size: 12px;">● Online</span>
        </div>

        <div id="msgs"></div>

        <div class="input-area">
            <input type="text" id="mInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let myNick = localStorage.getItem('chat_nick');

        if (!myNick) { 
            document.getElementById('auth').style.display = 'flex'; 
        } else { 
            startChat();
        }

        function login() {
            let n = document.getElementById('nickInput').value.trim();
            if (n) { 
                localStorage.setItem('chat_nick', n); 
                location.reload(); 
            }
        }

        function startChat() {
            const msgsDiv = document.getElementById('msgs');
            
            // Слушаем новые сообщения
            db.ref('common_chat').limitToLast(50).on('child_added', (snap) => {
                const data = snap.val();
                if (!data) return;

                const d = document.createElement('div');
                const isMy = data.u === myNick;
                d.className = `msg ${isMy ? 'my' : ''}`;
                d.innerHTML = `<small>${data.u}</small>${data.m}`;
                
                msgsDiv.appendChild(d);
                
                // Прокрутка вниз с небольшой задержкой для мобилок
                setTimeout(() => {
                    msgsDiv.scrollTop = msgsDiv.scrollHeight;
                }, 100);
            });
        }

        function send() {
            const inp = document.getElementById('mInput');
            const text = inp.value.trim();
            if (!text) return;

            db.ref('common_chat').push({
                u: myNick,
                m: text,
                t: Date.now()
            }).catch(e => alert("Ошибка отправки: " + e.message));

            inp.value = "";
            inp.focus();
        }

        // Фикс высоты для мобильных браузеров
        window.addEventListener('resize', () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        });
    </script>
</body>
</html>
