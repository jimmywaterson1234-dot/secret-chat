<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiteGram Imbo Pro+</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif; overflow: hidden;
        }

        #app { display: flex; flex-direction: column; height: 100%; }

        #auth { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 320px; }

        .header { 
            height: 56px; background: var(--panel); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 15px; border-bottom: 1px solid #000; flex-shrink: 0;
        }
        .header b { color: var(--blue); font-size: 18px; }
        #onlineCount { color: #4caf50; font-size: 12px; font-weight: bold; }

        #msgs { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; gap: 8px;
            background-color: var(--bg); -webkit-overflow-scrolling: touch;
        }

        .msg { 
            padding: 8px 12px; border-radius: 12px; max-width: 85%; 
            background: #182533; align-self: flex-start; word-wrap: break-word; 
            cursor: pointer; transition: opacity 0.2s;
        }
        .msg.my { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg small { color: var(--blue); font-size: 11px; font-weight: bold; display: block; margin-bottom: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }

        .input-area { 
            background: var(--panel); display: flex; gap: 8px; 
            padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
            border-top: 1px solid #000; flex-shrink: 0;
        }
        
        input { flex: 1; background: #242f3d; border: none; color: white; padding: 12px; border-radius: 10px; outline: none; font-size: 16px; height: 44px; }
        
        .action-btn { background: #242f3d; border: none; color: var(--blue); width: 44px; height: 44px; border-radius: 10px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--blue); border: none; color: white; width: 44px; height: 44px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="auth" style="display: none;">
        <div class="auth-card">
            <h2 style="color: var(--blue); margin-top:0">LiteGram</h2>
            <input type="text" id="nickInput" placeholder="Твой ник" style="width: 100%; margin-bottom: 15px; background: #242f3d; color: white; border: none; padding: 12px; border-radius: 10px;">
            <button onclick="login()" style="width: 100%; height: 45px; background: var(--blue); border: none; border-radius: 10px; color: white; font-weight: bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <b>LiteGram</b>
            <span id="onlineCount">В сети: 0</span>
        </div>

        <div id="msgs"></div>

        <div class="input-area">
            <button class="action-btn" onclick="sendImg()">📎</button>
            <input type="text" id="mInput" placeholder="Сообщение..." autocomplete="off">
            <button class="send-btn" onclick="sendText()">➤</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myNick = localStorage.getItem('chat_nick');

        if (!myNick) { document.getElementById('auth').style.display = 'flex'; } 
        else { startChat(); }

        function login() {
            let n = document.getElementById('nickInput').value.trim();
            if (n) { localStorage.setItem('chat_nick', n); location.reload(); }
        }

        function startChat() {
            const msgsDiv = document.getElementById('msgs');

            // ОНЛАЙН СЧЕТЧИК
            const onlineRef = db.ref('online');
            const myStatusRef = onlineRef.push(myNick);
            myStatusRef.onDisconnect().remove();

            onlineRef.on('value', (s) => {
                document.getElementById('onlineCount').innerText = `В сети: ${s.numChildren()}`;
            });

            // ЗАГРУЗКА И УДАЛЕНИЕ СООБЩЕНИЙ
            const msgRef = db.ref('messages');
            
            // Когда сообщение добавлено
            msgRef.limitToLast(50).on('child_added', (snap) => {
                const data = snap.val();
                if (!data) return;

                const d = document.createElement('div');
                const isMy = data.u === myNick;
                d.className = `msg ${isMy ? 'my' : ''}`;
                d.id = snap.key; // Сохраняем ID сообщения для удаления
                
                // Обработка картинок
                let content = data.m;
                if (data.m.match(/\.(jpeg|jpg|gif|png)$/) || data.m.includes('images.unsplash.com')) {
                    content = `<img src="${data.m}" onerror="this.src='https://via.placeholder.com/150?text=Ошибка+загрузки'">`;
                }

                d.innerHTML = `<small>${data.u}</small>${content}`;
                
                // Функция удаления при клике
                d.onclick = () => {
                    if (isMy && confirm("Удалить это сообщение для всех?")) {
                        db.ref('messages/' + snap.key).remove();
                    }
                };

                msgsDiv.appendChild(d);
                msgsDiv.scrollTop = msgsDiv.scrollHeight;
            });

            // Когда сообщение удалено в базе
            msgRef.on('child_removed', (snap) => {
                const el = document.getElementById(snap.key);
                if (el) el.remove();
            });
        }

        function sendText() {
            const inp = document.getElementById('mInput');
            if (!inp.value.trim()) return;
            pushMsg(inp.value.trim());
            inp.value = "";
        }

        function sendImg() {
            const url = prompt("Вставьте прямую ссылку на картинку (jpg, png, gif):");
            if (url && url.startsWith('http')) { pushMsg(url); }
        }

        function pushMsg(val) {
            db.ref('messages').push({ u: myNick, m: val, t: Date.now() });
        }
    </script>
</body>
</html>
