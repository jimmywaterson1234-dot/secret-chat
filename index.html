<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteGram Flash</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --text: #ffffff; --accent: #2b5278; --msg-my: #2b5278; --msg-other: #182533; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #auth { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: var(--panel); padding: 30px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }

        .header { background: var(--panel); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #000; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; animation: fadeIn 0.2s ease; }
        .msg.my { align-self: flex-end; background: var(--msg-my); border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.7; display: block; margin-bottom: 3px; }

        .input-area { background: var(--panel); padding: 12px; display: flex; gap: 10px; }
        input { flex: 1; background: #242f3d; border: none; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: #50a2e3; border: none; color: white; padding: 0 20px; border-radius: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        #typing { font-size: 12px; color: #50a2e3; height: 18px; padding-left: 15px; }
    </style>
</head>
<body>

    <div id="auth" style="display: none;">
        <div class="auth-box">
            <h2>LiteGram</h2>
            <input type="text" id="nick" placeholder="Никнейм" style="width: 90%; margin-bottom: 10px;">
            <button onclick="login()" style="width: 100%; height: 40px;">Войти</button>
        </div>
    </div>

    <div class="header">
        <span id="title">Общий чат</span>
        <span id="status" style="font-size: 12px; color: #4caf50;">● Online</span>
    </div>

    <div id="msgs"></div>
    <div id="typing"></div>

    <div class="input-area">
        <input type="text" id="mInput" placeholder="Сообщение..." oninput="isTyping()" onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()"> SEND </button>
    </div>

    <script>
        // Используем сразу несколько серверов для надежности и скорости
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://gun-test.herokuapp.com/gun'
        ]);

        let myNick = localStorage.getItem('chat_nick');
        const chatRoom = gun.get('global-chat-realtime-v1'); // Свежая комната для чистого теста

        if(!myNick) {
            document.getElementById('auth').style.display = 'flex';
        }

        function login() {
            const n = document.getElementById('nick').value;
            if(n) {
                localStorage.setItem('chat_nick', n);
                location.reload();
            }
        }

        function send() {
            const input = document.getElementById('mInput');
            if(!input.value) return;

            // Отправляем объект с меткой времени
            chatRoom.set({
                u: myNick,
                m: input.value,
                t: Date.now()
            });
            input.value = '';
            stopTyping();
        }

        // РЕАЛЬНОЕ ВРЕМЯ: Слушаем изменения постоянно
        const displayedMsgs = new Set();
        chatRoom.map().on((data, id) => {
            if(!data || !data.m || displayedMsgs.has(id)) return;
            displayedMsgs.add(id);

            const d = document.createElement('div');
            const isMy = data.u === myNick;
            d.className = `msg ${isMy ? 'my' : 'other'}`;
            d.innerHTML = `<span class="msg-info">${data.u}</span>${data.m}`;
            
            const box = document.getElementById('msgs');
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });

        // ПЕЧАТАЕТ...
        function isTyping() {
            gun.get('typing').get(myNick).put(true);
            clearTimeout(window.tTimeout);
            window.tTimeout = setTimeout(stopTyping, 2000);
        }

        function stopTyping() {
            gun.get('typing').get(myNick).put(false);
        }

        gun.get('typing').map().on((typing, user) => {
            if(user === myNick) return;
            document.getElementById('typing').innerText = typing ? user + ' печатает...' : '';
        });
    </script>
</body>
</html>
