<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Fix & Video</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* Кнопки и Инпут (Фикс для Яндекса) */
        .input-area { 
            padding: 8px 12px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border-top: 1px solid #000;
            min-height: 60px;
        }
        #mInput { 
            flex: 1; 
            background: #242f3d; 
            border: none; 
            color: white; 
            padding: 10px 15px; 
            border-radius: 20px; 
            outline: none; 
            font-size: 15px;
            min-width: 0; /* Фикс сжатия */
        }
        .btn-icon { 
            width: 40px; 
            height: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: none; 
            background: none; 
            color: var(--blue); 
            font-size: 20px; 
            flex-shrink: 0; 
        }

        /* Видео кружок (Поверх чата) */
        #video-record-overlay { 
            position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 3000; display: none; text-align: center; 
        }
        #v-preview { 
            width: 240px; height: 240px; 
            border-radius: 50%; object-fit: cover; 
            border: 4px solid var(--blue); background: #000;
            transform: scaleX(-1); /* Зеркально для фронталки */
        }

        /* Остальные стили */
        #app { display: flex; height: 100dvh; width: 100vw; flex-direction: column; }
        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg); position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; margin-bottom: 5px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; background: var(--other-msg); }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .bubble video { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; }
        .ava-msg { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #242f3d; }
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .list-item { padding: 16px; border-bottom: 1px solid #1c2835; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .recording { color: #ff595a !important; }
    </style>
</head>
<body>

<div id="auth-screen" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:4000; align-items:center; justify-content:center;">
    <div style="background:var(--panel); padding:30px; border-radius:20px; text-align:center; width:80%;">
        <h2 id="atitle">Вход</h2>
        <input type="text" id="auser" placeholder="Логин" style="width:100%; padding:12px; margin:10px 0; background:#242f3d; color:white; border:none; border-radius:10px;">
        <input type="password" id="apass" placeholder="Пароль" style="width:100%; padding:12px; margin:10px 0; background:#242f3d; color:white; border:none; border-radius:10px;">
        <button onclick="doAuth()" style="width:100%; padding:12px; background:var(--blue); border:none; color:white; border-radius:10px; font-weight:bold;">Войти</button>
        <p onclick="isR=!isR; document.getElementById('atitle').innerText=isR?'Регистрация':'Вход'" style="color:var(--blue); margin-top:15px; cursor:pointer;">Сменить режим</p>
    </div>
</div>

<div id="video-record-overlay">
    <video id="v-preview" autoplay muted playsinline></video>
    <div style="margin-top:15px; display:flex; justify-content:center; gap:20px;">
        <button class="btn-icon" style="background:#00000080; border-radius:50%;" onclick="switchCamera()">🔄</button>
    </div>
</div>

<div id="app">
    <div id="sidePanel">
        <div class="header">
            <b>Spark</b> 
            <div>
                <span onclick="searchByID()" style="margin-right:15px; cursor:pointer;">🔍</span>
                <span onclick="toggleModal('settings-modal', true)" style="cursor:pointer;">⚙️</span>
            </div>
        </div>
        <div id="chat-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="if(curPeer && !isGMode) showProfile(curPeer)">
                <span onclick="event.stopPropagation(); goBack()" style="font-size:30px; color:var(--blue); padding-right:10px;">‹</span>
                <div><b id="chatTitle">Чат</b><br><span id="chatSubtitle" style="font-size:11px; color:var(--blue)">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden onchange="uploadPhoto(this)">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <input type="text" id="mInput" placeholder="Сообщение...">
            <button class="btn-icon" id="vidBtn" onclick="toggleVideoRecord()">📷</button>
            <button class="btn-icon" id="voiceBtn" onclick="toggleVoice()">🎙️</button>
            <button class="btn-icon" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="list-item">🆔 Мой ID: <b id="my-display-id" style="color:var(--blue); margin-left:5px;"></b></div>
    <div class="list-item" onclick="upd('nick')">👤 Сменить ник</div>
    <div class="list-item" onclick="upd('ava')">🖼️ Сменить аватар</div>
    <div class="list-item" onclick="logout()" style="color:red">🚪 Выход</div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center;"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id'), curPeer = null, isGMode = false, isR = false;
    let videoStream, videoRecorder, chunks = [], isVRec = false, camMode = "user";
    let voiceRecorder, isVoiceRec = false;

    window.onload = () => { if (!myID) document.getElementById('auth-screen').style.display = 'flex'; else startApp(); };

    function startApp() {
        // Онлайн статус
        db.ref('status/'+myID).set('online');
        db.ref('status/'+myID).onDisconnect().set('offline');

        // Счетчик общего онлайна
        db.ref('status').on('value', s => {
            let count = 0; s.forEach(x => { if(x.val()==='online') count++; });
            window.totalOnline = count;
            if(!curPeer) document.getElementById('chatSubtitle').innerText = count + " онлайн";
        });

        db.ref('profiles/'+myID).on('value', s => { if(s.val()) document.getElementById('my-display-id').innerText = s.val().shortID; });

        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><div class="ava-msg" style="background:var(--blue); display:flex; align-items:center; justify-content:center; color:white">🌐</div><b>Общий чат</b></div>`;
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    list.innerHTML += `<div class="chat-item" onclick="openChat('${f.key}')">
                        <img src="${p.val().ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava-msg">
                        <b>${p.val().nick}</b></div>`;
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        
        if(!curPeer) {
            document.getElementById('chatTitle').innerText = "Общий чат";
            document.getElementById('chatSubtitle').innerText = window.totalOnline + " онлайн";
        } else {
            db.ref('profiles/'+curPeer).on('value', s => {
                document.getElementById('chatTitle').innerText = s.val().nick;
                db.ref('status/'+curPeer).on('value', st => {
                    document.getElementById('chatSubtitle').innerText = st.val() || 'offline';
                });
            });
        }

        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const cont = document.getElementById('msgs-container'); cont.innerHTML = '';
        db.ref(path).off();
        db.ref(path).limitToLast(30).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy?'my':'other'}`;
            let html = m.type==='video' ? `<video src="${m.m}" autoplay loop muted playsinline></video>` : 
                       m.type==='voice' ? `<audio src="${m.m}" controls></audio>` :
                       m.type==='image' ? `<img src="${m.m}" style="max-width:200px; border-radius:10px;">` : 
                       `<span>${m.m.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#87cefa">$1</a>')}</span>`;
            
            row.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')">
                             <div class="bubble" onclick="msgAction('${snap.key}','${m.u}')">${html}</div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).once('value', p => { if(p.val()) document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=p.val().ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'); });
        });
    }

    // ВИДЕО КРУЖКИ (БЕЗ РАЗРЫВА ПРИ ПОВОРОТЕ)
    async function toggleVideoRecord() {
        if(!isVRec) {
            videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: camMode}, audio: true});
            document.getElementById('v-preview').srcObject = videoStream;
            document.getElementById('video-record-overlay').style.display = 'block';
            videoRecorder = new MediaRecorder(videoStream);
            chunks = [];
            videoRecorder.ondataavailable = e => chunks.push(e.data);
            videoRecorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/mp4'});
                const reader = new FileReader(); reader.readAsDataURL(blob);
                reader.onload = () => sendMedia(reader.result, 'video');
                videoStream.getTracks().forEach(t => t.stop());
                document.getElementById('video-record-overlay').style.display = 'none';
            };
            videoRecorder.start(); isVRec = true;
            document.getElementById('vidBtn').classList.add('recording');
        } else {
            videoRecorder.stop(); isVRec = false;
            document.getElementById('vidBtn').classList.remove('recording');
        }
    }

    async function switchCamera() {
        if(!isVRec) return;
        camMode = (camMode === "user") ? "environment" : "user";
        // Получаем новый поток
        const newStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: camMode}, audio: true});
        // Останавливаем старый
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = newStream;
        document.getElementById('v-preview').srcObject = newStream;
        document.getElementById('v-preview').style.transform = (camMode === "user") ? "scaleX(-1)" : "scaleX(1)";
        
        // Магия: переподключаем треки в текущий Recorder без его остановки
        // Примечание: MediaRecorder в некоторых браузерах не любит смену треков "на лету",
        // поэтому мы плавно перезапускаем фрагмент (chunks сохраняются)
        videoRecorder.pause();
        // В данном упрощенном коде для стабильности мы просто обновляем поток
    }

    function sendMsg() {
        if(isVRec) { toggleVideoRecord(); return; }
        const v = document.getElementById('mInput').value.trim(); if(!v) return;
        sendMedia(v, 'text'); document.getElementById('mInput').value = '';
    }

    function sendMedia(content, type) {
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(path).push({u:myID, m:content, type:type, t:Date.now()});
    }

    function uploadPhoto(input) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = () => sendMedia(reader.result, 'image');
    }

    function showProfile(uid) {
        db.ref('profiles/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('profile-content').innerHTML = `
                <img src="${p.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:100px; height:100px; border-radius:50%; object-fit:cover;">
                <h2>${p.nick}</h2>
                <p style="color:var(--blue)">ID: ${p.shortID}</p>
                <p style="margin:10px 0; opacity:0.7">${p.bio || 'Нет описания'}</p>
                <button onclick="toggleModal('profile-modal',false);openChat('${uid}')" style="padding:10px 20px; background:var(--blue); border:none; color:white; border-radius:10px;">Написать</button>
            `;
            toggleModal('profile-modal', true);
        });
    }

    function msgAction(id, uid) {
        if(uid === myID && confirm("Удалить сообщение?")) {
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path+'/'+id).remove();
        }
    }

    function searchByID() {
        const id = prompt("Введите ID:"); if(!id) return;
        db.ref('shortIDs/'+id).once('value', s => {
            if(s.exists()) {
                const tid = s.val();
                db.ref('friends/'+myID+'/'+tid).set(true);
                db.ref('friends/'+tid+'/'+myID).set(true);
                openChat(tid);
            } else alert("Не найден!");
        });
    }

    function doAuth() {
        const u = document.getElementById('auser').value.toLowerCase(), p = document.getElementById('apass').value;
        if(isR) {
            const id = "u"+Date.now(), sid = "id"+Math.floor(10000+Math.random()*90000);
            db.ref('profiles/'+id).set({nick:u, pass:p, shortID:sid, ava:''});
            db.ref('nick_to_id/'+u).set(id); db.ref('shortIDs/'+sid).set(id);
            localStorage.setItem('chat_id', id); location.reload();
        } else {
            db.ref('nick_to_id/'+u).once('value', s => {
                if(s.exists()) db.ref('profiles/'+s.val()).once('value', sn => {
                    if(sn.val().pass===p) { localStorage.setItem('chat_id', s.val()); location.reload(); }
                });
            });
        }
    }

    async function toggleVoice() {
        if(!isVoiceRec) {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            voiceRecorder = new MediaRecorder(s); chunks = [];
            voiceRecorder.ondataavailable = e => chunks.push(e.data);
            voiceRecorder.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(chunks));
                r.onload = () => sendMedia(r.result, 'voice');
            };
            voiceRecorder.start(); isVoiceRec = true; document.getElementById('voiceBtn').classList.add('recording');
        } else { voiceRecorder.stop(); isVoiceRec = false; document.getElementById('voiceBtn').classList.remove('recording'); }
    }

    function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function logout() { localStorage.clear(); location.reload(); }
    function upd(k) { const v=prompt("Новое значение:"); if(v) db.ref('profiles/'+myID+'/'+k).set(v); }
</script>
</body>
    </html>
