<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark V3 Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --blue: #242f3d; --tg-blue: #50a2e3; --text: #fff; --my-msg: #2b5278; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* АВТОРИЗАЦИЯ */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { width: 90%; max-width: 320px; text-align: center; }
        .inp { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: var(--side); color: #fff; font-size: 16px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--tg-blue); color: #fff; font-weight: bold; cursor: pointer; }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #app { display: flex; width: 100vw; height: 100vh; }
        #side { width: 320px; background: var(--side); border-right: 1px solid #000; display: flex; flex-direction: column; flex-shrink: 0; }
        #main { flex: 1; display: flex; flex-direction: column; background: #0e1621; position: relative; }

        .head { height: 56px; background: var(--side); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #000; justify-content: space-between; z-index: 10; }
        .chat-list { flex: 1; overflow-y: auto; }
        .item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #0e1621; }
        .item:active { background: #232e3c; }
        .ava { width: 48px; height: 48px; border-radius: 50%; background: var(--tg-blue); object-fit: cover; flex-shrink: 0; }

        /* СООБЩЕНИЯ */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; width: 100%; margin-bottom: 2px; }
        .row.my { justify-content: flex-end; }
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; background: #182533; font-size: 15px; position: relative; cursor: pointer; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .time { font-size: 10px; opacity: 0.5; margin-left: 8px; }

        /* ПОЛЕ ВВОДА */
        .input-area { padding: 10px; background: var(--side); display: flex; align-items: center; gap: 12px; border-top: 1px solid #000; }
        #mInp { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width: 768px) {
            #side { width: 100%; position: absolute; inset: 0; z-index: 100; }
            #main { width: 100%; position: absolute; inset: 0; z-index: 200; display: none; }
            #main.active { display: flex; }
        }

        /* МОДАЛКИ */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        .v-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; display: none; }
        #v-pre { width: 260px; height: 260px; border-radius: 50%; border: 3px solid var(--tg-blue); object-fit: cover; background: #000; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="color:var(--tg-blue)">Spark V3</h1>
        <input type="text" id="auser" class="inp" placeholder="Никнейм">
        <input type="password" id="apass" class="inp" placeholder="Пароль">
        <button class="btn-main" onclick="doAuth()">ВОЙТИ / СОЗДАТЬ</button>
    </div>
</div>

<div id="v-overlay" class="v-overlay">
    <video id="v-pre" autoplay muted playsinline></video>
    <button onclick="switchCam()" style="display:block; margin: 10px auto; background:none; border:none; color:#fff; font-size:24px;">🔄</button>
</div>

<div id="app">
    <div id="side">
        <div class="head">
            <span onclick="toggleMod('sets', true)">☰</span>
            <b>Spark Чаты</b>
            <span onclick="searchID()">🔍</span>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <div id="main">
        <div class="head">
            <span onclick="goBack()" style="font-size:24px;">‹</span>
            <div style="flex:1; margin-left:15px; cursor:pointer;" onclick="viewPeer()">
                <b id="cName">...</b><br><small id="cStat" style="color:var(--tg-blue)"></small>
            </div>
            <span onclick="toggleMod('g-modal', true)" style="margin-right:10px;">👥</span>
        </div>
        <div id="msgs"></div>
        <div class="input-area">
            <span onclick="document.getElementById('fInp').click()">📎</span>
            <input type="file" id="fInp" hidden onchange="upImg(this)">
            <input type="text" id="mInp" placeholder="Сообщение...">
            <span id="vBtn" onclick="recV()">📷</span>
            <span onclick="send()" style="color:var(--tg-blue); font-size:22px;">➤</span>
        </div>
    </div>
</div>

<div id="sets" class="modal">
    <div class="head"><span onclick="toggleMod('sets', false)">✕</span><b>Настройки</b></div>
    <div class="modal-body" id="my-profile-view"></div>
    <div class="item" style="color:gold" onclick="openSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="item" style="color:red" onclick="logout()">Выйти</div>
</div>

<div id="peer-prof" class="modal">
    <div class="head"><span onclick="toggleMod('peer-prof', false)">✕</span><b>Профиль</b></div>
    <div class="modal-body" id="peer-info" style="text-align:center;"></div>
</div>

<div id="fwd-modal" class="modal">
    <div class="head"><span onclick="toggleMod('fwd-modal', false)">✕</span><b>Переслать в...</b></div>
    <div class="chat-list" id="fwd-list"></div>
</div>

<div id="sigma-modal" class="modal">
    <div class="head"><span onclick="toggleMod('sigma-modal', false)">✕</span><b>Sigma Admin</b></div>
    <div class="modal-body" id="sig-list"></div>
</div>

<div id="g-modal" class="modal">
    <div class="head"><span onclick="toggleMod('g-modal', false)">✕</span><b>Создать группу</b></div>
    <div class="modal-body" id="g-users"></div>
    <button class="btn-main" onclick="saveG()">СОЗДАТЬ</button>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('spark_v3_uid'), curPeer = null, isG = false, myData = {};
    let vStr, vRec, chunks = [], isVR = false, cam = "user";

    window.onload = () => { if(!myID) document.getElementById('auth-screen').style.display='flex'; else start(); };

    function start() {
        db.ref('profiles_v3/'+myID).on('value', s => {
            myData = s.val(); if(!myData) return;
            document.getElementById('my-profile-view').innerHTML = `
                <div style="text-align:center"><img src="${myData.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava" style="width:100px;height:100px">
                <h2>${myData.nick}</h2><p>ID: ${myData.shortID}</p></div>
                <div class="item" onclick="upd('nick')">Изменить ник</div>
                <div class="item" onclick="upd('ava')">Сменить аватар (URL)</div>
            `;
            db.ref('status_v3/'+myID).set('онлайн');
            db.ref('status_v3/'+myID).onDisconnect().set('оффлайн');
        });

        db.ref('friends_v3/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="item" onclick="openChat('global', false)"><div class="ava" style="display:flex;align-items:center;justify-content:center;">🌐</div><div><b>Общий чат</b></div></div>`;
            s.forEach(f => {
                db.ref(f.val().isG ? 'groups_v3/'+f.key : 'profiles_v3/'+f.key).once('value', p => {
                    const d = p.val();
                    list.innerHTML += `<div class="item" onclick="openChat('${f.key}', ${f.val().isG})">
                        <img src="${d.ava || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava">
                        <div><b>${d.nick || d.name}</b><br><small class="st-${f.key}">${f.val().isG?'группа':''}</small></div>
                    </div>`;
                    if(!f.val().isG) db.ref('status_v3/'+f.key).on('value', sn => { if(document.querySelector('.st-'+f.key)) document.querySelector('.st-'+f.key).innerText = sn.val() || 'оффлайн'; });
                });
            });
        });
    }

    function openChat(id, gMode) {
        curPeer = id === 'global' ? null : id; isG = gMode;
        if(window.innerWidth <= 768) document.getElementById('main').classList.add('active');
        const path = curPeer ? (isG ? 'g_msg_v3/'+curPeer : 'priv_v3/'+[myID, curPeer].sort().join('_')) : 'msgs_v3';
        
        db.ref(isG ? 'groups_v3/'+id : 'profiles_v3/'+id).once('value', p => {
            document.getElementById('cName').innerText = id === 'global' ? 'Общий чат' : (p.val().nick || p.val().name);
        });

        const cont = document.getElementById('msgs'); cont.innerHTML = '';
        db.ref(path).off();
        db.ref(path).on('child_added', snap => {
            const m = snap.val();
            const div = document.createElement('div'); div.id = 'm-'+snap.key;
            div.className = 'row ' + (m.u === myID ? 'my' : '');
            let body = m.t === 'img' ? `<img src="${m.m}" style="max-width:200px;border-radius:10px;">` :
                       m.t === 'vid' ? `<video src="${m.m}" autoplay loop muted playsinline style="width:200px;height:200px;border-radius:50%;object-fit:cover;"></video>` : `<span>${m.m}</span>`;
            let fwd = m.f ? `<small style="color:var(--tg-blue);display:block">↪ Переслано от ${m.f}</small>` : '';
            
            div.innerHTML = `<div class="bubble" onclick="msgMenu('${snap.key}','${m.u}','${m.m}','${m.t}','${m.n}')">
                ${m.u !== myID ? `<small style="color:var(--tg-blue);font-weight:bold" onclick="viewUser('${m.u}')">${m.n}</small><br>` : ''}
                ${fwd}${body}<span class="time">${m.u===myID?'✓✓':''}</span>
            </div>`;
            cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
        });
        db.ref(path).on('child_removed', snap => { const el = document.getElementById('m-'+snap.key); if(el) el.remove(); });
    }

    function msgMenu(id, u, m, t, n) {
        const act = u === myID ? confirm("Удалить сообщение для всех?") : confirm("Переслать сообщение?");
        if(u === myID && act) {
            const path = curPeer ? (isG ? 'g_msg_v3/'+curPeer : 'priv_v3/'+[myID, curPeer].sort().join('_')) : 'msgs_v3';
            db.ref(path+'/'+id).remove();
        } else if(u !== myID && act) {
            startFwd(m, t, n);
        }
    }

    function startFwd(m, t, n) {
        const list = document.getElementById('fwd-list'); list.innerHTML = '';
        db.ref('friends_v3/'+myID).once('value', s => {
            list.innerHTML = `<div class="item" onclick="doFwd('global', false, '${m}','${t}','${n}')">Общий чат</div>`;
            s.forEach(f => {
                list.innerHTML += `<div class="item" onclick="doFwd('${f.key}', ${f.val().isG}, '${m}','${t}','${n}')">Чат ${f.key}</div>`;
            });
            toggleMod('fwd-modal', true);
        });
    }

    function doFwd(id, g, m, t, n) {
        const path = id === 'global' ? 'msgs_v3' : (g ? 'g_msg_v3/'+id : 'priv_v3/'+[myID, id].sort().join('_'));
        db.ref(path).push({u:myID, n:myData.nick, m:m, t:t, f:n, time:Date.now()});
        toggleMod('fwd-modal', false); alert("Переслано!");
    }

    function viewUser(uid) {
        db.ref('profiles_v3/'+uid).once('value', s => {
            const p = s.val();
            document.getElementById('peer-info').innerHTML = `
                <img src="${p.ava||'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="ava" style="width:100px;height:100px">
                <h2>${p.nick}</h2><p>ID: ${p.shortID}</p>
                <button class="btn-main" onclick="toggleMod('peer-prof',false);addFriend('${uid}')">Написать</button>
            `;
            toggleMod('peer-prof', true);
        });
    }

    function viewPeer() { if(curPeer && !isG) viewUser(curPeer); }

    function openSigma() {
        if(prompt("Код:") === '1234567891011121314151617181920') {
            const l = document.getElementById('sig-list'); l.innerHTML = '';
            db.ref('profiles_v3').once('value', s => {
                s.forEach(u => {
                    l.innerHTML += `<div class="item"><b>${u.val().nick}</b> 
                    <button onclick="localStorage.setItem('spark_v3_uid','${u.key}');location.reload()">Вход</button>
                    <button onclick="db.ref('profiles_v3/${u.key}').remove();location.reload()" style="color:red">Удалить</button></div>`;
                });
                toggleMod('sigma-modal', true);
            });
        }
    }

    // БАЗОВЫЕ ФУНКЦИИ
    async function recV() {
        if(!isVR) {
            vStr = await navigator.mediaDevices.getUserMedia({video:{facingMode:cam}, audio:true});
            document.getElementById('v-pre').srcObject = vStr;
            document.getElementById('v-overlay').style.display = 'block';
            vRec = new MediaRecorder(vStr); chunks = [];
            vRec.ondataavailable = e => chunks.push(e.data);
            vRec.onstop = () => {
                const r = new FileReader(); r.readAsDataURL(new Blob(chunks, {type:'video/mp4'}));
                r.onload = () => sendMed(r.result, 'vid');
                vStr.getTracks().forEach(t => t.stop());
                document.getElementById('v-overlay').style.display = 'none';
            };
            vRec.start(); isVR = true; document.getElementById('vBtn').style.color = 'red';
        } else { vRec.stop(); isVR = false; document.getElementById('vBtn').style.color = '#fff'; }
    }

    function send() { if(isVR) { recV(); return; } const v = document.getElementById('mInp').value.trim(); if(!v) return; sendMed(v, 'txt'); document.getElementById('mInp').value = ''; }
    function sendMed(m, t) { const p = curPeer ? (isG ? 'g_msg_v3/'+curPeer : 'priv_v3/'+[myID, curPeer].sort().join('_')) : 'msgs_v3'; db.ref(p).push({u:myID, n:myData.nick, m:m, t:t, time:Date.now()}); }
    function doAuth() {
        const u = document.getElementById('auser').value.toLowerCase().trim(), p = document.getElementById('apass').value;
        if(!u || !p) return;
        db.ref('n_to_id_v3/'+u).once('value', s => {
            if(s.exists()) {
                db.ref('profiles_v3/'+s.val()).once('value', sn => {
                    if(sn.val().pass === p) { localStorage.setItem('spark_v3_uid', s.val()); location.reload(); }
                    else alert("Неверный пароль");
                });
            } else {
                const uid = 'u' + Date.now(), sid = 'id' + Math.floor(1000 + Math.random() * 9000);
                db.ref('profiles_v3/'+uid).set({nick:u, pass:p, shortID:sid, ava:''});
                db.ref('n_to_id_v3/'+u).set(uid); db.ref('short_v3/'+sid).set(uid);
                localStorage.setItem('spark_v3_uid', uid); location.reload();
            }
        });
    }
    function addFriend(uid) { db.ref('friends_v3/'+myID+'/'+uid).set({isG:false}); db.ref('friends_v3/'+uid+'/'+myID).set({isG:false}); openChat(uid, false); }
    function searchID() { const id = prompt("ID:"); if(id) db.ref('short_v3/'+id).once('value', s => { if(s.exists()) addFriend(s.val()); else alert("Не найден"); }); }
    function goBack() { document.getElementById('main').classList.remove('active'); }
    function toggleMod(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function upd(k) { const v = prompt("Значение:"); if(v) db.ref('profiles_v3/'+myID+'/'+k).set(v); }
    function upImg(i) { const f = i.files[0]; if(f) { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => sendMed(r.result, 'img'); } }
    async function switchCam() { cam = cam === "user" ? "environment" : "user"; vStr.getTracks().forEach(t=>t.stop()); recV(); recV(); }
</script>
</body>
</html>
