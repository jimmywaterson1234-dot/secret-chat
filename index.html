<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate Keyboard Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* Динамическая высота для мобилок */
        body, html { 
            width: 100%; 
            height: 100dvh; 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden;
        }

        #app { display: none; height: 100%; width: 100%; position: relative; z-index: 1; flex-direction: column; }
        
        /* Главный контейнер чата */
        .chat-main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            position: relative; 
            overflow: hidden;
        }

        .header { 
            height: 60px; 
            padding: 0 15px; 
            background: var(--panel); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #000; 
            z-index: 1000;
        }
        
        #msgs-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            -webkit-overflow-scrolling: touch; /* Плавный скролл на iOS */
        }

        /* Поле ввода теперь STICKY и всегда доступно */
        .input-area { 
            position: sticky;
            bottom: 0;
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); 
            background: var(--panel); 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #000;
            z-index: 2000;
        }

        #mInput { 
            flex: 1; 
            background: #242f3d; 
            border: 1px solid #333; 
            color: white; 
            padding: 12px 15px; 
            border-radius: 20px; 
            font-size: 16px; /* 16px предотвращает авто-зум на iPhone */
            outline: none;
            -webkit-appearance: none;
        }

        /* Стиль для пересланных сообщений */
        .fwd-from { 
            font-size: 11px; 
            color: var(--blue); 
            font-style: italic; 
            border-left: 2px solid var(--blue); 
            padding-left: 5px; 
            margin-bottom: 4px; 
            display: block;
        }

        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; margin-bottom: 4px; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 16px; background: var(--other-msg); }
        .my .msg-bubble { background: var(--my-msg); }

        .ava-mini { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; z-index: 10; cursor: pointer; }

        @media (max-width: 768px) {
            .side-panel { width: 100%; height: 100%; position: absolute; z-index: 1500; }
            .side-panel.hidden { display: none; }
            .chat-main { display: none; }
            .chat-main.active { display: flex; }
        }
    </style>
</head>
<body>

<div id="app">
    <div class="side-panel" id="sidePanel">
        <div class="header"><b>Spark</b> <span onclick="editProfile()" style="cursor:pointer">⚙️</span></div>
        <div id="chat-list" style="overflow-y:auto; flex:1"></div>
    </div>
    
    <div class="chat-main" id="chatMain">
        <div class="header">
            <span onclick="goBack()" style="font-size:30px; color:var(--blue); cursor:pointer">‹ Назад</span>
            <b id="chatTitle">Чат</b>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <input id="mInput" 
                   type="text" 
                   placeholder="Сообщение..." 
                   inputmode="text" 
                   enterkeyhint="send" 
                   autocomplete="off">
            <button onclick="sendMsg()" style="background:var(--blue); border:none; width:45px; height:45px; border-radius:50%; color:white; font-size:20px">➤</button>
        </div>
    </div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id');
    let curPeer = null;

    // ФИКС КЛАВИАТУРЫ: Скролл к инпуту при фокусе
    const inputField = document.getElementById('mInput');
    inputField.addEventListener('focus', () => {
        setTimeout(() => {
            inputField.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    });

    // Отправка по кнопке Enter на клавиатуре
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsg();
    });

    window.onload = () => { if(myID) startApp(); else login(); };

    function login() {
        let n = prompt("Ник для входа:");
        if(!n) return login();
        db.ref('nick_to_id/'+n).once('value', s => {
            let id = s.val() || Date.now().toString();
            if(!s.val()) {
                db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id});
                db.ref('nick_to_id/'+n).set(id);
            }
            localStorage.setItem('chat_id', id); location.reload();
        });
    }

    function startApp() {
        document.getElementById('app').style.display = 'flex';
        loadList();
    }

    function loadList() {
        const l = document.getElementById('chat-list');
        l.innerHTML = `<div style="padding:15px; border-bottom:1px solid #333" onclick="openChat('global')">🌐 Общий чат</div>`;
        db.ref('friends/'+myID).on('value', s => {
            s.forEach(f => {
                db.ref('profiles/'+f.key).once('value', p => {
                    let d = p.val();
                    l.innerHTML += `<div style="padding:15px; border-bottom:1px solid #333" onclick="openChat('${d.id}')">👤 ${d.nick}</div>`;
                });
            });
        });
    }

    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        const cont = document.getElementById('msgs-container');
        cont.innerHTML = '';
        db.ref(path).off();
        
        db.ref(path).limitToLast(30).on('child_added', snap => {
            const m = snap.val();
            const isMy = m.u === myID;
            const row = document.createElement('div');
            row.className = `msg-row ${isMy ? 'my' : 'other'}`;
            
            let fwd = m.f_name ? `<span class="fwd-from">От ${m.f_name}</span>` : '';
            
            row.innerHTML = `
                <div class="msg-bubble">
                    ${fwd}
                    <div>${m.m}</div>
                </div>
            `;
            cont.appendChild(row);
            cont.scrollTop = cont.scrollHeight;
        });
    }

    function sendMsg() {
        const val = inputField.value.trim();
        if(!val) return;
        const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
        db.ref(path).push({ u: myID, m: val, t: Date.now() });
        inputField.value = '';
        inputField.focus(); // Оставляем фокус для быстрого ввода
    }

    function goBack() {
        document.getElementById('sidePanel').classList.remove('hidden');
        document.getElementById('chatMain').classList.remove('active');
    }

    function editProfile() {
        let a = prompt("Ссылка на аву:");
        if(a) db.ref('profiles/'+myID+'/ava').set(a);
    }
</script>
</body>
</html>
