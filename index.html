<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteGram (Imbo UI)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* СОХРАНЯЕМ ИМБО ИНТЕРФЕЙС */
        :root { 
            --bg: #0e1621; 
            --panel: #17212b; 
            --accent: #2b5278; 
            --blue: #50a2e3; 
            --text: #ffffff;
        }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Экран входа */
        #auth { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        .auth-card { 
            background: var(--panel); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            width: 85%; 
            max-width: 300px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Шапка чата */
        .header { 
            background: var(--panel); 
            padding: 15px; 
            border-bottom: 1px solid #000; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .header b { color: var(--blue); font-size: 18px; }
        .status { color: #4caf50; font-size: 12px; font-weight: bold; }

        /* Область сообщений */
        #msgs { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #0e1621;
        }

        /* Стиль сообщений */
        .msg { 
            padding: 10px 14px; 
            border-radius: 12px; 
            max-width: 75%; 
            background: #182533; 
            align-self: flex-start; 
            word-wrap: break-word; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .msg.my { 
            background: var(--accent); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }
        .msg small { 
            color: var(--blue); 
            font-size: 11px; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 4px; 
        }

        /* Поле ввода */
        .input-area { 
            background: var(--panel); 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }
        input { 
            flex: 1; 
            background: #242f3d; 
            border: none; 
            color: white; 
            padding: 12px; 
            border-radius: 10px; 
            outline: none; 
            font-size: 16px;
        }
        .send-btn { 
            background: var(--blue); 
            border: none; 
            color: white; 
            padding: 12px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.95); background: var(--accent); }
    </style>
</head>
<body>

    <div id="auth" style="display: none;">
        <div class="auth-card">
            <h2 style="color: var(--blue); margin-top: 0;">LiteGram</h2>
            <input type="text" id="nickInput" placeholder="Твой никнейм" style="width: 90%; margin-bottom: 20px;">
            <button onclick="login()" style="width: 100%; height: 45px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">ВОЙТИ</button>
        </div>
    </div>

    <div class="header">
        <b id="chatName">Общий Чат</b>
        <span class="status">● Online</span>
    </div>

    <div id="msgs"></div>

    <div class="input-area">
        <input type="text" id="mInput" placeholder="Написать..." onkeypress="if(event.key==='Enter') send()">
        <button class="send-btn" onclick="send()">➤</button>
    </div>

    <script>
        // Твоя ссылка Firebase
        const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myNick = localStorage.getItem('chat_nick');

        // Проверка авторизации
        if (!myNick) { 
            document.getElementById('auth').style.display = 'flex'; 
        } else { 
            startChat();
        }

        function login() {
            let n = document.getElementById('nickInput').value.trim();
            if (n) { 
                localStorage.setItem('chat_nick', n); 
                location.reload(); 
            }
        }

        function startChat() {
            // Подгружаем последние 100 сообщений и слушаем новые
            db.ref('common_chat').limitToLast(100).on('child_added', (snap) => {
                const data = snap.val();
                if (!data) return;

                const d = document.createElement('div');
                const isMy = data.u === myNick;
                d.className = `msg ${isMy ? 'my' : ''}`;
                
                // Ник отображаем только у чужих сообщений или всегда (как в телеге)
                d.innerHTML = `<small>${data.u}</small>${data.m}`;
                
                const box = document.getElementById('msgs');
                box.appendChild(d);
                
                // Автопрокрутка вниз
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            const inp = document.getElementById('mInput');
            const text = inp.value.trim();
            
            if (!text) return;

            // Отправляем в общую ветку
            db.ref('common_chat').push({
                u: myNick,
                m: text,
                t: Date.now()
            });

            inp.value = "";
        }
    </script>
</body>
</html>
