<style>
    #typing-disk {
        padding: 5px 20px;
        font-size: 12px;
        color: var(--blue);
        font-style: italic;
        height: 20px;
        transition: 0.3s;
    }
    .typing-dots::after {
        content: '';
        animation: dots 1.5s infinite;
    }
    @keyframes dots {
        0% { content: '.'; }
        33% { content: '..'; }
        66% { content: '...'; }
    }
</style>

<div id="typing-disk"></div>

<script>
    // --- ВСЯ ЛОГИКА ТЕПЕРЬ ТУТ ---

    // 1. Функция отправки статуса "Печатаю"
    const mInput = document.getElementById('mInput');
    mInput.addEventListener('input', () => {
        let path = curPeer ? `typing/privates/${curPeer}/${myID}` : `typing/global/${myID}`;
        db.ref(path).set(Date.now());
    });

    // 2. Функция отслеживания кто печатает
    function listenTyping(isGlobal, peerID = null) {
        const disk = document.getElementById('typing-disk');
        const status = document.getElementById('chatStatus');
        const path = isGlobal ? 'typing/global' : `typing/privates/${myID}`;
        
        db.ref(path).on('value', snap => {
            let typers = [];
            const now = Date.now();
            
            snap.forEach(user => {
                // Если сигнал был меньше 3 секунд назад и это не я
                if (now - user.val() < 3000 && user.key !== myID) {
                    if (!isGlobal && user.key !== peerID) return; // В личке следим только за собеседником
                    typers.push(user.key);
                }
            });

            if (typers.length > 0) {
                // Получаем ник первого печатающего для красоты
                db.ref('profiles/' + typers[0]).once('value', p => {
                    const name = p.val() ? p.val().nick : 'Кто-то';
                    const text = typers.length > 1 ? `${name} и еще ${typers.length-1} печатают` : `${name} печатает`;
                    
                    if (isGlobal) {
                        disk.innerHTML = `<span class="typing-dots">${text}</span>`;
                    } else {
                        status.innerHTML = `<span style="color:var(--blue)" class="typing-dots">печатает</span>`;
                    }
                });
            } else {
                disk.innerHTML = '';
                if (!isGlobal) status.innerText = 'online';
            }
        });
    }

    // 3. Обнови функцию openChat, чтобы она включала нужный режим слежки
    function openChat(id) {
        curPeer = id === 'global' ? null : id;
        
        if(window.innerWidth <= 768) {
            document.getElementById('chatMain').classList.add('active');
        }

        document.getElementById('inputBox').style.display = 'flex';
        document.getElementById('msgs-container').innerHTML = '';
        
        // Сбрасываем старые слушатели печати
        db.ref('typing/global').off();
        db.ref('typing/privates/' + myID).off();

        if(!curPeer) {
            document.getElementById('chatTitle').innerText = 'Общий чат';
            document.getElementById('chatStatus').innerText = 'все участники';
            listenChat('messages');
            listenTyping(true); // Включаем глобальную печать
        } else {
            db.ref('profiles/'+id).once('value', s => { 
                document.getElementById('chatTitle').innerText = s.val().nick; 
            });
            listenChat('privates/' + [myID, id].sort().join('_'));
            listenTyping(false, id); // Включаем личную печать для конкретного друга
        }
    }
           </script>
