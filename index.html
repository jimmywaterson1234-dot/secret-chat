<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.2; z-index: 1; pointer-events: none; }
        #app { position: relative; display: flex; height: 100dvh; width: 100vw; flex-direction: column; z-index: 5; }

        .header { height: 60px; padding: 0 15px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        #sidePanel { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; }
        #sidePanel.hidden { display: none; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #1c2835; cursor: pointer; }
        
        #chatMain { display: none; flex-direction: column; height: 100%; width: 100%; background: transparent; position: relative; z-index: 200; }
        #chatMain.active { display: flex; }
        
        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 8px; max-width: 90%; align-items: flex-end; width: fit-content; }
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        
        /* Исправленная верстка баблов и голосовых */
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; cursor: pointer; position: relative; display: flex; flex-direction: column; gap: 5px; }
        .other .bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        .my .bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        
        .bubble audio { height: 35px; max-width: 220px; outline: none; }
        .bubble img { max-width: 240px; border-radius: 10px; display: block; margin: 2px 0; }

        .ava-msg { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #242f3d; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .status-tick { font-size: 11px; align-self: flex-end; color: var(--blue); margin-top: 2px; }

        .input-area { padding: 10px; background: var(--panel); display: flex; align-items: flex-end; gap: 8px; border-top: 1px solid #000; }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 10px 15px; border-radius: 18px; outline: none; resize: none; max-height: 120px; min-height: 40px; }
        .btn-icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: none; color: var(--blue); font-size: 24px; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .list-item { padding: 15px; border-bottom: 1px solid #1c2835; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        
        .recording { color: #ff595a !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--panel); padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #242f3d; color: white; outline: none; }
        .auth-box button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="wall-layer"></div>

<div id="auth-screen" style="display: none;">
    <div class="auth-box">
        <h2 id="atitle">Вход</h2>
        <input type="text" id="auser" placeholder="Логин">
        <input type="password" id="apass" placeholder="Пароль">
        <button onclick="doAuth()">Войти</button>
        <p onclick="isR=!isR; document.getElementById('atitle').innerText=isR?'Регистрация':'Вход'" style="color:var(--blue); cursor:pointer; margin-top:15px">Сменить режим</p>
    </div>
</div>

<div id="app">
    <div id="sidePanel">
        <div class="header"><b>Spark</b> <div><span onclick="openGroupCreator()" style="cursor:pointer; margin-right:20px; font-size:22px;">👥+</span><span onclick="toggleModal('settings-modal', true)" style="cursor:pointer; font-size:20px;">⚙️</span></div></div>
        <div id="chat-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="chatMain">
        <div class="header">
            <div style="display:flex; align-items:center; gap:12px">
                <span onclick="goBack()" style="font-size:35px; color:var(--blue); cursor:pointer;">‹</span>
                <div><b id="chatTitle">Чат</b><br><span id="chatSubtitle" style="font-size:11px; color:var(--blue)">...</span></div>
            </div>
        </div>
        <div id="msgs-container"></div>
        <div class="input-area">
            <input type="file" id="fileInput" hidden accept="image/*" onchange="uploadPhoto(this)">
            <button class="btn-icon" onclick="document.getElementById('fileInput').click()">🖼️</button>
            <textarea id="mInput" placeholder="Сообщение..." rows="1" oninput="handleTyping()"></textarea>
            <button id="voiceBtn" class="btn-icon" onclick="toggleVoice()">🎙️</button>
            <button onclick="sendMsg()" class="btn-icon">➤</button>
        </div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="header"><span onclick="toggleModal('settings-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Настройки</b></div>
    <div class="list-item" onclick="upd('nick')">👤 Ник <span id="st-nick" style="margin-left:auto; opacity:0.5"></span></div>
    <div class="list-item" onclick="upd('bio')">📝 О себе <span id="st-bio" style="margin-left:auto; opacity:0.5; font-size:12px"></span></div>
    <div class="list-item" onclick="upd('ava')">🖼️ Сменить аватар (URL)</div>
    <div class="list-item" onclick="upd('pass')">🔑 Сменить пароль</div>
    <div class="list-item" style="background:gold; color:black; font-weight:bold" onclick="checkSigma()">⚡ СИГМА ПАНЕЛЬ</div>
    <div class="list-item" onclick="logout()" style="color:red">🚪 Выйти</div>
</div>

<div id="sigma-modal" class="modal">
    <div class="header"><span onclick="toggleModal('sigma-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>SIGMA PANEL</b></div>
    <div id="sigma-list" style="flex:1; overflow-y:auto"></div>
</div>

<div id="group-modal" class="modal">
    <div class="header"><span onclick="toggleModal('group-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Участники</b> <button onclick="saveGroup()" style="background:none; border:none; color:var(--blue); font-weight:bold">Создать</button></div>
    <div id="group-users-list" style="flex:1; overflow-y:auto"></div>
</div>

<div id="forward-modal" class="modal">
    <div class="header"><span onclick="toggleModal('forward-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Переслать</b></div>
    <div id="forward-targets" style="flex:1; overflow-y:auto"></div>
</div>

<div id="profile-modal" class="modal">
    <div class="header"><span onclick="toggleModal('profile-modal', false)" style="font-size:30px; cursor:pointer">✕</span><b>Профиль</b></div>
    <div id="profile-content" style="padding:40px; text-align:center"></div>
</div>

<script>
    const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    const db = firebase.database();

    let myID = localStorage.getItem('chat_id'), isR = false, curPeer = null, isGMode = false;
    let recorder, chunks = [], isRec = false, tOut, fwdTxt = "";
    let selectedForGroup = [];

    const defAva = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    window.onload = () => { if (!myID) document.getElementById('auth-screen').style.display = 'flex'; else startApp(); };

    function startApp() {
        db.ref('status/'+myID).set({state:'online'});
        db.ref('status/'+myID).onDisconnect().set({state:'offline'});
        db.ref('profiles/'+myID).on('value', s => { 
            if(s.val()) {
                document.getElementById('st-nick').innerText = s.val().nick;
                document.getElementById('st-bio').innerText = s.val().bio || "Не указано";
            }
        });

        db.ref('friends/'+myID).on('value', s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><div class="ava-msg" style="background:var(--blue);display:flex;align-items:center;justify-content:center; color:white">🌐</div><b>Общий чат</b></div>`;
            s.forEach(f => {
                const isG = f.val().isGroup;
                db.ref(isG ? 'groups/'+f.key : 'profiles/'+f.key).once('value', p => {
                    if(p.val()) list.innerHTML += `<div class="chat-item" onclick="openChat('${p.key}', ${isG})">
                        <img src="${isG ? 'https://cdn-icons-png.flaticon.com/512/32/32441.png' : (p.val().ava || defAva)}" class="ava-msg" onerror="this.src='${defAva}'">
                        <b>${isG ? p.val().name : p.val().nick}</b></div>`;
                });
            });
        });
    }

    function openChat(id, isG = false) {
        curPeer = id === 'global' ? null : id; isGMode = isG;
        document.getElementById('sidePanel').classList.add('hidden');
        document.getElementById('chatMain').classList.add('active');
        const path = curPeer ? (isG ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
        
        const cont = document.getElementById('msgs-container'); cont.innerHTML = ''; db.ref(path).off();
        db.ref(path).limitToLast(40).on('child_added', snap => {
            const m = snap.val(); const isMy = m.u === myID;
            const row = document.createElement('div'); row.className = `msg-row ${isMy?'my':'other'}`;
            
            let contentHtml = '';
            if(m.type==='image') contentHtml = `<img src="${m.m}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/634/634741.png'">`;
            else if(m.type==='voice') contentHtml = `<audio src="${m.m}" controls></audio>`;
            else contentHtml = `<span>${m.m}</span>`;

            row.innerHTML = `<img src="${defAva}" class="ava-msg i-${m.u}" onclick="showProfile('${m.u}')" onerror="this.src='${defAva}'">
                <div class="bubble" onclick="msgAction('${snap.key}','${m.u}','${m.m}')">
                    ${contentHtml}
                    ${isMy?`<span class="status-tick">${m.read?'✔✔':'✔'}</span>`:''}
                </div>`;
            cont.appendChild(row); cont.scrollTop = cont.scrollHeight;
            db.ref('profiles/'+m.u).once('value', p => { if(p.val()) document.querySelectorAll('.i-'+m.u).forEach(i=>i.src=p.val().ava || defAva); });
        });
    }

    function uploadPhoto(input) {
        const f = input.files[0]; if(!f) return; 
        const r = new FileReader(); r.readAsDataURL(f); 
        r.onload = () => {
            const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
            db.ref(path).push({u:myID, m:r.result, type:'image', t:Date.now()});
        };
    }

    async function toggleVoice() {
        if(!isRec) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({audio:true});
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, {type:'audio/ogg'});
                    const r = new FileReader(); r.readAsDataURL(blob);
                    r.onload = () => {
                        const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages';
                        db.ref(path).push({u:myID, m:r.result, type:'voice', t:Date.now()});
                    };
                    chunks = [];
                };
                recorder.start(); isRec = true; document.getElementById('voiceBtn').classList.add('recording');
            } catch(e) { alert("Ошибка микрофона!"); }
        } else { recorder.stop(); isRec = false; document.getElementById('voiceBtn').classList.remove('recording'); }
    }

    function checkSigma() {
        if(prompt("Код доступа:") === '1234567891011121314151617181920') {
            toggleModal('settings-modal', false); toggleModal('sigma-modal', true);
            const slist = document.getElementById('sigma-list'); slist.innerHTML = '';
            db.ref('profiles').once('value', s => {
                s.forEach(u => {
                    slist.innerHTML += `<div class="list-item">${u.val().nick} 
                        <div style="margin-left:auto"><button onclick="localStorage.setItem('chat_id','${u.key}');location.reload()">Вход</button>
                        <button style="color:red" onclick="if(confirm('Удалить?')){db.ref('profiles/${u.key}').remove();db.ref('nick_to_id/${u.val().nick}').remove();location.reload()}">X</button></div></div>`;
                });
            });
        }
    }

    function openGroupCreator() {
        const name = prompt("Название группы:"); if(!name) return;
        selectedForGroup = [myID];
        const list = document.getElementById('group-users-list'); list.innerHTML = '';
        db.ref('profiles').once('value', s => {
            s.forEach(u => { if(u.key !== myID) {
                const item = document.createElement('div'); item.className = 'list-item';
                item.innerHTML = `<img src="${u.val().ava || defAva}" class="ava-msg" onerror="this.src='${defAva}'"><b>${u.val().nick}</b>`;
                item.onclick = () => { item.classList.toggle('selected'); if(item.classList.contains('selected')) selectedForGroup.push(u.key); else selectedForGroup = selectedForGroup.filter(id => id !== u.key); };
                list.appendChild(item);
            }});
            toggleModal('group-modal', true);
        });
        window.saveGroup = () => {
            const gid = "g"+Date.now(); db.ref('groups/'+gid).set({name: name, members: selectedForGroup});
            selectedForGroup.forEach(uid => db.ref('friends/'+uid+'/'+gid).set({isGroup:true}));
            toggleModal('group-modal', false);
        };
    }

    function msgAction(id, uid, txt) {
        if(uid === myID) { if(confirm("Удалить?")) { const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages'; db.ref(path+'/'+id).remove(); }}
        else { if(confirm("Переслать?")) {
            fwdTxt = "[Переслано]: " + txt;
            const list = document.getElementById('forward-targets'); list.innerHTML = '';
            db.ref('friends/'+myID).once('value', s => { s.forEach(f => {
                db.ref(f.val().isGroup ? 'groups/'+f.key : 'profiles/'+f.key).once('value', p => {
                    const item = document.createElement('div'); item.className = 'list-item'; item.innerHTML = `<b>${f.val().isGroup?p.val().name:p.val().nick}</b>`;
                    item.onclick = () => { const path = f.val().isGroup ? 'group_msgs/'+f.key : 'privates/'+[myID, f.key].sort().join('_'); db.ref(path).push({u:myID, m:fwdTxt, type:'text', t:Date.now()}); toggleModal('forward-modal', false); };
                    list.appendChild(item);
                });
            }); toggleModal('forward-modal', true); });
        }}
    }

    function doAuth() {
        const u = document.getElementById('auser').value.toLowerCase(), p = document.getElementById('apass').value;
        if(isR) { const id = "u"+Date.now(); db.ref('nick_to_id/'+u).set(id); db.ref('profiles/'+id).set({nick:u, pass:p, id:id, ava:defAva, bio:""}); localStorage.setItem('chat_id', id); location.reload(); }
        else { db.ref('nick_to_id/'+u).once('value', s => { if(s.exists()) db.ref('profiles/'+s.val()).once('value', sn => { if(sn.val().pass === p) { localStorage.setItem('chat_id', s.val()); location.reload(); } else alert("Пароль!"); }); }); }
    }
    function sendMsg() { const v = document.getElementById('mInput').value.trim(); if(!v) return; const path = curPeer ? (isGMode ? 'group_msgs/'+curPeer : 'privates/'+[myID, curPeer].sort().join('_')) : 'messages'; db.ref(path).push({u:myID, m:v, type:'text', t:Date.now()}); document.getElementById('mInput').value = ''; }
    function handleTyping() { if(curPeer && !isGMode) { db.ref('typing/'+myID+'/'+curPeer).set(true); clearTimeout(tOut); tOut = setTimeout(()=>db.ref('typing/'+myID+'/'+curPeer).remove(), 2000); } }
    function showProfile(uid) { db.ref('profiles/'+uid).once('value', s => { const p=s.val(); document.getElementById('profile-content').innerHTML=`<img src="${p.ava || defAva}" style="width:100px;height:100px;border-radius:50%" onerror="this.src='${defAva}'"><br><h2>${p.nick}</h2><p style="opacity:0.6; margin-top:10px">${p.bio || ""}</p><br><button onclick="db.ref('friends/'+myID+'/${uid}').set({isGroup:false});toggleModal('profile-modal',false);openChat('${uid}')" style="padding:10px 20px; background:var(--blue); border:none; color:white; border-radius:10px">Написать</button>`; toggleModal('profile-modal', true); }); }
    function upd(k) { const v=prompt("Введите новое значение:"); if(v !== null) db.ref('profiles/'+myID+'/'+k).set(v); }
    function toggleModal(id, s) { document.getElementById(id).style.display = s ? 'flex' : 'none'; }
    function goBack() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
