<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spark Ultimate v2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3;
            --text: #ffffff; --text-dim: #7f91a4; --my-msg: #2b5278; --other-msg: #182533;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; }

        #wall-layer { position: fixed; inset: 0; background-size: cover; background-position: center; opacity: 0.3; z-index: 0; pointer-events: none; }

        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; position: relative; z-index: 1; }
        
        .side-panel { width: 350px; background: var(--panel); border-right: 1px solid #000; display: flex; flex-direction: column; height: 100%; position: relative; z-index: 100; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: transparent; position: relative; height: 100%; z-index: 200; overflow: hidden; }

        .header { height: 60px; padding: 0 15px; background: rgba(23, 33, 43, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; flex-shrink: 0; }
        
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .chat-item.selected-for-fwd { background: #3a4753 !important; }
        
        .ava-mini { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: var(--accent); flex-shrink: 0; pointer-events: auto; position: relative; z-index: 10; }

        #msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; animation: msgSlide 0.2s ease-out; position: relative; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        
        .msg-row.my { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 8px 12px; border-radius: 16px; font-size: 15px; position: relative; cursor: pointer; word-wrap: break-word; }
        .my .msg-bubble { background: var(--my-msg); border-bottom-right-radius: 4px; }
        .other .msg-bubble { background: var(--other-msg); border-bottom-left-radius: 4px; }
        
        .input-area { 
            padding: 10px; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: var(--panel); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            border-top: 1px solid #000;
            flex-shrink: 0;
            z-index: 300;
        }
        #mInput { flex: 1; background: #242f3d; border: none; color: white; padding: 12px 15px; border-radius: 20px; font-size: 16px; }

        .full-modal { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 2000; }
        .full-modal.active { display: flex; }

        @media (max-width: 768px) {
            .side-panel { width: 100%; position: absolute; inset: 0; }
            .chat-main { width: 100%; position: absolute; inset: 0; display: none; background: var(--bg); }
            .chat-main.active { display: flex; }
            .side-panel.hidden { display: none; }
        }
    </style>
</head>
<body>

    <div id="wall-layer"></div>

    <div id="app">
        <div class="side-panel" id="sidePanel">
            <div class="header"><b>Spark</b> <span onclick="openSettings()" style="font-size:24px;">⚙️</span></div>
            <div id="chat-list"></div>
        </div>
        
        <div class="chat-main" id="chatMain">
            <div class="header">
                <div style="display:flex; align-items:center">
                    <span onclick="closeChat()" style="font-size:35px; margin-right:15px; color:var(--blue); cursor:pointer">‹</span>
                    <b id="chatTitle">Чат</b>
                </div>
            </div>
            <div id="msgs-container"></div>
            <div class="input-area">
                <button onclick="sendMedia()" style="background:none; border:none; font-size:22px">🖼️</button>
                <input id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button onclick="sendMsg()" style="background:var(--blue); border:none; width:40px; height:40px; border-radius:50%; color:white">➤</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="full-modal">
        <div class="header"><span onclick="closeModal('profile-modal')" style="font-size:30px">✕</span><b>Профиль</b></div>
        <div id="profile-content" style="padding:40px; text-align:center"></div>
    </div>

    <div id="fwd-modal" class="full-modal">
        <div class="header"><span onclick="closeModal('fwd-modal')" style="font-size:30px">✕</span><b>Выберите чаты</b></div>
        <div id="fwd-list" style="flex:1; overflow-y:auto"></div>
        <div style="padding:20px; background:var(--panel)">
            <button id="fwd-btn" onclick="executeForward()" style="width:100%; padding:15px; border-radius:12px; background:var(--blue); border:none; color:white; font-weight:bold; display:none"></button>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let myID = localStorage.getItem('chat_id');
        let curPeer = null;
        let selectedMsg = null;
        let fwdTargets = new Set();

        window.onload = () => { if(myID) initApp(); else login(); };

        function login() {
            let n = prompt("Ник:"); 
            if(n) {
                db.ref('nick_to_id/'+n).once('value', s => {
                    if(s.val()) { localStorage.setItem('chat_id', s.val()); location.reload(); }
                    else {
                        let id = Date.now().toString();
                        db.ref('profiles/'+id).set({nick:n, ava:"https://cdn-icons-png.flaticon.com/512/149/149071.png", id:id});
                        db.ref('nick_to_id/'+n).set(id);
                        localStorage.setItem('chat_id', id); location.reload();
                    }
                });
            }
        }

        function initApp() {
            document.getElementById('app').style.display = 'flex';
            renderList();
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = `<div class="chat-item" onclick="openChat('global')"><img src="https://cdn-icons-png.flaticon.com/512/933/933310.png" class="ava-mini"><b>Общий чат</b></div>`;
            db.ref('friends/'+myID).on('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).on('value', ps => {
                        const p = ps.val();
                        let div = document.getElementById('li-'+p.id) || document.createElement('div');
                        div.id = 'li-'+p.id; div.className = 'chat-item';
                        div.innerHTML = `<img src="${p.ava}" class="ava-mini"><b>${p.nick}</b>`;
                        div.onclick = () => openChat(p.id);
                        list.appendChild(div);
                    });
                });
            });
        }

        function openChat(id) {
            curPeer = id === 'global' ? null : id;
            if(window.innerWidth <= 768) {
                document.getElementById('sidePanel').classList.add('hidden');
                document.getElementById('chatMain').classList.add('active');
            }
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            document.getElementById('msgs-container').innerHTML = '';
            db.ref(path).off();
            listenMsgs(path);
        }

        function listenMsgs(path) {
            const cont = document.getElementById('msgs-container');
            db.ref(path).limitToLast(40).on('child_added', snap => {
                const d = snap.val(); const isMy = d.u === myID;
                const div = document.createElement('div');
                div.className = `msg-row ${isMy ? 'my' : 'other'}`;
                
                div.innerHTML = `
                    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="ava-mini i-${d.u}" onclick="showProfile('${d.u}')">
                    <div class="msg-bubble" onclick="handleMsgClick('${snap.key}', '${d.m}', '${d.u}')">
                        <small class="n-${d.u}" style="color:var(--blue); font-weight:bold"></small><br>
                        ${d.m.startsWith('http') ? `<img src="${d.m}" style="max-width:200px; border-radius:10px">` : d.m}
                        ${isMy ? '<span style="font-size:10px; margin-left:5px">✔✔</span>' : ''}
                    </div>`;
                cont.appendChild(div);
                cont.scrollTop = cont.scrollHeight;

                db.ref('profiles/'+d.u).on('value', s => {
                    const p = s.val(); if(p) {
                        document.querySelectorAll('.i-'+d.u).forEach(i => i.src = p.ava);
                        document.querySelectorAll('.n-'+d.u).forEach(n => n.innerText = p.nick);
                    }
                });
            });
        }

        function showProfile(uid) {
            db.ref('profiles/'+uid).once('value', s => {
                const p = s.val();
                document.getElementById('profile-content').innerHTML = `
                    <img src="${p.ava}" style="width:120px; height:120px; border-radius:50%">
                    <h2 style="margin:20px 0">${p.nick}</h2>
                    <button onclick="startPriv('${p.id}')" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:10px">Написать</button>
                `;
                document.getElementById('profile-modal').classList.add('active');
            });
        }

        function handleMsgClick(mid, txt, uid) {
            selectedMsg = {mid, txt, uid};
            fwdTargets.clear();
            renderFwdList();
            document.getElementById('fwd-modal').classList.add('active');
        }

        function renderFwdList() {
            const list = document.getElementById('fwd-list');
            list.innerHTML = `<div class="chat-item" id="fwd-global" onclick="toggleFwdTarget('global')">🌐 Общий чат</div>`;
            db.ref('friends/'+myID).once('value', s => {
                s.forEach(c => {
                    db.ref('profiles/'+c.key).once('value', ps => {
                        list.innerHTML += `<div class="chat-item" id="fwd-${c.key}" onclick="toggleFwdTarget('${c.key}')">👤 ${ps.val().nick}</div>`;
                    });
                });
            });
        }

        function toggleFwdTarget(id) {
            const el = document.getElementById('fwd-'+id);
            if(fwdTargets.has(id)) {
                fwdTargets.delete(id);
                el.classList.remove('selected-for-fwd');
            } else {
                fwdTargets.add(id);
                el.classList.add('selected-for-fwd');
            }
            const btn = document.getElementById('fwd-btn');
            btn.style.display = fwdTargets.size > 0 ? 'block' : 'none';
            btn.innerText = `Переслать (${fwdTargets.size})`;
        }

        async function executeForward() {
            for(let tid of fwdTargets) {
                const path = tid === 'global' ? 'messages' : 'privates/'+[myID, tid].sort().join('_');
                db.ref(path).push({ u: myID, m: selectedMsg.txt, t: Date.now() });
            }
            closeModal('fwd-modal');
            alert("Готово!");
        }

        function sendMsg() {
            const i = document.getElementById('mInput'), v = i.value.trim();
            if(!v) return;
            const path = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages';
            db.ref(path).push({ u: myID, m: v, t: Date.now() });
            i.value = '';
        }

        function startPriv(uid) {
            db.ref('friends/'+myID+'/'+uid).set(true);
            db.ref('friends/'+uid+'/'+myID).set(true);
            closeModal('profile-modal');
            openChat(uid);
        }

        function closeChat() { document.getElementById('sidePanel').classList.remove('hidden'); document.getElementById('chatMain').classList.remove('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openSettings() { let a = prompt("Ссылка на аву:"); if(a) db.ref('profiles/'+myID+'/ava').set(a); }
        function sendMedia() { let u = prompt("URL фото:"); if(u) { const p = curPeer ? 'privates/'+[myID, curPeer].sort().join('_') : 'messages'; db.ref(p).push({ u: myID, m: u, t: Date.now() }); } }
    </script>
</body>
</html>
