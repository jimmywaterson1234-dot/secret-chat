<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteGram Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0e1621; --panel: #17212b; --accent: #2b5278; --blue: #50a2e3; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Авторизация */
        #auth { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 300px; }

        /* Интерфейс */
        .sidebar { background: var(--panel); padding: 10px; border-bottom: 1px solid #000; }
        .nav-tabs { display: flex; gap: 5px; margin-top: 10px; }
        .nav-tabs button { flex: 1; padding: 8px; font-size: 12px; background: #242f3d; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .nav-tabs button.active { background: var(--blue); }

        #main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; background: #182533; align-self: flex-start; word-wrap: break-word; }
        .msg.my { background: var(--accent); align-self: flex-end; }

        .list-item { background: #242f3d; padding: 12px; margin: 5px 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #f44336; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; margin-left: 5px; display: none; }

        .input-area { background: var(--panel); padding: 15px; display: none; gap: 10px; }
        input { flex: 1; background: #242f3d; border: none; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button.send-btn { background: var(--blue); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth" style="display: none;">
        <div class="auth-card">
            <h2 style="color: var(--blue)">LiteGram</h2>
            <input type="text" id="nickInput" placeholder="@username" style="width: 90%; margin-bottom: 15px; background: #242f3d; padding: 10px; border-radius: 5px; color: white; border: none;">
            <button onclick="login()" style="width: 100%; background: var(--blue); color: white; border: none; padding: 10px; border-radius: 5px;">Войти</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b id="myLabel">@...</b>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInp" placeholder="Найти @..." style="width: 100px; font-size: 12px; padding: 5px;">
                <button onclick="sendRequest()" style="font-size: 12px;">+</button>
            </div>
        </div>
        <div class="nav-tabs">
            <button id="tab-chats" class="active" onclick="switchTab('chats')">Чаты</button>
            <button id="tab-friends" onclick="switchTab('friends')">Друзья</button>
            <button id="tab-reqs" onclick="switchTab('reqs')">Заявки <span id="req-count" class="badge">0</span></button>
        </div>
    </div>

    <div id="main-content">
        <div id="msgs"></div>
        <div id="friends-view" style="display:none"></div>
        <div id="reqs-view" style="display:none"></div>
    </div>

    <div class="input-area" id="chat-bar">
        <input type="text" id="mInput" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://litegrum-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myNick = localStorage.getItem('chat_nick');
        let currentPeer = null;

        if (!myNick) { document.getElementById('auth').style.display = 'flex'; } 
        else { 
            document.getElementById('myLabel').innerText = "@" + myNick;
            db.ref('users/' + myNick).set(true);
            initApp();
        }

        function login() {
            let n = document.getElementById('nickInput').value.replace('@', '').trim();
            if (n) { localStorage.setItem('chat_nick', n); location.reload(); }
        }

        function initApp() {
            // Слушаем заявки
            db.ref('requests/' + myNick).on('value', (s) => {
                const count = s.numChildren();
                const badge = document.getElementById('req-count');
                badge.innerText = count;
                badge.style.display = count > 0 ? 'inline' : 'none';
                renderRequests(s);
            });
            renderFriends();
        }

        function sendRequest() {
            let target = document.getElementById('searchInp').value.replace('@', '').trim();
            if (!target || target === myNick) return;
            db.ref('users/' + target).once('value', (s) => {
                if (s.exists()) {
                    db.ref('requests/' + target + '/' + myNick).set(true);
                    alert("Заявка отправлена @"+target);
                } else { alert("Пользователь не найден"); }
            });
        }

        function renderRequests(snap) {
            const view = document.getElementById('reqs-view');
            view.innerHTML = "<h4 style='margin:15px'>Входящие заявки:</h4>";
            snap.forEach((child) => {
                let from = child.key;
                view.innerHTML += `<div class="list-item">
                    <span>@${from}</span>
                    <button onclick="acceptFriend('${from}')" style="background:#4caf50; border:none; color:white; padding:5px 10px; border-radius:5px;">Принять</button>
                </div>`;
            });
        }

        function acceptFriend(name) {
            db.ref('friends/' + myNick + '/' + name).set(true);
            db.ref('friends/' + name + '/' + myNick).set(true);
            db.ref('requests/' + myNick + '/' + name).remove();
            alert("Теперь вы друзья с @" + name);
        }

        function renderFriends() {
            db.ref('friends/' + myNick).on('value', (s) => {
                const view = document.getElementById('friends-view');
                view.innerHTML = "<h4 style='margin:15px'>Ваши друзья:</h4>";
                s.forEach((child) => {
                    let name = child.key;
                    view.innerHTML += `<div class="list-item">
                        <span>@${name}</span>
                        <button onclick="openPrivateChat('${name}')" style="background:var(--blue); border:none; color:white; padding:5px 10px; border-radius:5px;">Чат</button>
                    </div>`;
                });
            });
        }

        function openPrivateChat(name) {
            currentPeer = name;
            switchTab('chats');
            document.getElementById('chat-bar').style.display = 'flex';
            document.getElementById('msgs').innerHTML = "";
            
            // ИСПРАВЛЕНИЕ БАГА: Уникальный ID чата для обоих
            let chatId = [myNick, name].sort().join('___');
            db.ref('chats/' + chatId).off(); 
            db.ref('chats/' + chatId).limitToLast(50).on('child_added', (snap) => {
                const data = snap.val();
                const d = document.createElement('div');
                d.className = `msg ${data.u === myNick ? 'my' : ''}`;
                d.innerText = data.m;
                document.getElementById('msgs').appendChild(d);
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            });
        }

        function sendMessage() {
            const inp = document.getElementById('mInput');
            if (!inp.value || !currentPeer) return;
            let chatId = [myNick, currentPeer].sort().join('___');
            db.ref('chats/' + chatId).push({
                u: myNick,
                m: inp.value,
                t: Date.now()
            });
            inp.value = "";
        }

        function switchTab(t) {
            document.getElementById('msgs').style.display = t === 'chats' ? 'flex' : 'none';
            document.getElementById('friends-view').style.display = t === 'friends' ? 'block' : 'none';
            document.getElementById('reqs-view').style.display = t === 'reqs' ? 'block' : 'none';
            document.getElementById('chat-bar').style.display = (t === 'chats' && currentPeer) ? 'flex' : 'none';
            
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
        }
    </script>
</body>
</html>
